<!DOCTYPE html>
<html lang="pt-br">
<head>
 <script>

    if (localStorage.getItem("inforos_logado") !== "true") {
        window.location.replace("https://refrigeracaoeliezer.github.io/site/");
    }
</script>

    <meta charset="UTF-8">
    <title>Sistemas | Refrigeração</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center; /* Centraliza verticalmente */
            justify-content: center; /* Centraliza horizontalmente */
            background: #0d1117;
            position: relative;
            overflow-x: hidden;
            padding: 20px;
        }

        .corner-ball {
            position: fixed;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 50%;
            z-index: 1;
            pointer-events: none;
        }
        .ball-top-right { width: 550px; height: 550px; top: -200px; right: -150px; }
        .ball-bottom-left { width: 450px; height: 450px; bottom: -150px; left: -150px; }

        .selection-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 4px solid #1e40af;
            border-radius: 40px;
            padding: 40px; /* Reduzi de 60px para 40px para ganhar espaço */
            width: 100%;
            max-width: 500px;
            position: relative;
            z-index: 10;
            box-shadow: 0 0 50px rgba(30, 64, 175, 0.2), 0 20px 40px rgba(0, 0, 0, 0.6);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-section { margin-bottom: 25px; }
        .header-section h1 { color: white; font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .header-section p { color: rgba(255, 255, 255, 0.5); font-size: 14px; line-height: 1.4; }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(30, 64, 175, 0.5), transparent);
            margin: 20px 0;
        }

        .system-btn {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px; /* Reduzi de 25px para 20px */
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            text-align: left;
            text-decoration: none;
            color: white;
        }

        .system-btn:hover {
            background: rgba(30, 64, 175, 0.15);
            border-color: #27a9e3;
            transform: translateY(-3px);
        }

        .btn-icon {
            width: 50px; /* Reduzi levemente o ícone */
            height: 50px;
            background: linear-gradient(135deg, #1e40af 0%, #27a9e3 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-right: 15px;
            flex-shrink: 0; /* Impede o ícone de amassar no mobile */
        }

        .btn-content strong { display: block; font-size: 16px; margin-bottom: 2px; }
        .btn-content span { font-size: 12px; color: rgba(255, 255, 255, 0.4); }

        .btn-logout {
            background: none;
            border: 1px solid rgba(255, 75, 75, 0.3);
            color: #ff4b4b;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 11px;
            margin-top: 15px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Ajustes específicos para Celular */
        @media (max-width: 480px) {
            body { padding: 10px; }
            .selection-card { 
                padding: 30px 20px; 
                border-radius: 30px; 
                border-width: 2px;
            }
            .header-section h1 { font-size: 20px; }
            .system-btn { padding: 15px; }
            .btn-icon { width: 40px; height: 40px; font-size: 18px; }
            .btn-content strong { font-size: 15px; }
        }
    </style>
</head>
<body>

    <div class="corner-ball ball-top-right"></div>
    <div class="corner-ball ball-bottom-left"></div>

    <div class="selection-card">
        <div class="header-section">
            <h1>Selecione o Sistema</h1>
            <p>Escolha o ambiente que deseja acessar.</p>
        </div>

        <div class="divider"></div>

        <a href="orcamento.html" class="system-btn">
            <div class="btn-icon"><i class="fa-solid fa-briefcase"></i></div>
            <div class="btn-content">
                <strong>Gerar Orçamento</strong>
                <span>Administrativo e ordens de serviço.</span>
            </div>
        </a>

        <a href="https://ajudaparatecnico.blogspot.com/" target="_blank" class="system-btn">
            <div class="btn-icon"><i class="fa-solid fa-book-bookmark"></i></div>
            <div class="btn-content">
                <strong>Acervo Técnico</strong>
                <span>Manuais e materiais técnicos.</span>
            </div>
        </a>

        <a href="configuracoes.html" class="system-btn">
            <div class="btn-icon"><i class="fa-solid fa-gear"></i></div>
            <div class="btn-content">
                <strong>Configurações</strong>
                <span>Ajustes do sistema e perfil.</span>
            </div>
        </a>

        <button class="btn-logout" onclick="logout()">
            <i class="fa-solid fa-power-off"></i> Encerrar Sessão
        </button>

        <p style="color: rgba(255,255,255,0.2); font-size: 10px; margin-top: 15px; text-transform: uppercase;">
            Acesso Restrito e Criptografado
        </p>
    </div>

    <script>
        if (localStorage.getItem("inforos_logado") !== "true") {
            window.location.href = "https://refrigeracaoeliezer.github.io/site/"; 
        }

        function logout() {
            localStorage.removeItem("inforos_logado");
            window.location.href = "https://refrigeracaoeliezer.github.io/site/";
        }
    </script>
</body>
</html>
