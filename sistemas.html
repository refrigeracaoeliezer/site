<!DOCTYPE html>
<html lang="pt-br">
<head>
 <script>
    if (localStorage.getItem("inforos_logado") !== "true") {
        window.location.replace("https://refrigeracaoeliezer.github.io/site/");
    }
</script>

    <meta charset="UTF-8">
    <title>Sistemas | Refrigeração</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>


/* Bloqueia a seleção de texto e o arraste de imagens */
    body {
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
    }

    /* Mantém os campos de texto funcionando */
    input, select, textarea {
        -webkit-user-select: text !important;
        -moz-user-select: text !important;
        -ms-user-select: text !important;
        user-select: text !important;
    }

    /* Proteção extra para imagens */
    img {
        pointer-events: none !important;
        -webkit-user-drag: none !important;
    }
     
        /* --- INICIO VARIÁVEIS DE TEMA --- */
        :root {
            --bg-body: #0d1117;
            --text-main: white;
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.1);
            --btn-bg: rgba(255, 255, 255, 0.04);
            --sub-text: rgba(255, 255, 255, 0.4);
            --title-sub: rgba(255, 255, 255, 0.5);
        }

        body.light-mode {
            --bg-body: #f0f2f5;
            --text-main: #1a1f26;
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(0, 0, 0, 0.1);
            --btn-bg: rgba(0, 0, 0, 0.03);
            --sub-text: rgba(0, 0, 0, 0.5);
            --title-sub: rgba(0, 0, 0, 0.6);
        }
        /* --- FIM VARIÁVEIS DE TEMA --- */

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center; 
            justify-content: center; 
            background: var(--bg-body);
            position: relative;
            overflow-x: hidden;
            padding: 20px;
            transition: background 0.3s, color 0.3s;
        }

        /* Botão de Troca de Tema */
        .theme-toggle { position: fixed; top: 20px; right: 20px; background: var(--btn-bg); border: 1px solid var(--glass-border); color: var(--text-main); width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100; }

        .corner-ball {
            position: fixed;
            background: rgba(30, 64, 175, 0.05);
            border-radius: 50%;
            z-index: 1;
            pointer-events: none;
            filter: blur(80px);
        }
        .ball-top-right { width: 550px; height: 550px; top: -200px; right: -150px; }
        .ball-bottom-left { width: 450px; height: 450px; bottom: -150px; left: -150px; }

        .selection-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-top: 4px solid #1e40af;
            border-radius: 40px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            position: relative;
            z-index: 10;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-section { margin-bottom: 25px; }
        .header-section h1 { color: var(--text-main); font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .header-section p { color: var(--title-sub); font-size: 14px; line-height: 1.4; }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(30, 64, 175, 0.3), transparent);
            margin: 20px 0;
        }

        .system-btn {
            width: 100%;
            background: var(--btn-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            text-align: left;
            text-decoration: none;
            color: var(--text-main);
        }

        .system-btn:hover {
            background: rgba(30, 64, 175, 0.15);
            border-color: #27a9e3;
            transform: translateY(-3px);
        }

        .btn-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #1e40af 0%, #27a9e3 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-right: 15px;
            flex-shrink: 0;
            color: white;
        }

        .btn-content strong { display: block; font-size: 16px; margin-bottom: 2px; }
        .btn-content span { font-size: 12px; color: var(--sub-text); }

        .btn-logout {
            background: none;
            border: 1px solid rgba(255, 75, 75, 0.3);
            color: #ff4b4b;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 11px;
            margin-top: 15px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @media (max-width: 480px) {
            body { padding: 10px; }
            .selection-card { 
                padding: 30px 20px; 
                border-radius: 30px; 
            }
            .header-section h1 { font-size: 20px; }
            .system-btn { padding: 15px; }
            .btn-icon { width: 40px; height: 40px; font-size: 18px; }
            .btn-content strong { font-size: 15px; }
        }
    </style>
</head>
<body>

    <button onclick="toggleTheme()" class="theme-toggle">
        <i id="theme-icon" class="fa-solid fa-sun"></i>
    </button>

    <div class="corner-ball ball-top-right"></div>
    <div class="corner-ball ball-bottom-left"></div>

    <div class="selection-card">
        <div class="header-section">
            <h1>Selecione o Sistema</h1>
            <p>Escolha o ambiente que deseja acessar.</p>
        </div>

        <div class="divider"></div>

        <a href="orcamento.html" class="system-btn">
            <div class="btn-icon"><i class="fa-solid fa-briefcase"></i></div>
            <div class="btn-content">
                <strong>Gerar Orçamento</strong>
                <span>Administrativo e ordens de serviço.</span>
            </div>
        </a>

        <a href="garantias.html" class="system-btn">
            <div class="btn-icon"><i class="fa-solid fa-shield-halved"></i></div>
            <div class="btn-content">
                <strong>Consultar Garantias</strong>
                <span>Verificar prazos e status de garantias.</span>
            </div>
        </a>

        <a href="https://ajudaparatecnico.blogspot.com/" target="_blank" class="system-btn">
            <div class="btn-icon"><i class="fa-solid fa-book-bookmark"></i></div>
            <div class="btn-content">
                <strong>Acervo Técnico</strong>
                <span>Manuais e materiais técnicos.</span>
            </div>
        </a>

        <a href="configuracoes.html" class="system-btn">
            <div class="btn-icon"><i class="fa-solid fa-gear"></i></div>
            <div class="btn-content">
                <strong>Configurações</strong>
                <span>Ajustes do sistema e perfil.</span>
            </div>
        </a>

        <button class="btn-logout" onclick="logout()">
            <i class="fa-solid fa-power-off"></i> Encerrar Sessão
        </button>

        <p style="color: var(--sub-text); font-size: 10px; margin-top: 15px; text-transform: uppercase;">
            Acesso Restrito e Criptografado
        </p>
    </div>

    <script>
        // --- FUNÇÕES DE TEMA ---
        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('theme-icon');
            body.classList.toggle('light-mode');
            
            if (body.classList.contains('light-mode')) {
                icon.classList.replace('fa-sun', 'fa-moon');
                localStorage.setItem('theme', 'light');
            } else {
                icon.classList.replace('fa-moon', 'fa-sun');
                localStorage.setItem('theme', 'dark');
            }
        }

        window.onload = () => {
            if(localStorage.getItem('theme') === 'light') toggleTheme();
        };

        if (localStorage.getItem("inforos_logado") !== "true") {
            window.location.href = "https://refrigeracaoeliezer.github.io/site/"; 
        }

        function logout() {
            localStorage.removeItem("inforos_logado");
            window.location.href = "https://refrigeracaoeliezer.github.io/site/";
        }
    </script>
</body>
</html>
