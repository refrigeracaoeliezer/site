<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="icon" type="image/png" href="https://blogger.googleusercontent.com/img/a/AVvXsEjvyHVCZolj28lEOEFo6M63izh7RcOq9tc7jph7e_Or-jSWVQ5TjRb0hcc-168k9rTwL9XnC9FdUti7imfIyv6QTbWgHDZB7zroM2I3nvUK58Zf6_sARve9qfBkasedBGsBkLahFohBhq2fbLB-hPSlFVrk5haPLt0Uy2jDnTszkHq0Qn3NfzkmK8vhNLI=w104-h117">
    <meta charset="UTF-8">
    <title>Agenda de Serviços | Refrigeração Eliezer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

    <script>
        if (localStorage.getItem("inforos_logado") !== "true") {
            window.location.replace("https://refrigeracaoeliezer.github.io/site/");
        }
    </script>

    <style>
        :root {
            --bg-body: #0d1117;
            --text-main: white;
            --text-sub: rgba(255, 255, 255, 0.4);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(0, 0, 0, 0.3);
            --accent: #3b82f6;
        }

        body.light-mode {
            --bg-body: #f0f2f5;
            --text-main: #1a1f26;
            --text-sub: #4b5563;
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(0, 0, 0, 0.1);
            --input-bg: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            transition: background 0.3s, color 0.3s;
        }

        input, textarea, select {
            -webkit-user-select: text !important;
            user-select: text !important;
            background: var(--input-bg) !important;
            border: 1px solid var(--glass-border) !important;
            color: var(--text-main) !important;
            outline: none;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
        }

        .btn-filter {
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            border: 1px solid var(--glass-border);
            transition: 0.3s;
        }

        .btn-filter.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .badge-servico { background: #10b981; color: white; }
        .badge-orcamento { background: #f59e0b; color: white; }
        
        .card-concluido { opacity: 0.4; filter: grayscale(1); }
        .card-concluido h2 { text-decoration: line-through; }

        #toast-minimal {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #3b82f6; color: white;
            padding: 15px 30px; border-radius: 50px;
            font-weight: 600; z-index: 10000;
            display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translate(-50%, -60%); }
            20% { opacity: 1; transform: translate(-50%, -50%); }
            80% { opacity: 1; transform: translate(-50%, -50%); }
            100% { opacity: 0; transform: translate(-50%, -40%); }
        }
        .animate-toast { display: block !important; animation: fadeInOut 2s ease forwards; }

        .theme-toggle { background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-main); width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="toast-minimal">Salvo com sucesso!</div>

    <div id="modal-visita" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm">
        <div class="glass-card w-full max-w-lg p-6 overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-6">
                <h3 id="modal-titulo" class="text-lg font-black uppercase">Nova Visita</h3>
                <button onclick="fecharModalVisita()" class="opacity-50 hover:opacity-100"><i class="fa-solid fa-xmark text-2xl"></i></button>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold uppercase opacity-50 ml-2">Cliente</label>
                    <input type="text" id="v_cliente" list="lista-clientes" class="w-full p-4 rounded-2xl" placeholder="Nome do Cliente">
                    <datalist id="lista-clientes"></datalist>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold uppercase opacity-50 ml-2">Telefone</label>
                        <input type="tel" id="v_tel" class="w-full p-4 rounded-2xl" placeholder="(00) 00000-0000">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold uppercase opacity-50 ml-2">Tipo</label>
                        <select id="v_tipo" class="w-full p-4 rounded-2xl">
                            <option value="Serviço">Serviço</option>
                            <option value="Orçamento">Orçamento</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase opacity-50 ml-2">Endereço</label>
                    <input type="text" id="v_end" class="w-full p-4 rounded-2xl" placeholder="Rua, Bairro, Cidade">
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase opacity-50 ml-2">Descrição do Problema</label>
                    <textarea id="v_desc" class="w-full p-4 rounded-2xl h-24" placeholder="Ex: Geladeira não gela..."></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold uppercase opacity-50 ml-2">Data</label>
                        <input type="date" id="v_data" class="w-full p-4 rounded-2xl">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold uppercase opacity-50 ml-2">Hora</label>
                        <input type="time" id="v_hora" class="w-full p-4 rounded-2xl">
                    </div>
                </div>
                <input type="hidden" id="v_id_row">
                <button onclick="salvarVisita()" id="btn-salvar" class="w-full py-4 bg-blue-600 rounded-2xl font-bold uppercase text-sm shadow-lg hover:bg-blue-700 transition">Salvar Agendamento</button>
            </div>
        </div>
    </div>

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-black uppercase tracking-tighter">Agenda de <span class="text-blue-500">Serviços</span></h1>
                <p class="text-[10px] font-bold opacity-50 tracking-widest uppercase">Gestão de Visitas Técnicas</p>
            </div>
            <button onclick="toggleTheme()" class="theme-toggle">
                <i id="theme-icon" class="fa-solid fa-sun"></i>
            </button>
        </header>

        <div class="glass-card p-4 mb-8 flex flex-col md:flex-row gap-4 justify-between items-center">
            <div class="flex gap-2 w-full md:w-auto overflow-x-auto">
                <button onclick="setFiltro('dia', this)" class="btn-filter active whitespace-nowrap">Hoje</button>
                <button onclick="setFiltro('semana', this)" class="btn-filter whitespace-nowrap">Semana</button>
                <button onclick="setFiltro('mes', this)" class="btn-filter whitespace-nowrap">Mês</button>
                <button onclick="setFiltro('todos', this)" class="btn-filter whitespace-nowrap">Todos</button>
            </div>
            <div class="relative w-full md:w-64">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 opacity-30"></i>
                <input type="text" id="buscaNome" oninput="filtrarCards()" class="w-full p-3 pl-10 rounded-xl text-sm" placeholder="Buscar cliente...">
            </div>
        </div>

        <div id="container-agenda" class="space-y-4 min-h-[300px]">
            <div class="text-center py-20 opacity-30 font-bold uppercase tracking-widest text-xs">Carregando Agenda...</div>
        </div>
    </div>

    <button onclick="abrirModalVisita()" class="fixed bottom-6 right-6 w-14 h-14 bg-blue-600 rounded-full text-white shadow-2xl flex items-center justify-center text-xl hover:scale-110 transition z-40">
        <i class="fa-solid fa-plus"></i>
    </button>

    <script>
        const URL_AGENDA = "https://script.google.com/macros/s/AKfycbyx6kGtlzS0q1s3chrRhdNG0YGJ4VwRIDLjmttJN_vE4UVa2CPmVRFqQlU9nQ1DPkmjnA/exec"; 
        // Nota: O script do Google deve aceitar o parâmetro 'sheet=agenda' para diferenciar da de clientes ou tratar conforme sua lógica.

        let dadosGerais = [];
        let filtroAtual = 'dia';

        // --- SEGURANÇA ---
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if ((e.ctrlKey && ['c', 'u', 's', 'p'].includes(e.key.toLowerCase())) || e.keyCode === 123) {
                e.preventDefault();
                alert('Protegido');
            }
        });

        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('light-mode');
            const isLight = body.classList.contains('light-mode');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            document.getElementById('theme-icon').className = isLight ? 'fa-solid fa-moon' : 'fa-solid fa-sun';
        }

        function showToast(msg) {
            const t = document.getElementById('toast-minimal');
            t.innerText = msg;
            t.classList.add('animate-toast');
            setTimeout(() => t.classList.remove('animate-toast'), 2500);
        }

        async function carregarDados() {
            try {
                const res = await fetch(`${URL_AGENDA}?action=listar_agenda`);
                dadosGerais = await res.json();
                renderizarAgenda();
                popularDatalist();
            } catch (e) {
                document.getElementById('container-agenda').innerHTML = "<p class='text-center opacity-50'>Erro ao carregar dados.</p>";
            }
        }

        function setFiltro(tipo, btn) {
            filtroAtual = tipo;
            document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderizarAgenda();
        }

        function renderizarAgenda() {
            const container = document.getElementById('container-agenda');
            container.innerHTML = "";

            let filtrados = filtrarPorData(dadosGerais, filtroAtual);
            
            // Ordenação: Pendentes primeiro, depois por data
            filtrados.sort((a, b) => {
                if (a.status === b.status) return new Date(a.data) - new Date(b.data);
                return a.status === 'concluido' ? 1 : -1;
            });

            if (filtrados.length === 0) {
                container.innerHTML = `<div class="text-center py-20 opacity-20 font-bold uppercase text-xs">Nenhum registro para este período</div>`;
                return;
            }

            filtrados.forEach(item => {
                const concluido = item.status === 'concluido';
                const badgeClass = item.tipo === 'Serviço' ? 'badge-servico' : 'badge-orcamento';
                
                const card = `
                    <div class="glass-card p-5 flex flex-col md:flex-row justify-between gap-4 ${concluido ? 'card-concluido' : ''}">
                        <div class="flex-1">
                            <div class="flex items-center gap-3 mb-2">
                                <span class="px-2 py-1 rounded-md text-[9px] font-black uppercase ${badgeClass}">${item.tipo}</span>
                                <span class="text-[10px] font-bold opacity-40"><i class="fa-solid fa-calendar-day mr-1"></i> ${formatarData(item.data)} - ${item.hora}</span>
                            </div>
                            <h2 class="text-lg font-black uppercase tracking-tighter">${item.cliente}</h2>
                            <p class="text-xs opacity-70 mb-3">${item.descricao}</p>
                            <p class="text-[10px] font-bold"><i class="fa-solid fa-location-dot text-blue-500 mr-1"></i> ${item.endereco}</p>
                        </div>
                        <div class="flex md:flex-col justify-end gap-2">
                            ${!concluido ? `
                                <button onclick="marcarConcluido(${item.row})" class="p-3 bg-green-500/20 text-green-500 rounded-xl hover:bg-green-500 hover:text-white transition shadow-sm"><i class="fa-solid fa-check"></i></button>
                                <button onclick="abrirEditar(${item.row})" class="p-3 bg-blue-500/20 text-blue-500 rounded-xl hover:bg-blue-500 hover:text-white transition shadow-sm"><i class="fa-solid fa-pen"></i></button>
                            ` : `<span class="text-[10px] font-bold text-green-500 p-2 italic">✓ Finalizado</span>`}
                            <button onclick="deletarVisita(${item.row})" class="p-3 bg-red-500/10 text-red-500 rounded-xl hover:bg-red-500 hover:text-white transition opacity-30 hover:opacity-100"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        function filtrarPorData(dados, periodo) {
            const hoje = new Date();
            hoje.setHours(0,0,0,0);
            
            return dados.filter(d => {
                const dataItem = new Date(d.data + "T12:00:00");
                if (periodo === 'todos') return true;
                if (periodo === 'dia') return dataItem.getTime() === hoje.getTime();
                if (periodo === 'semana') {
                    const diff = dataItem.getTime() - hoje.getTime();
                    return diff >= 0 && diff <= (7 * 24 * 60 * 60 * 1000);
                }
                if (periodo === 'mes') {
                    return dataItem.getMonth() === hoje.getMonth() && dataItem.getFullYear() === hoje.getFullYear();
                }
            });
        }

        function filtrarCards() {
            const termo = document.getElementById('buscaNome').value.toLowerCase();
            document.querySelectorAll('.glass-card').forEach(card => {
                const nome = card.querySelector('h2')?.innerText.toLowerCase() || "";
                card.style.display = nome.includes(termo) ? 'flex' : 'none';
            });
        }

        function abrirModalVisita() {
            limparModal();
            document.getElementById('modal-titulo').innerText = "Nova Visita";
            document.getElementById('modal-visita').classList.remove('hidden');
        }

        function fecharModalVisita() {
            document.getElementById('modal-visita').classList.add('hidden');
        }

        function limparModal() {
            document.getElementById('v_id_row').value = "";
            document.getElementById('v_cliente').value = "";
            document.getElementById('v_tel').value = "";
            document.getElementById('v_end').value = "";
            document.getElementById('v_desc').value = "";
            document.getElementById('v_data').value = "";
            document.getElementById('v_hora').value = "";
        }

        async function marcarConcluido(row) {
            showToast("Atualizando...");
            await fetch(`${URL_AGENDA}?action=concluir&row=${row}`);
            carregarDados();
        }

        async function deletarVisita(row) {
            if(!confirm("Deseja realmente excluir este agendamento?")) return;
            showToast("Excluindo...");
            await fetch(`${URL_AGENDA}?action=deletar_agenda&row=${row}`);
            carregarDados();
        }

        function abrirEditar(row) {
            const item = dadosGerais.find(d => d.row == row);
            if(!item) return;

            document.getElementById('v_id_row').value = item.row;
            document.getElementById('v_cliente').value = item.cliente;
            document.getElementById('v_tel').value = item.telefone;
            document.getElementById('v_end').value = item.endereco;
            document.getElementById('v_desc').value = item.descricao;
            document.getElementById('v_tipo').value = item.tipo;
            document.getElementById('v_data').value = item.data; // Formato YYYY-MM-DD
            document.getElementById('v_hora').value = item.hora;

            document.getElementById('modal-titulo').innerText = "Editar Visita";
            document.getElementById('modal-visita').classList.remove('hidden');
        }

        async function salvarVisita() {
            const btn = document.getElementById('btn-salvar');
            const originalText = btn.innerText;
            
            const payload = {
                row: document.getElementById('v_id_row').value,
                cliente: document.getElementById('v_cliente').value,
                telefone: document.getElementById('v_tel').value,
                endereco: document.getElementById('v_end').value,
                descricao: document.getElementById('v_desc').value,
                tipo: document.getElementById('v_tipo').value,
                data: document.getElementById('v_data').value,
                hora: document.getElementById('v_hora').value,
                status: 'pendente'
            };

            if(!payload.cliente || !payload.data) {
                alert("Cliente e Data são obrigatórios!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Processando...";

            try {
                await fetch(URL_AGENDA, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });
                
                setTimeout(() => {
                    showToast("Agendamento Salvo!");
                    fecharModalVisita();
                    carregarDados();
                    btn.disabled = false;
                    btn.innerText = originalText;
                }, 1000);
            } catch (e) {
                alert("Erro ao salvar.");
                btn.disabled = false;
                btn.innerText = originalText;
            }
        }

        function formatarData(dataISO) {
            if(!dataISO) return "--/--";
            const p = dataISO.split('-');
            return `${p[2]}/${p[1]}`;
        }

        function popularDatalist() {
            // Se você tiver uma lista de clientes salva no localStorage ou via fetch
            // pode popular o datalist 'lista-clientes' aqui para facilitar o preenchimento.
        }

        window.onload = () => {
            if(localStorage.getItem('theme') === 'light') toggleTheme();
            carregarDados();
        };
    </script>
</body>
</html>
