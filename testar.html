<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="icon" type="image/png" href="https://blogger.googleusercontent.com/img/a/AVvXsEjvyHVCZolj28lEOEFo6M63izh7RcOq9tc7jph7e_Or-jSWVQ5TjRb0hcc-168k9rTwL9XnC9FdUti7imfIyv6QTbWgHDZB7zroM2I3nvUK58Zf6_sARve9qfBkasedBGsBkLahFohBhq2fbLB-hPSlFVrk5haPLt0Uy2jDnTszkHq0Qn3NfzkmK8vhNLI=w104-h117">
    <meta charset="UTF-8">
    <title>Agenda de Visitas | Refrigeração Eliezer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

    <script>
        if (localStorage.getItem("inforos_logado") !== "true") {
            window.location.replace("https://refrigeracaoeliezer.github.io/site/");
        }
    </script>

  <style>
  #popupAgendar {
    background-color: #0f0f0f;
    color: white;
    width: 400px;
    padding: 25px;
    border-radius: 20px;
    font-family: sans-serif;
    position: relative;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  #popupAgendar h2 { margin: 0 0 20px 0; font-size: 1.5rem; text-transform: uppercase; }
  
  .close-btn { position: absolute; top: 20px; right: 20px; cursor: pointer; font-size: 20px; }

  .input-group { margin-bottom: 15px; }
  
  .input-group label { 
    display: block; font-size: 10px; color: #888; 
    text-transform: uppercase; margin-bottom: 5px; font-weight: bold;
  }

  .input-group input, .input-group select, .input-group textarea {
    width: 100%;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 12px; /* Aqui resolve o problema de ser fininho */
    color: white;
    box-sizing: border-box;
    font-size: 14px;
  }

  .row { display: flex; gap: 10px; }
  .flex-2 { flex: 2; }
  .flex-1 { flex: 1; }

  #btnAgendar {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 12px;
    background: #2563eb;
    color: white;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
    transition: 0.3s;
  }

  #btnAgendar:disabled { background: #555; cursor: not-allowed; }

  /* Overlay de Status */
  #statusOverlay {
    display: none;
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.8);
    border-radius: 20px;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
</style>

<div id="popupAgendar">
  <span class="close-btn">&times;</span>
  <h2>Agendar Visita</h2>
  
  <div id="statusOverlay">
    <div id="statusText" style="font-weight: bold; font-size: 18px;">AGENDANDO...</div>
  </div>

  <form id="formAgenda">
    <div class="input-group">
      <label>Cliente</label>
      <input type="text" id="cliente" required>
    </div>

    <div class="row">
      <div class="input-group flex-2">
        <label>Telefone</label>
        <input type="text" id="telefone" placeholder="000.000.000-00">
      </div>
      <div class="input-group flex-1">
        <label>Tipo</label>
        <select id="tipo">
          <option>Serviço</option>
          <option>Orçamento</option>
        </select>
      </div>
    </div>

    <div class="input-group">
      <label>Endereço</label>
      <input type="text" id="endereco" required>
    </div>

    <div class="input-group">
      <label>Descrição do Problema</label>
      <textarea id="descricao" rows="4"></textarea>
    </div>

    <div class="row">
      <div class="input-group flex-1">
        <label>Data</label>
        <input type="date" id="data_visita" required>
      </div>
      <div class="input-group flex-1">
        <label>Hora</label>
        <input type="time" id="hora_visita" required>
      </div>
    </div>

    <button type="submit" id="btnAgendar">AGENDAR</button>
  </form>
</div>

<script>
  const SCRIPT_URL = 'SUA_URL_DO_DEPLOY_AQUI';

  document.getElementById('formAgenda').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const btn = document.getElementById('btnAgendar');
    const overlay = document.getElementById('statusOverlay');
    const statusText = document.getElementById('statusText');
    
    // Mostrar "Agendando..."
    overlay.style.display = 'flex';
    statusText.innerText = 'AGENDANDO...';
    btn.disabled = true;

    const payload = {
      cliente: document.getElementById('cliente').value,
      telefone: document.getElementById('telefone').value,
      tipo: document.getElementById('tipo').value,
      endereco: document.getElementById('endereco').value,
      descricao: document.getElementById('descricao').value,
      data_hora: document.getElementById('data_visita').value + ' ' + document.getElementById('hora_visita').value
    };

    fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify(payload)
    })
    .then(res => res.json())
    .then(data => {
      if(data.status === 'success') {
        statusText.innerText = 'AGENDADO COM SUCESSO!';
        setTimeout(() => {
          overlay.style.display = 'none';
          document.getElementById('formAgenda').reset();
          btn.disabled = false;
          // Aqui você chama a função que carrega sua lista de clientes/agenda
          if(typeof carregarLista === "function") carregarLista(); 
        }, 2000);
      }
    })
    .catch(err => {
      alert('Erro ao salvar');
      overlay.style.display = 'none';
      btn.disabled = false;
    });
  });
</script>
</body>
</html>
