<!DOCTYPE html>
<html lang="pt-br">
<head>
    <script>
    if (localStorage.getItem("inforos_logado") !== "true") {
        window.location.replace("https://refrigeracaoeliezer.github.io/site/");
    }
    </script>

    <meta charset="UTF-8">
    <title>Orçamento | Profissional</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; min-height: 100vh; background: #0d1117; color: white; position: relative; overflow-x: hidden; -webkit-font-smoothing: antialiased; }

        .corner-ball { position: fixed; background: rgba(30, 64, 175, 0.1); border-radius: 50%; z-index: 0; pointer-events: none; filter: blur(80px); }
        .ball-top-right { width: 400px; height: 400px; top: -100px; right: -100px; }
        .ball-bottom-left { width: 300px; height: 300px; bottom: -100px; left: -100px; }

        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-top: 4px solid #1e40af; border-radius: 30px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); transition: all 0.5s ease; }

        .is-os { border-top-color: #10b981 !important; }
        .is-os .text-blue-500, .is-os .text-blue-400, .is-os .section-header i, .is-os .section-header span { color: #10b981 !important; }
        .is-os .btn-primary { background: linear-gradient(135deg, #065f46 0%, #10b981 100%) !important; }

        .dark-input { background: rgba(255, 255, 255, 0.05) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; transition: all 0.3s ease; cursor: pointer; }
        .dark-input:focus { border-color: #3b82f6 !important; background: rgba(255, 255, 255, 0.08) !important; outline: none; }
        .is-os .dark-input:focus { border-color: #10b981 !important; }

        .service-card { background: rgba(255, 255, 255, 0.02); border-radius: 20px; padding: 15px; border: 1px solid rgba(255, 255, 255, 0.08); }
        .qty-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 8px; background: rgba(255, 255, 255, 0.05); color: #3b82f6; transition: 0.2s; border: 1px solid rgba(59, 130, 246, 0.2); }
        
        .section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .section-header i { font-size: 14px; color: #3b82f6; }
        .section-header span { font-size: 11px; font-weight: 800; color: #3b82f6; text-transform: uppercase; letter-spacing: 0.5px; }

        .btn-primary { background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); transition: transform 0.2s; box-shadow: 0 10px 20px -5px rgba(30, 64, 175, 0.5); }
        .btn-primary:active { transform: scale(0.95); }

        /* Estilo fixo do botão Adicionar Item */
        .btn-add-item { width: 100%; padding: 1rem; border: 2px dashed rgba(59, 130, 246, 0.5); border-radius: 1.25rem; color: white; font-weight: 700; font-size: 0.75rem; transition: all 0.3s; background: rgba(59, 130, 246, 0.05); }
        .btn-add-item:active { transform: scale(0.98); background: rgba(59, 130, 246, 0.1); }
        .is-os .btn-add-item { border-color: rgba(16, 185, 129, 0.5); background: rgba(16, 185, 129, 0.05); }

        .switch { position: relative; display: inline-block; width: 100%; height: 44px; background: rgba(255,255,255,0.05); border-radius: 15px; padding: 4px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .switch-bg { position: absolute; top: 4px; left: 4px; width: calc(50% - 4px); height: calc(100% - 8px); background: #1e40af; border-radius: 12px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1; }
        .switch-labels { position: relative; display: flex; height: 100%; z-index: 2; align-items: center; font-size: 11px; font-weight: 800; text-transform: uppercase; }
        .switch-labels div { flex: 1; text-align: center; color: rgba(255,255,255,0.4); }
        .active-label { color: white !important; }
        .mode-os .switch-bg { left: 50%; background: #10b981; }

        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(1); }
    </style>
</head>
<body class="p-4 pb-10">

    <div class="corner-ball ball-top-right"></div>
    <div class="corner-ball ball-bottom-left"></div>

    <div class="max-w-md mx-auto relative z-10" id="main-container">
        <div class="mb-6">
            <div class="switch" id="toggleMode" onclick="alternarModo()">
                <div class="switch-bg" id="switch-thumb"></div>
                <div class="switch-labels">
                    <div id="lbl-orc" class="active-label">Orçamento</div>
                    <div id="lbl-os">Ordem de Serviço</div>
                </div>
            </div>
        </div>

        <header class="flex justify-between items-center mb-8 pt-4">
            <div>
                <h1 class="text-xl font-black tracking-tighter uppercase leading-none">
                    REFRIGERAÇÃO <span class="text-blue-500" id="header-name">ELIEZER</span>
                </h1>
                <span class="text-[10px] text-blue-400 font-bold uppercase tracking-widest" id="sub-title">Sistema de Orçamento</span>
            </div>
        </header>

        <main class="glass-card p-6 space-y-7" id="card-principal">
            <div id="sec-dados" class="space-y-4">
                <div class="section-header">
                    <i class="fa-solid fa-user-gear"></i>
                    <span id="label-dados">Dados do Orçamento</span>
                </div>
                <div class="space-y-3">
                    <input type="text" id="nomePrestador" placeholder="Seu Nome / Sua Empresa" class="w-full p-4 rounded-2xl dark-input text-sm font-semibold outline-none">
                    
                    <div class="relative">
                        <input type="text" id="nomeCliente" list="lista_clientes" placeholder="Selecionar Cliente" class="w-full p-4 rounded-2xl dark-input text-sm font-semibold outline-none" onmousedown="forcarLista(this)">
                        <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-white/10 pointer-events-none text-xs"></i>
                    </div>

                    <input type="text" id="enderecoCliente" placeholder="Endereço (Rua, Nº, Bairro)" class="w-full p-4 rounded-2xl dark-input text-sm font-semibold outline-none">
                    <input type="tel" id="telCliente" placeholder="(DD) 9XXXX-XXXX" class="w-full p-4 rounded-2xl dark-input text-sm font-semibold outline-none">
                    
                    <div class="grid grid-cols-2 gap-2 pt-2">
                        <div class="space-y-1">
                            <label class="text-[9px] font-bold text-white/30 uppercase ml-2">Início / Data</label>
                            <input type="date" id="dataInicio" class="w-full p-3 rounded-xl dark-input text-[11px] font-bold text-center">
                        </div>
                        <div class="space-y-1 hidden" id="campo-termino">
                            <label class="text-[9px] font-bold text-white/30 uppercase ml-2">Término</label>
                            <input type="date" id="dataFim" class="w-full p-3 rounded-xl dark-input text-[11px] font-bold text-center">
                        </div>
                        <div class="space-y-1" id="campo-hora">
                            <label class="text-[9px] font-bold text-white/30 uppercase ml-2">Hora</label>
                            <input type="time" id="horaAtual" class="w-full p-3 rounded-xl dark-input text-[11px] font-bold text-center">
                        </div>
                    </div>
                </div>
            </div>

            <div id="sec-servicos" class="space-y-4">
                <div class="flex justify-between items-center mb-1">
                    <div class="section-header !mb-0">
                        <i class="fa-solid fa-screwdriver-wrench"></i>
                        <span>Serviços Realizados</span>
                    </div>
                    <span class="bg-blue-600/20 text-blue-400 text-[9px] px-2.5 py-1 rounded-full font-black uppercase tracking-tighter border border-blue-500/20">Itens</span>
                </div>
                
                <div id="services-container" class="space-y-4"></div>
                <datalist id="lista_servicos"></datalist>

                <button onclick="adicionarServico()" class="btn-add-item">
                    <i class="fa-solid fa-circle-plus mr-2 text-blue-500"></i> ADICIONAR ITEM
                </button>
            </div>

            <div id="sec-custos" class="space-y-4">
                <div class="section-header">
                    <i class="fa-solid fa-calculator"></i>
                    <span id="label-total">Total do Serviço</span>
                </div>
                <div class="bg-blue-600/5 p-5 rounded-3xl border border-blue-500/10">
                    <div class="flex items-center gap-3">
                        <span class="text-xl font-black text-white/20">R$</span>
                        <input type="text" id="totalFinal" placeholder="0,00" class="w-full bg-transparent border-none text-2xl font-black text-white focus:outline-none" readonly>
                    </div>
                </div>
            </div>

            <button onclick="gerarDocumento()" id="btn-acao" class="w-full btn-primary text-white py-5 rounded-2xl font-black text-base uppercase tracking-widest flex items-center justify-center gap-3">
                Gerar Orçamento <i class="fa-solid fa-arrow-right"></i>
            </button>
        </main>
    </div>

    <datalist id="lista_clientes"></datalist>

    <script>
        const URL_DATABASE = "https://script.google.com/macros/s/AKfycbwXxgwoZ5Qov5xGUN9CMQnCOqsS4HL2gJdGtaPad9Df8ShuykbMUzq3_jKlb-0gLMju8Q/exec";
        let cacheDados = [];
        let modoOS = false;

        function forcarLista(input) {
            input.setAttribute('autocomplete', 'off');
            const valOriginal = input.value;
            input.value = '';
            setTimeout(() => {
                input.value = valOriginal;
            }, 1);
        }

        async function buscarDadosPlanilha() {
            try {
                const resp = await fetch(URL_DATABASE);
                cacheDados = await resp.json();
                renderizarDatalists();
                configurarAutoPreenchimento();
            } catch (e) { console.error("Erro ao carregar banco:", e); }
        }

        function renderizarDatalists() {
            const criarOpcoes = (campo) => [...new Set(cacheDados.map(d => d[campo]))].filter(Boolean).map(n => `<option value="${n}">`).join('');
            document.getElementById('lista_clientes').innerHTML = criarOpcoes('cli_nome');
            document.getElementById('lista_servicos').innerHTML = criarOpcoes('srv_nome');
            if(cacheDados.length > 0 && cacheDados[0].emp_nome) {
                document.getElementById('nomePrestador').value = cacheDados[0].emp_nome;
            }
        }

        function configurarAutoPreenchimento() {
            document.getElementById('nomeCliente').addEventListener('input', function() {
                const valorAtual = this.value;
                if (!valorAtual || valorAtual.trim() === "") {
                    document.getElementById('enderecoCliente').value = "";
                    document.getElementById('telCliente').value = "";
                    return;
                }
                const encontrado = cacheDados.find(x => x.cli_nome === valorAtual);
                if (encontrado) {
                    document.getElementById('enderecoCliente').value = encontrado.cli_end || "";
                    document.getElementById('telCliente').value = encontrado.cli_tel || "";
                }
            });
        }

        function adicionarServico() {
            const container = document.getElementById('services-container');
            const div = document.createElement('div');
            div.className = "service-card flex flex-col gap-3";
            div.innerHTML = `
                <div class="flex items-center gap-2">
                    <div class="relative flex-grow">
                        <input type="text" list="lista_servicos" placeholder="Selecionar Serviço" class="w-full dark-input p-3 rounded-xl text-sm outline-none service-name" onmousedown="forcarLista(this)">
                        <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-white/10 pointer-events-none text-[10px]"></i>
                    </div>
                    <button onclick="this.closest('.service-card').remove(); atualizarSoma();" class="text-white/10 hover:text-red-500 p-2"><i class="fa-solid fa-trash-can"></i></button>
                </div>
                <div class="flex items-center gap-2">
                    <div class="flex-grow relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-white/20 font-bold text-xs">R$</span>
                        <input type="text" placeholder="0,00" class="w-full dark-input pl-9 p-3 rounded-xl text-sm service-price" onkeyup="formatarMoeda(this)">
                    </div>
                    <div class="flex items-center bg-white/5 border border-white/5 rounded-xl p-1 gap-3">
                        <button onclick="alterarQtde(this, -1)" class="qty-btn"><i class="fa-solid fa-minus text-[10px]"></i></button>
                        <span class="font-bold text-sm service-qty w-4 text-center">1</span>
                        <button onclick="alterarQtde(this, 1)" class="qty-btn"><i class="fa-solid fa-plus text-[10px]"></i></button>
                    </div>
                </div>
            `;
            container.appendChild(div);

            const inputSrv = div.querySelector('.service-name');
            inputSrv.addEventListener('input', function() {
                const item = cacheDados.find(x => x.srv_nome === this.value);
                if (item) {
                    const precoInput = div.querySelector('.service-price');
                    let valor = item.srv_valor.toString().replace("R$", "").replace(".", "").replace(",", ".").trim();
                    precoInput.value = (parseFloat(valor) || 0).toLocaleString('pt-BR', {minimumFractionDigits: 2});
                    atualizarSoma();
                }
            });
        }

        function formatarMoeda(i) {
            let v = i.value.replace(/\D/g, "");
            v = (v / 100).toFixed(2).replace(".", ",");
            v = v.replace(/(\d)(?=(\d{3})+(?!\d))/g, "$1.");
            i.value = v;
            atualizarSoma(); 
        }

        function atualizarSoma() {
            let total = 0;
            document.querySelectorAll('.service-card').forEach(card => {
                let precoStr = card.querySelector('.service-price').value.replace(/\./g, "").replace(",", ".");
                let preco = parseFloat(precoStr) || 0;
                let qtde = parseInt(card.querySelector('.service-qty').innerText) || 1;
                total += (preco * qtde);
            });
            document.getElementById('totalFinal').value = total.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
        }

        function alterarQtde(btn, delta) {
            const span = btn.parentElement.querySelector('.service-qty');
            let val = parseInt(span.innerText) + delta;
            if (val < 1) val = 1;
            span.innerText = val;
            atualizarSoma();
        }

        function alternarModo() {
            modoOS = !modoOS;
            const card = document.getElementById('card-principal');
            const thumb = document.getElementById('toggleMode');
            const subTitle = document.getElementById('sub-title');
            const btnAcao = document.getElementById('btn-acao');
            const lblDados = document.getElementById('label-dados');
            
            // Alterar ícone do botão adicionar conforme o modo
            const btnAddIcon = document.querySelector('.btn-add-item i');

            if (modoOS) {
                thumb.classList.add('mode-os'); card.classList.add('is-os');
                subTitle.innerText = "Ordem de Serviço (OS)";
                btnAcao.innerHTML = 'Finalizar Ordem de Serviço <i class="fa-solid fa-check-double"></i>';
                lblDados.innerText = "Dados da Ordem de Serviço";
                document.getElementById('lbl-os').classList.add('active-label');
                document.getElementById('lbl-orc').classList.remove('active-label');
                document.getElementById('campo-termino').classList.remove('hidden');
                document.getElementById('campo-hora').classList.add('hidden');
                btnAddIcon.className = "fa-solid fa-circle-plus mr-2 text-green-500";
            } else {
                thumb.classList.remove('mode-os'); card.classList.remove('is-os');
                subTitle.innerText = "Sistema de Orçamento";
                btnAcao.innerHTML = 'Gerar Orçamento <i class="fa-solid fa-arrow-right"></i>';
                lblDados.innerText = "Dados do Orçamento";
                document.getElementById('lbl-orc').classList.add('active-label');
                document.getElementById('lbl-os').classList.remove('active-label');
                document.getElementById('campo-termino').classList.add('hidden');
                document.getElementById('campo-hora').classList.remove('hidden');
                btnAddIcon.className = "fa-solid fa-circle-plus mr-2 text-blue-500";
            }
        }

        window.onload = () => {
            const agora = new Date();
            document.getElementById('dataInicio').value = agora.toISOString().split('T')[0];
            document.getElementById('dataFim').value = agora.toISOString().split('T')[0];
            document.getElementById('horaAtual').value = String(agora.getHours()).padStart(2, '0') + ":" + String(agora.getMinutes()).padStart(2, '0');
            buscarDadosPlanilha();
            adicionarServico();
        };
    </script>
</body>
</html>
