<!DOCTYPE html>
<html lang="pt-br">
<head>
    <script>
        // Verificação inicial de segurança do sistema geral
        if (localStorage.getItem("inforos_logado") !== "true") {
            window.location.href = "https://refrigeracaoeliezer.github.io/site/";
        }
    </script>

    <meta charset="UTF-8">
    <title>Configurações | Refrigeração</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: #0d1117;
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Camada de Login */
        #overlay-login {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0d1117;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid rgba(30, 64, 175, 0.3);
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .hidden { display: none !important; }

        .background-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            background: rgba(30, 64, 175, 0.15);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            top: 10%;
        }

        .container { 
            width: 100%; 
            max-width: 600px;
        }

        h1 { font-size: 28px; font-weight: 700; margin-bottom: 30px; text-align: center; }

        .config-section {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 10px;
        }

        .section-title i { color: #27a9e3; }

        .logo-preview {
            width: 100px; height: 100px;
            border-radius: 15px;
            background: rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 10px auto;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }
        .logo-preview img { width: 100%; height: 100%; object-fit: contain; }

        .grid-inputs { display: grid; grid-template-columns: 1fr; gap: 15px; }

        .input-group { display: flex; flex-direction: column; gap: 6px; width: 100%; text-align: left; }
        .input-group label { font-size: 11px; color: rgba(255, 255, 255, 0.5); text-transform: uppercase; font-weight: 700; }
        
        input, textarea {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 12px;
            color: white;
            font-size: 14px;
            width: 100%;
        }

        .btn-save {
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            background: #1e40af;
            color: white;
            cursor: pointer;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-save:hover { background: #2563eb; }

        .link-auth { color: #27a9e3; text-decoration: none; font-size: 13px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="overlay-login">
        <div class="login-card" id="card-login">
            <i class="fa-solid fa-lock" style="font-size: 40px; color: #1e40af; margin-bottom: 20px;"></i>
            <h2 style="margin-bottom: 20px;">Acesso às Configurações</h2>
            <input type="email" id="user_email" placeholder="E-mail" style="margin-bottom: 10px;">
            <input type="password" id="user_pass" placeholder="Senha" style="margin-bottom: 15px;">
            <button class="btn-save" onclick="realizarLogin()">Entrar</button>
            <p style="margin-top: 20px;">
                <span class="link-auth" onclick="alternarTela('registrar')">Criar Conta</span> | 
                <span class="link-auth" onclick="alternarTela('recuperar')" style="color:#ff4b4b">Recuperar Senha</span>
            </p>
        </div>

        <div class="login-card hidden" id="card-registrar">
            <h2>Novo Registro</h2>
            <div style="margin-top:15px">
                <input type="email" id="reg_email" placeholder="Seu melhor e-mail" style="margin-bottom: 10px;">
                <input type="password" id="reg_pass" placeholder="Defina uma senha" style="margin-bottom: 10px;">
                <input type="text" id="reg_pergunta" placeholder="Pergunta de Segurança (Ex: Nome do Pet?)" style="margin-bottom: 10px;">
                <input type="text" id="reg_resposta" placeholder="Sua Resposta" style="margin-bottom: 15px;">
                <button class="btn-save" onclick="registrarUsuario()">Cadastrar</button>
                <p style="margin-top:15px" class="link-auth" onclick="alternarTela('login')">Voltar ao Login</p>
            </div>
        </div>

        <div class="login-card hidden" id="card-recuperar">
            <h2>Recuperar Senha</h2>
            <p style="font-size: 12px; color: rgba(255,255,255,0.5); margin: 10px 0;">Informe seu e-mail e a resposta de segurança cadastrada.</p>
            <input type="email" id="rec_email" placeholder="E-mail cadastrado" style="margin-bottom: 10px;">
            <input type="text" id="rec_resposta" placeholder="Sua Resposta de Segurança" style="margin-bottom: 15px;">
            <button class="btn-save" onclick="recuperarSenha()">Verificar</button>
            <p style="margin-top:15px" class="link-auth" onclick="alternarTela('login')">Voltar ao Login</p>
        </div>
    </div>

    <div class="background-glow"></div>

    <div class="container">
        <h1>Configurações</h1>

        <div class="config-section">
            <div class="section-title"><i class="fa-solid fa-image"></i> Logo da Empresa</div>
            <div class="logo-preview" id="logoPreview">
                <i class="fa-solid fa-camera" style="font-size: 30px; color: rgba(255,255,255,0.1);"></i>
            </div>
            <input type="file" id="logoInput" accept="image/*" onchange="previewImage(this)">
            <button class="btn-save" onclick="saveData('logo')"><i class="fa-solid fa-floppy-disk"></i> Salvar Logo</button>
        </div>

        <div class="config-section">
            <div class="section-title"><i class="fa-solid fa-building"></i> Identidade da Empresa</div>
            <div class="grid-inputs">
                <div class="input-group">
                    <label>Nome Fantasia</label>
                    <input type="text" id="emp_nome" list="lista_empresas" placeholder="Buscar ou digitar...">
                    <datalist id="lista_empresas"><option value="Refrigeração Eliezer"></datalist>
                </div>
                <div class="input-group">
                    <label>CNPJ / CPF</label>
                    <input type="text" id="emp_doc">
                </div>
            </div>
            <button class="btn-save" onclick="saveData('empresa')"><i class="fa-solid fa-floppy-disk"></i> Salvar Empresa</button>
        </div>

        <div class="config-section">
            <div class="section-title"><i class="fa-solid fa-gears"></i> Detalhes do Serviço</div>
            <div class="grid-inputs">
                <div class="input-group">
                    <label>Descrição</label>
                    <input type="text" id="srv_nome" list="lista_servicos" placeholder="Ex: Higienização...">
                    <datalist id="lista_servicos">
                        <option value="Higienização de Ar Condicionado">
                        <option value="Carga de Gás">
                    </datalist>
                </div>
                <div class="input-group">
                    <label>Valor (R$)</label>
                    <input type="number" id="srv_valor" placeholder="0.00">
                </div>
            </div>
            <button class="btn-save" onclick="saveData('servico')"><i class="fa-solid fa-floppy-disk"></i> Salvar Serviço</button>
        </div>

        <div class="config-section">
            <div class="section-title"><i class="fa-solid fa-user"></i> Dados do Cliente</div>
            <div class="grid-inputs">
                <div class="input-group"><label>Nome</label><input type="text" id="cli_nome" list="lista_clientes"></div>
                <div class="input-group"><label>CPF/CNPJ</label><input type="text" id="cli_doc"></div>
                <div class="input-group"><label>WhatsApp</label><input type="tel" id="cli_tel"></div>
                <div class="input-group"><label>Endereço</label><input type="text" id="cli_end"></div>
            </div>
            <button class="btn-save" onclick="saveData('cliente')"><i class="fa-solid fa-floppy-disk"></i> Salvar Cliente</button>
        </div>

        <div class="config-section">
            <div class="section-title"><i class="fa-solid fa-clipboard-list"></i> Observações Técnicas</div>
            <div class="grid-inputs">
                <div class="input-group">
                    <label>Puxar Modelo</label>
                    <input type="text" id="obs_busca" list="lista_obs" placeholder="Garantia, Checklist..." oninput="checkObsSelection()">
                    <datalist id="lista_obs">
                        <option value="Garantia Padrão (90 dias)">
                        <option value="Checklist de Manutenção">
                    </datalist>
                </div>
                <textarea id="txt_obs" rows="5" placeholder="Edite o texto aqui..."></textarea>
            </div>
            <button class="btn-save" onclick="saveData('obs')"><i class="fa-solid fa-floppy-disk"></i> Salvar Observações</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "SUA_URL_DO_APPS_SCRIPT_AQUI";

        // --- SISTEMA DE AUTH ---
        function alternarTela(tela) {
            document.getElementById('card-login').classList.add('hidden');
            document.getElementById('card-registrar').classList.add('hidden');
            document.getElementById('card-recuperar').classList.add('hidden');
            if(tela === 'login') document.getElementById('card-login').classList.remove('hidden');
            if(tela === 'registrar') document.getElementById('card-registrar').classList.remove('hidden');
            if(tela === 'recuperar') document.getElementById('card-recuperar').classList.remove('hidden');
        }

        async function realizarLogin() {
            const email = document.getElementById('user_email').value;
            const pass = document.getElementById('user_pass').value;
            if(!email || !pass) return alert("Preencha tudo!");

            const resp = await fetch(`${SCRIPT_URL}?action=login&email=${email}&senha=${pass}`);
            const result = await resp.text();
            
            if(result === "logado") {
                document.getElementById('overlay-login').style.display = 'none';
                sessionStorage.setItem("config_auth", "true");
            } else {
                alert("Acesso Negado!");
            }
        }

        async function registrarUsuario() {
            const email = document.getElementById('reg_email').value;
            const pass = document.getElementById('reg_pass').value;
            const perg = document.getElementById('reg_pergunta').value;
            const resp_sec = document.getElementById('reg_resposta').value;

            await fetch(`${SCRIPT_URL}?action=registrar&email=${email}&senha=${pass}&pergunta=${perg}&resposta=${resp_sec}`);
            alert("Sucesso! Faça login.");
            alternarTela('login');
        }

        async function recuperarSenha() {
            const email = document.getElementById('rec_email').value;
            const resposta = document.getElementById('rec_resposta').value;
            const resp = await fetch(`${SCRIPT_URL}?action=recuperar&email=${email}&resposta=${resposta}`);
            alert(await resp.text());
        }

        if(sessionStorage.getItem("config_auth") === "true") {
            document.getElementById('overlay-login').style.display = 'none';
        }

        // --- SISTEMA DE CONFIGURAÇÕES ---
        function checkObsSelection() {
            const val = document.getElementById('obs_busca').value;
            const txt = document.getElementById('txt_obs');
            if(val === "Garantia Padrão (90 dias)") txt.value = "Garantia de 90 dias conforme CDC...";
            if(val === "Checklist de Manutenção") txt.value = "- Filtros limpos\n- Dreno livre...";
        }

        function previewImage(input) {
            const preview = document.getElementById('logoPreview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => preview.innerHTML = `<img src="${e.target.result}">`;
                reader.readAsDataURL(input.files[0]);
            }
        }

        function saveData(secao) {
            alert("Salvando " + secao + " no banco de dados...");
        }
    </script>
</body>
</html>
