<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard de Clientes | Eliezer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-body: #0d1117;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: white;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-body); color: var(--text-main); }
        .glass-card { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 25px; }
        .status-badge { padding: 4px 12px; border-radius: 50px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .em-garantia { background: rgba(16, 185, 129, 0.2); color: #10b981; border: 1px solid #10b981; }
        .fora-garantia { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid #ef4444; }
        .search-input { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: white; outline: none; }
        .item-servico { border-bottom: 1px dashed rgba(255,255,255,0.1); padding: 5px 0; }
    </style>
</head>
<body class="p-4 pb-10">

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-xl font-black uppercase tracking-tighter">Histórico de <span class="text-blue-500">Serviços</span></h1>
                <span class="text-[10px] text-blue-400 font-bold uppercase tracking-widest">Consulta de Garantia e Clientes</span>
            </div>
            <a href="index.html" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center border border-white/10">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
        </header>

        <div class="glass-card p-4 mb-6">
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-white/20"></i>
                <input type="text" id="inputBusca" onkeyup="filtrarHistorico()" placeholder="Buscar por cliente, CPF ou serviço..." class="w-full p-4 pl-12 rounded-2xl search-input font-semibold">
            </div>
        </div>

        <div id="container-historico" class="space-y-4">
            <div class="text-center py-10 text-white/20 font-bold uppercase tracking-widest text-xs">
                Carregando histórico...
            </div>
        </div>
    </div>

    <script>
        const URL_DATABASE = "https://script.google.com/macros/s/AKfycbwqx3ArERMt3QCGZhNQwTmG4UVM7LMY6AH_BXQB_JP_mFmDa7whdGcWcbHpxjQ-H3rIug/exec"; // Use a mesma URL da página anterior

        async function carregarDados() {
            try {
                const response = await fetch(URL_DATABASE);
                const dados = await response.json();
                renderizarCards(dados);
            } catch (error) {
                document.getElementById('container-historico').innerHTML = "Erro ao carregar dados.";
            }
        }

        function verificarGarantia(dataFimGarantia) {
            const hoje = new Date();
            // Converte data da planilha (DD/MM/YYYY) para objeto Date
            const partes = dataFimGarantia.split('/');
            const dataFim = new Date(partes[2], partes[1] - 1, partes[0]);
            
            return hoje <= dataFim;
        }

        function renderizarCards(lista) {
            const container = document.getElementById('container-historico');
            container.innerHTML = "";

            lista.forEach(os => {
                // LÓGICA DE SEPARAÇÃO DOS SERVIÇOS
                // Supondo que na planilha os serviços estejam salvos como "Serviço 1 | Serviço 2"
                const servicosArray = os.Tipo_de_servico.split('|');
                let htmlServicos = "";
                
                servicosArray.forEach(srv => {
                    htmlServicos += `<div class="item-servico text-xs text-white/70 italic">${srv.trim()}</div>`;
                });

                const estaNaGarantia = verificarGarantia(os.Data_fim_da_garantia);
                const badgeClass = estaNaGarantia ? "em-garantia" : "fora-garantia";
                const badgeText = estaNaGarantia ? "🟢 Em Garantia" : "🔴 Fora da Garantia";

                container.innerHTML += `
                    <div class="glass-card p-6 card-item">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <span class="text-[10px] font-black text-blue-500 uppercase tracking-widest">OS #${os.ID_OS}</span>
                                <h2 class="text-lg font-bold nome-cliente">${os.Cliente}</h2>
                                <p class="text-[10px] text-white/40 uppercase font-bold">${os.Endereco}</p>
                            </div>
                            <span class="status-badge ${badgeClass}">${badgeText}</span>
                        </div>
                        
                        <div class="bg-white/5 rounded-xl p-4 mb-4">
                            <span class="text-[9px] font-black text-white/30 uppercase block mb-2">Serviços Executados:</span>
                            ${htmlServicos}
                        </div>

                        <div class="grid grid-cols-2 gap-4 text-[10px] font-bold uppercase">
                            <div>
                                <span class="text-white/30 block">Técnico</span>
                                <span>${os.Tecnico_responsavel}</span>
                            </div>
                            <div>
                                <span class="text-white/30 block">Fim da Garantia</span>
                                <span class="${estaNaGarantia ? 'text-green-400' : 'text-red-400'}">${os.Data_fim_da_garantia}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function filtrarHistorico() {
            const termo = document.getElementById('inputBusca').value.toLowerCase();
            const cards = document.querySelectorAll('.card-item');
            
            cards.forEach(card => {
                const texto = card.innerText.toLowerCase();
                card.style.display = texto.includes(termo) ? 'block' : 'none';
            });
        }

        window.onload = carregarDados;
    </script>
</body>
</html>
