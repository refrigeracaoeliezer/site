<!DOCTYPE html>
<html lang="pt-br">
<head>
    <script>
        if (localStorage.getItem("inforos_logado") !== "true") {
            window.location.href = "https://refrigeracaoeliezer.github.io/site/";
        }
    </script>

    <meta charset="UTF-8">
    <title>Configurações | Refrigeração</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: #0d1117;
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden; /* Evita rolagem lateral */
        }

        .background-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            background: rgba(30, 64, 175, 0.15);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            top: 10%;
        }

        .container { 
            width: 100%; 
            max-width: 600px; /* Reduzi para ficar mais compacto */
        }

        h1 { 
            font-size: 28px; 
            font-weight: 700; 
            margin-bottom: 30px; 
            text-align: center;
            color: white;
        }

        .config-section {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            width: 100%;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            gap: 10px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title i { color: #27a9e3; }

        /* Estilo da Logo em Cima */
        .logo-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
        }

        .logo-preview {
            width: 120px;
            height: 120px;
            border-radius: 15px;
            background: rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }
        
        .logo-preview img { width: 100%; height: 100%; object-fit: contain; }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr; /* Coluna única para mobile por padrão */
            gap: 15px;
        }

        .input-group { display: flex; flex-direction: column; gap: 6px; width: 100%; }
        .input-group label { font-size: 11px; color: rgba(255, 255, 255, 0.5); text-transform: uppercase; font-weight: 700; }
        
        input, textarea {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 12px;
            color: white;
            font-size: 14px;
            width: 100%; /* Garante que não vaze */
            transition: 0.3s;
        }

        input:focus { border-color: #27a9e3; outline: none; }

        .btn-save {
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: 600;
            background: #1e40af;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: auto;
        }

        /* Ajustes para Telas Pequenas */
        @media (max-width: 480px) {
            .section-header { flex-direction: column; align-items: flex-start; }
            .btn-save { width: 100%; margin-top: 10px; }
            h1 { font-size: 22px; }
            .config-section { padding: 15px; }
        }
    </style>
</head>
<body>

    <div class="background-glow"></div>

    <div class="container">
        <h1>Configurações</h1>

        <div class="config-section">
            <div class="section-header">
                <div class="section-title"><i class="fa-solid fa-image"></i> Logo da Empresa</div>
                <button class="btn-save" onclick="saveData('logo')">Salvar</button>
            </div>
            <div class="logo-box">
                <div class="logo-preview" id="logoPreview">
                    <i class="fa-solid fa-camera opacity-20" style="font-size: 30px; color: rgba(255,255,255,0.2);"></i>
                </div>
                <input type="file" id="logoInput" accept="image/*" onchange="previewImage(this)">
            </div>
        </div>

        <div class="config-section">
            <div class="section-header">
                <div class="section-title"><i class="fa-solid fa-building"></i> Identidade da Empresa</div>
                <button class="btn-save" onclick="saveData('empresa')">Salvar</button>
            </div>
            <div class="grid-inputs">
                <div class="input-group">
                    <label>Nome Fantasia</label>
                    <input type="text" id="emp_nome" list="lista_empresas" placeholder="Buscar ou digitar...">
                    <datalist id="lista_empresas">
                        <option value="Refrigeração Eliezer">
                    </datalist>
                </div>
                <div class="input-group">
                    <label>CNPJ / CPF</label>
                    <input type="text" id="emp_doc">
                </div>
            </div>
        </div>

        <div class="config-section">
            <div class="section-header">
                <div class="section-title"><i class="fa-solid fa-gears"></i> Detalhes do Serviço</div>
                <button class="btn-save" onclick="saveData('servico')">Salvar</button>
            </div>
            <div class="grid-inputs">
                <div class="input-group">
                    <label>Descrição do Serviço</label>
                    <input type="text" id="srv_nome" list="lista_servicos" placeholder="Buscar serviço...">
                    <datalist id="lista_servicos">
                        <option value="Higienização de Ar Condicionado">
                        <option value="Carga de Gás">
                    </datalist>
                </div>
                <div class="input-group">
                    <label>Valor (R$)</label>
                    <input type="number" id="srv_valor" placeholder="0.00">
                </div>
            </div>
        </div>

        <div class="config-section">
            <div class="section-header">
                <div class="section-title"><i class="fa-solid fa-user"></i> Dados do Cliente</div>
                <button class="btn-save" onclick="saveData('cliente')">Salvar</button>
            </div>
            <div class="grid-inputs">
                <div class="input-group">
                    <label>Nome do Cliente</label>
                    <input type="text" id="cli_nome" list="lista_clientes" placeholder="Buscar cliente...">
                    <datalist id="lista_clientes">
                        <option value="João Silva">
                    </datalist>
                </div>
                <div class="input-group">
                    <label>CPF / CNPJ</label>
                    <input type="text" id="cli_doc">
                </div>
                <div class="input-group">
                    <label>WhatsApp</label>
                    <input type="tel" id="cli_tel">
                </div>
                <div class="input-group">
                    <label>Endereço</label>
                    <input type="text" id="cli_end">
                </div>
            </div>
        </div>

        <div class="config-section">
            <div class="section-header">
                <div class="section-title"><i class="fa-solid fa-clipboard-list"></i> Observações Técnicas</div>
                <button class="btn-save" onclick="saveData('obs')">Salvar</button>
            </div>
            <textarea id="txt_obs" rows="4" placeholder="Detalhes técnicos..."></textarea>
        </div>

        <p style="text-align: center; color: rgba(255,255,255,0.1); font-size: 10px; margin-bottom: 30px;">
            CONSOLE DE CONFIGURAÇÃO V2.3
        </p>
    </div>

    <script>
        function previewImage(input) {
            const preview = document.getElementById('logoPreview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => preview.innerHTML = `<img src="${e.target.result}">`;
                reader.readAsDataURL(input.files[0]);
            }
        }

        function saveData(secao) {
            alert("Dados de " + secao + " salvos!");
        }
    </script>
</body>
</html>
