<!DOCTYPE html>
<html lang="pt-br">
<head>
    <script>
    if (localStorage.getItem("inforos_logado") !== "true") {
        window.location.replace("https://refrigeracaoeliezer.github.io/site/");
    }
    </script>

    <meta charset="UTF-8">
    <title>Orçamento | Profissional</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; min-height: 100vh; background: #0d1117; color: white; position: relative; overflow-x: hidden; -webkit-font-smoothing: antialiased; }

        .corner-ball { position: fixed; background: rgba(30, 64, 175, 0.1); border-radius: 50%; z-index: 0; pointer-events: none; filter: blur(80px); }
        .ball-top-right { width: 400px; height: 400px; top: -100px; right: -100px; }
        .ball-bottom-left { width: 300px; height: 300px; bottom: -100px; left: -100px; }

        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-top: 4px solid #1e40af; border-radius: 30px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); transition: all 0.5s ease; }

        .is-os { border-top-color: #10b981 !important; }
        .is-os .text-blue-500, .is-os .text-blue-400, .is-os .section-header i, .is-os .section-header span { color: #10b981 !important; }
        .is-os .btn-primary { background: linear-gradient(135deg, #065f46 0%, #10b981 100%) !important; }

        .dark-input { background: rgba(255, 255, 255, 0.05) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; transition: all 0.3s ease; cursor: pointer; }
        .dark-input:focus { border-color: #3b82f6 !important; background: rgba(255, 255, 255, 0.08) !important; outline: none; }
        .is-os .dark-input:focus { border-color: #10b981 !important; }

        .service-card { background: rgba(255, 255, 255, 0.02); border-radius: 20px; padding: 15px; border: 1px solid rgba(255, 255, 255, 0.08); }
        .qty-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 8px; background: rgba(255, 255, 255, 0.05); color: #3b82f6; transition: 0.2s; border: 1px solid rgba(59, 130, 246, 0.2); }
        
        .section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .section-header i { font-size: 14px; color: #3b82f6; }
        .section-header span { font-size: 11px; font-weight: 800; color: #3b82f6; text-transform: uppercase; letter-spacing: 0.5px; }

        .btn-primary { background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); transition: transform 0.2s; box-shadow: 0 10px 20px -5px rgba(30, 64, 175, 0.5); }
        .btn-primary:active { transform: scale(0.95); }

        .btn-add-item { width: 100%; padding: 1rem; border: 2px dashed rgba(59, 130, 246, 0.5); border-radius: 1.25rem; color: white; font-weight: 700; font-size: 0.75rem; transition: all 0.3s; background: rgba(59, 130, 246, 0.05); }
        .is-os .btn-add-item { border-color: rgba(16, 185, 129, 0.5); background: rgba(16, 185, 129, 0.05); }

        #obsGeral { overflow: hidden; resize: none; min-height: 100px; transition: min-height 0.2s ease; }

        /* MODAL POPUP */
        #modal-mensagens { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(13, 17, 23, 0.95); backdrop-filter: blur(10px); 
            z-index: 100; overflow-y: auto; display: none; padding: 20px;
        }
        .msg-ready { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 25px; padding: 20px; margin-bottom: 20px; }
        .msg-text-box { 
            background: #000; border-radius: 15px; padding: 15px; 
            font-family: monospace; font-size: 13px; color: #d1d1d1; 
            white-space: pre-wrap; word-break: break-all; margin: 15px 0;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .switch { position: relative; display: inline-block; width: 100%; height: 44px; background: rgba(255,255,255,0.05); border-radius: 15px; padding: 4px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .switch-bg { position: absolute; top: 4px; left: 4px; width: calc(50% - 4px); height: calc(100% - 8px); background: #1e40af; border-radius: 12px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1; }
        .switch-labels { position: relative; display: flex; height: 100%; z-index: 2; align-items: center; font-size: 11px; font-weight: 800; text-transform: uppercase; }
        .switch-labels div { flex: 1; text-align: center; color: rgba(255,255,255,0.4); }
        .active-label { color: white !important; }
        .mode-os .switch-bg { left: 50%; background: #10b981; }

        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }

        /* ESTILO PARA O PDF (INVISÍVEL NA TELA) */
        #pdf-template { color: #333; padding: 40px; font-family: Arial, sans-serif; display: none; }
    </style>
</head>
<body class="p-4 pb-10">

    <div class="corner-ball ball-top-right"></div>
    <div class="corner-ball ball-bottom-left"></div>

    <div class="max-w-md mx-auto relative z-10" id="main-container">
        <div class="mb-6">
            <div class="switch" id="toggleMode" onclick="alternarModo()">
                <div class="switch-bg" id="switch-thumb"></div>
                <div class="switch-labels">
                    <div id="lbl-orc" class="active-label">Orçamento</div>
                    <div id="lbl-os">Ordem de Serviço</div>
                </div>
            </div>
        </div>

        <header class="flex justify-between items-center mb-8 pt-4">
            <div>
                <h1 class="text-xl font-black tracking-tighter uppercase leading-none">
                    REFRIGERAÇÃO <span class="text-blue-500" id="header-name">ELIEZER</span>
                </h1>
                <span class="text-[10px] text-blue-400 font-bold uppercase tracking-widest" id="sub-title">Sistema de Orçamento</span>
            </div>
        </header>

        <main class="glass-card p-6 space-y-7" id="card-principal">
            <div id="sec-dados" class="space-y-4">
                <div class="section-header">
                    <i class="fa-solid fa-user-gear"></i>
                    <span>Dados do Orçamento</span>
                </div>
                <div class="space-y-3">
                    <input type="text" id="nomePrestador" placeholder="Sua Empresa" class="w-full p-4 rounded-2xl dark-input text-sm font-semibold outline-none">
                    <div class="relative">
                        <input type="text" id="nomeCliente" list="lista_clientes" placeholder="Selecionar Cliente" class="w-full p-4 rounded-2xl dark-input text-sm font-semibold outline-none" onmousedown="forcarLista(this)">
                        <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-white/10 pointer-events-none text-xs"></i>
                    </div>
                    <input type="text" id="enderecoCliente" placeholder="Endereço Completo" class="w-full p-4 rounded-2xl dark-input text-sm font-semibold outline-none">
                    <input type="tel" id="telCliente" placeholder="(DD) 9XXXX-XXXX" class="w-full p-4 rounded-2xl dark-input text-sm font-semibold outline-none">
                    
                    <div class="grid grid-cols-2 gap-2 pt-2">
                        <div class="space-y-1">
                            <label class="text-[9px] font-bold text-white/30 uppercase ml-2">Início</label>
                            <input type="date" id="dataInicio" class="w-full p-3 rounded-xl dark-input text-[11px] font-bold text-center" onchange="calcularDataFinal()">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[9px] font-bold text-white/30 uppercase ml-2">Final</label>
                            <input type="date" id="dataPrazoFinal" class="w-full p-3 rounded-xl dark-input text-[11px] font-bold text-center" readonly>
                        </div>
                    </div>

                    <div class="relative pt-4">
                        <input type="number" id="inputGarantia" value="30" class="w-full p-4 rounded-2xl dark-input text-sm font-bold text-center" oninput="calcularDataFinal()">
                        <span id="label-prazo" class="absolute -top-1 left-1/2 -translate-x-1/2 bg-blue-600 text-[8px] px-2 py-0.5 rounded text-white font-black tracking-widest uppercase shadow-lg">Vencimento</span>
                        <span class="absolute right-4 top-1/2 -translate-y-1/2 mt-2 text-[10px] text-white/20 font-black">DIAS</span>
                    </div>
                </div>
            </div>

            <div id="sec-servicos" class="space-y-4">
                <div class="section-header">
                    <i class="fa-solid fa-screwdriver-wrench"></i>
                    <span>Serviços Realizados</span>
                </div>
                <div id="services-container" class="space-y-4"></div>
                <button onclick="adicionarServico()" class="btn-add-item">
                    <i id="btn-add-icon" class="fa-solid fa-circle-plus mr-2 text-blue-500"></i> ADICIONAR ITEM
                </button>

                <div class="space-y-2 pt-2">
                    <div class="relative">
                        <input type="text" id="busca_obs" list="lista_obs" placeholder="Pesquisar observação salva..." class="w-full p-3 rounded-xl dark-input text-xs outline-none" onmousedown="forcarLista(this)">
                        <i class="fa-solid fa-magnifying-glass absolute right-4 top-1/2 -translate-y-1/2 text-white/10 pointer-events-none text-[10px]"></i>
                    </div>
                    <textarea id="obsGeral" placeholder="Escreva os detalhes técnicos..." class="w-full p-4 rounded-2xl dark-input text-sm outline-none" oninput="autoExpandir(this)"></textarea>
                </div>
            </div>

            <div id="sec-custos" class="space-y-4">
                <div class="section-header">
                    <i class="fa-solid fa-calculator"></i>
                    <span>Total do Serviço</span>
                </div>
                <div class="bg-blue-600/5 p-5 rounded-3xl border border-blue-500/10">
                    <div class="flex items-center gap-3">
                        <span class="text-xl font-black text-white/20">R$</span>
                        <input type="text" id="totalFinal" value="0,00" class="w-full bg-transparent border-none text-2xl font-black text-white focus:outline-none" readonly>
                    </div>
                </div>
            </div>

            <button onclick="gerarDocumento()" id="btn-acao" class="w-full btn-primary text-white py-5 rounded-2xl font-black text-base uppercase tracking-widest flex items-center justify-center gap-3">
                Gerar Orçamento <i class="fa-solid fa-arrow-right"></i>
            </button>
        </main>
    </div>

    <div id="modal-mensagens">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-xl font-black uppercase tracking-tighter">Mensagens <span class="text-blue-500">Prontas</span></h2>
                <button onclick="fecharModal()" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center border border-white/10">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <div class="msg-ready">
                <div class="flex items-center gap-3 mb-2">
                    <span class="w-6 h-6 rounded-full bg-blue-600 flex items-center justify-center text-[10px] font-bold">1</span>
                    <span class="text-xs font-bold uppercase">Proposta</span>
                </div>
                <div id="txt-proposta" class="msg-text-box"></div>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="copiarTexto('txt-proposta')" class="py-3 bg-white/5 text-white/70 rounded-xl font-bold text-[9px] uppercase">COPIAR</button>
                    <button onclick="baixarPDF()" class="py-3 bg-red-600/20 text-red-500 border border-red-500/30 rounded-xl font-bold text-[9px] uppercase">GERAR PDF</button>
                    <button onclick="enviarWpp('txt-proposta')" class="py-3 bg-blue-600 text-white rounded-xl font-bold text-[9px] uppercase">WHATSAPP</button>
                </div>
            </div>

            <div class="msg-ready">
                <div class="flex items-center gap-3 mb-2">
                    <span class="w-6 h-6 rounded-full bg-orange-600 flex items-center justify-center text-[10px] font-bold">2</span>
                    <span class="text-xs font-bold uppercase">Sinal</span>
                </div>
                <div id="txt-sinal" class="msg-text-box"></div>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="copiarTexto('txt-sinal')" class="py-3 bg-white/5 text-white/70 rounded-xl font-bold text-[10px] uppercase">COPIAR</button>
                    <button onclick="enviarWpp('txt-sinal')" class="py-3 bg-orange-600 text-white rounded-xl font-bold text-[10px] uppercase">WHATSAPP</button>
                </div>
            </div>

            <div class="msg-ready">
                <div class="flex items-center gap-3 mb-2">
                    <span class="w-6 h-6 rounded-full bg-green-600 flex items-center justify-center text-[10px] font-bold">3</span>
                    <span class="text-xs font-bold uppercase">Conclusão</span>
                </div>
                <div id="txt-conclusao" class="msg-text-box"></div>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="copiarTexto('txt-conclusao')" class="py-3 bg-white/5 text-white/70 rounded-xl font-bold text-[10px] uppercase">COPIAR</button>
                    <button onclick="enviarWpp('txt-conclusao')" class="py-3 bg-green-600 text-white rounded-xl font-bold text-[10px] uppercase">WHATSAPP</button>
                </div>
            </div>
            
            <p class="text-center text-[9px] text-white/20 uppercase font-bold mt-10">Refrigeração Eliezer v3.0</p>
        </div>
    </div>

    <div id="pdf-template"></div>

    <datalist id="lista_clientes"></datalist>
    <datalist id="lista_servicos"></datalist>
    <datalist id="lista_obs"></datalist>

    <script>
        const URL_DATABASE = "https://script.google.com/macros/s/AKfycbwXxgwoZ5Qov5xGUN9CMQnCOqsS4HL2gJdGtaPad9Df8ShuykbMUzq3_jKlb-0gLMju8Q/exec";
        let cacheDados = [];
        let modoOS = false;

        function forcarLista(input) {
            input.setAttribute('autocomplete', 'off');
            const valOriginal = input.value;
            input.value = '';
            setTimeout(() => { input.value = valOriginal; }, 1);
        }

        function autoExpandir(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';
        }

        function calcularDataFinal() {
            const dataInicioVal = document.getElementById('dataInicio').value;
            const diasPrazo = parseInt(document.getElementById('inputGarantia').value) || 0;
            const campoDataFinal = document.getElementById('dataPrazoFinal');
            if (dataInicioVal) {
                let data = new Date(dataInicioVal + 'T00:00:00');
                data.setDate(data.getDate() + diasPrazo);
                const y = data.getFullYear();
                const m = String(data.getMonth() + 1).padStart(2, '0');
                const d = String(data.getDate()).padStart(2, '0');
                campoDataFinal.value = `${y}-${m}-${d}`;
            }
        }

        async function buscarDadosPlanilha() {
            try {
                const resp = await fetch(URL_DATABASE);
                cacheDados = await resp.json();
                renderizarDatalists();
                configurarListeners();
                aplicarTextoPadrao();
                calcularDataFinal();
            } catch (e) { console.error("Erro na carga:", e); }
        }

        function renderizarDatalists() {
            const criarOpcoes = (campo) => [...new Set(cacheDados.map(d => d[campo]))].filter(Boolean).map(n => `<option value="${n}">`).join('');
            document.getElementById('lista_clientes').innerHTML = criarOpcoes('cli_nome');
            document.getElementById('lista_servicos').innerHTML = criarOpcoes('srv_nome');
            document.getElementById('lista_obs').innerHTML = criarOpcoes('txt_obs');
            if(cacheDados.length > 0 && cacheDados[0].emp_nome) {
                document.getElementById('nomePrestador').value = cacheDados[0].emp_nome;
            }
        }

        function configurarListeners() {
            document.getElementById('nomeCliente').addEventListener('input', function() {
                if (!this.value) {
                    document.getElementById('enderecoCliente').value = "";
                    document.getElementById('telCliente').value = "";
                    return;
                }
                const encontrado = cacheDados.find(x => x.cli_nome === this.value);
                if (encontrado) {
                    document.getElementById('enderecoCliente').value = encontrado.cli_end || "";
                    document.getElementById('telCliente').value = encontrado.cli_tel || "";
                }
            });
            document.getElementById('busca_obs').addEventListener('input', function() {
                const encontrado = cacheDados.find(x => x.txt_obs === this.value);
                if (encontrado) {
                    const txtArea = document.getElementById('obsGeral');
                    txtArea.value = encontrado.txt_obs;
                    autoExpandir(txtArea);
                    this.value = "";
                }
            });
        }

        function adicionarServico() {
            const container = document.getElementById('services-container');
            const div = document.createElement('div');
            div.className = "service-card flex flex-col gap-3";
            div.innerHTML = `
                <div class="flex items-center gap-2">
                    <div class="relative flex-grow">
                        <input type="text" list="lista_servicos" placeholder="Serviço ou Peça" class="w-full dark-input p-3 rounded-xl text-sm outline-none service-name" onmousedown="forcarLista(this)">
                        <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-white/10 pointer-events-none text-[10px]"></i>
                    </div>
                    <button onclick="this.closest('.service-card').remove(); atualizarSoma();" class="text-white/10 hover:text-red-500 p-2"><i class="fa-solid fa-trash-can"></i></button>
                </div>
                <div class="flex items-center gap-2">
                    <div class="flex-grow relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-white/20 font-bold text-xs">R$</span>
                        <input type="text" placeholder="0,00" class="w-full dark-input pl-9 p-3 rounded-xl text-sm service-price" onkeyup="formatarMoeda(this)">
                    </div>
                    <div class="flex items-center bg-white/5 border border-white/5 rounded-xl p-1 gap-3">
                        <button onclick="alterarQtde(this, -1)" class="qty-btn"><i class="fa-solid fa-minus text-[10px]"></i></button>
                        <span class="font-bold text-sm service-qty w-4 text-center">1</span>
                        <button onclick="alterarQtde(this, 1)" class="qty-btn"><i class="fa-solid fa-plus text-[10px]"></i></button>
                    </div>
                </div>
            `;
            container.appendChild(div);
            const inputSrv = div.querySelector('.service-name');
            inputSrv.addEventListener('input', function() {
                const item = cacheDados.find(x => x.srv_nome === this.value);
                if (item) {
                    const precoInput = div.querySelector('.service-price');
                    let valor = item.srv_valor.toString().replace("R$", "").replace(".", "").replace(",", ".").trim();
                    precoInput.value = (parseFloat(valor) || 0).toLocaleString('pt-BR', {minimumFractionDigits: 2});
                    atualizarSoma();
                }
            });
        }

        function formatarMoeda(i) {
            let v = i.value.replace(/\D/g, "");
            v = (v / 100).toFixed(2).replace(".", ",");
            v = v.replace(/(\d)(?=(\d{3})+(?!\d))/g, "$1.");
            i.value = v;
            atualizarSoma(); 
        }

        function atualizarSoma() {
            let total = 0;
            document.querySelectorAll('.service-card').forEach(card => {
                let precoStr = card.querySelector('.service-price').value.replace(/\./g, "").replace(",", ".");
                let preco = parseFloat(precoStr) || 0;
                let qtde = parseInt(card.querySelector('.service-qty').innerText) || 1;
                total += (preco * qtde);
            });
            document.getElementById('totalFinal').value = total.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
        }

        function alterarQtde(btn, delta) {
            const span = btn.parentElement.querySelector('.service-qty');
            let val = parseInt(span.innerText) + delta;
            if (val < 1) val = 1;
            span.innerText = val;
            atualizarSoma();
        }

        function formatarDataBR(dataISO) {
            if(!dataISO) return "--/--/----";
            const [y, m, d] = dataISO.split('-');
            return `${d}/${m}/${y}`;
        }

        function gerarDocumento() {
            const prestador = document.getElementById('nomePrestador').value || "ELIEZER";
            const cliente = document.getElementById('nomeCliente').value || "Cliente";
            const total = document.getElementById('totalFinal').value;
            const obs = document.getElementById('obsGeral').value;
            const dias = document.getElementById('inputGarantia').value;
            const dataFim = formatarDataBR(document.getElementById('dataPrazoFinal').value);
            
            let servicosTexto = "";
            document.querySelectorAll('.service-card').forEach(card => {
                const nome = card.querySelector('.service-name').value;
                const preco = card.querySelector('.service-price').value;
                const qtde = card.querySelector('.service-qty').innerText;
                if(nome) servicosTexto += `• ${qtde}x ${nome} - R$ ${preco}\n`;
            });

            const totalNum = parseFloat(total.replace(/\./g, "").replace(",", ".")) || 0;
            const sinalValor = (totalNum * 0.3).toLocaleString('pt-BR', {minimumFractionDigits: 2});
            const saldoValor = (totalNum * 0.7).toLocaleString('pt-BR', {minimumFractionDigits: 2});

            document.getElementById('txt-proposta').innerText = `*ORÇAMENTO TÉCNICO - ${prestador.toUpperCase()}*\n\nOlá ${cliente}! Segue o orçamento:\n\n*SERVIÇOS:*\n${servicosTexto}\n*OBS:*\n${obs}\n\n*INVESTIMENTO TOTAL:* R$ ${total}\n(Material + Mão de Obra incluso)\n\n*${modoOS ? 'Garantia' : 'Vencimento'}:* ${dias} dias\n*Data Prevista:* ${dataFim}\n\nFico no aguardo.`;

            document.getElementById('txt-sinal').innerText = `Olá ${cliente}! 🤝\n\nPara agendarmos dia *${dataFim}* e comprarmos material, precisamos de um sinal.\n\n*Sinal (30%): R$ ${sinalValor}*\n\nChave PIX: [SUA CHAVE]\n\nPor favor, envie o comprovante. Obrigado!`;

            document.getElementById('txt-conclusao').innerText = `*Serviço Concluído!* ✅\n\n${cliente}, equipamento pronto.\n\n*Saldo Restante:* R$ ${saldoValor}\n\nLembrando que você tem *${dias} dias* de garantia.\n\nObrigado pela preferência!\n${prestador}`;

            document.getElementById('modal-mensagens').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        /* FUNÇÃO PARA GERAR E BAIXAR O PDF */
        function baixarPDF() {
            const prestador = document.getElementById('nomePrestador').value || "ELIEZER";
            const cliente = document.getElementById('nomeCliente').value || "Cliente";
            const total = document.getElementById('totalFinal').value;
            const obs = document.getElementById('obsGeral').value;
            const dataFim = formatarDataBR(document.getElementById('dataPrazoFinal').value);
            const dias = document.getElementById('inputGarantia').value;
            
            let servicosHTML = "";
            document.querySelectorAll('.service-card').forEach(card => {
                const nome = card.querySelector('.service-name').value;
                const preco = card.querySelector('.service-price').value;
                const qtde = card.querySelector('.service-qty').innerText;
                if(nome) {
                    servicosHTML += `<tr>
                        <td style="padding: 10px; border-bottom: 1px solid #eee;">${qtde}x ${nome}</td>
                        <td style="padding: 10px; border-bottom: 1px solid #eee; text-align: right;">R$ ${preco}</td>
                    </tr>`;
                }
            });

            const template = `
                <div style="font-family: Arial, sans-serif; color: #333;">
                    <div style="text-align: center; border-bottom: 2px solid #1e40af; padding-bottom: 20px; margin-bottom: 20px;">
                        <h1 style="margin: 0; color: #1e40af;">REFRIGERAÇÃO ${prestador.toUpperCase()}</h1>
                        <p style="margin: 5px 0; font-size: 14px; color: #666;">Orçamento Técnico Profissional</p>
                    </div>
                    
                    <div style="margin-bottom: 20px;">
                        <p><strong>Cliente:</strong> ${cliente}</p>
                        <p><strong>Data:</strong> ${new Date().toLocaleDateString('pt-BR')}</p>
                    </div>

                    <table style="width: 100%; border-collapse: collapse; margin-bottom: 20px;">
                        <thead>
                            <tr style="background: #1e40af; color: white;">
                                <th style="padding: 10px; text-align: left;">Descrição do Serviço / Peça</th>
                                <th style="padding: 10px; text-align: right;">Valor</th>
                            </tr>
                        </thead>
                        <tbody>${servicosHTML}</tbody>
                    </table>

                    <div style="background: #f8fafc; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                        <p style="margin: 0; font-weight: bold; color: #1e40af;">Observações Técnicas:</p>
                        <p style="margin: 10px 0 0 0; white-space: pre-wrap; font-size: 13px;">${obs}</p>
                    </div>

                    <div style="text-align: right; border-top: 2px solid #eee; padding-top: 10px;">
                        <p style="font-size: 14px; margin: 5px 0;">${modoOS ? 'Garantia' : 'Vencimento'}: ${dias} dias</p>
                        <p style="font-size: 14px; margin: 5px 0;">Previsão: ${dataFim}</p>
                        <h2 style="color: #1e40af; margin: 10px 0;">Total: R$ ${total}</h2>
                    </div>
                    
                    <div style="margin-top: 40px; text-align: center; font-size: 12px; color: #999;">
                        <p>Este documento é uma proposta técnica de serviços.</p>
                    </div>
                </div>
            `;

            const element = document.getElementById('pdf-template');
            element.innerHTML = template;
            element.style.display = 'block';

            const opt = {
                margin: 10,
                filename: `Orcamento_${cliente.replace(/\s+/g, '_')}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                element.style.display = 'none';
            });
        }

        function fecharModal() {
            document.getElementById('modal-mensagens').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function copiarTexto(id) {
            const texto = document.getElementById(id).innerText;
            navigator.clipboard.writeText(texto).then(() => alert("Copiado!"));
        }

        function enviarWpp(id) {
            const texto = document.getElementById(id).innerText;
            const tel = document.getElementById('telCliente').value.replace(/\D/g, '');
            if(!tel) { alert("Informe o WhatsApp!"); return; }
            window.open(`https://api.whatsapp.com/send?phone=55${tel}&text=${encodeURIComponent(texto)}`, '_blank');
        }

        function alternarModo() {
            modoOS = !modoOS;
            const card = document.getElementById('card-principal');
            const thumb = document.getElementById('toggleMode');
            const subTitle = document.getElementById('sub-title');
            const btnAcao = document.getElementById('btn-acao');
            const lblPrazo = document.getElementById('label-prazo');
            aplicarTextoPadrao();
            if (modoOS) {
                thumb.classList.add('mode-os'); card.classList.add('is-os');
                subTitle.innerText = "Ordem de Serviço (OS)";
                btnAcao.innerHTML = 'Finalizar O.S <i class="fa-solid fa-check"></i>';
                lblPrazo.innerText = "Garantia";
                lblPrazo.classList.replace('bg-blue-600', 'bg-green-600');
            } else {
                thumb.classList.remove('mode-os'); card.classList.remove('is-os');
                subTitle.innerText = "Sistema de Orçamento";
                btnAcao.innerHTML = 'Gerar Orçamento <i class="fa-solid fa-arrow-right"></i>';
                lblPrazo.innerText = "Vencimento";
                lblPrazo.classList.replace('bg-green-600', 'bg-blue-600');
            }
            calcularDataFinal();
        }

        function aplicarTextoPadrao() {
            const txtArea = document.getElementById('obsGeral');
            const listaObsValidas = cacheDados.map(d => d.txt_obs).filter(Boolean);
            if (modoOS) { txtArea.value = ""; } else { txtArea.value = listaObsValidas[0] || ""; }
            autoExpandir(txtArea);
        }

        window.onload = () => {
            document.getElementById('dataInicio').value = new Date().toISOString().split('T')[0];
            buscarDadosPlanilha();
            adicionarServico();
        };
    </script>
</body>
</html>
