<!DOCTYPE html>
<html lang="pt-br">
<head>
    <script>
        if (localStorage.getItem("inforos_logado") !== "true") {
            window.location.href = "https://refrigeracaoeliezer.github.io/site/";
        }
    </script>
    <meta charset="UTF-8">
    <title>Configurações | Refrigeração</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; min-height: 100vh; background: #0d1117; color: white; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .hidden { display: none !important; }
        .container { width: 100%; max-width: 600px; }
        h1 { font-size: 28px; font-weight: 700; margin-bottom: 30px; text-align: center; color: #fff; }

        .config-section {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            flex-direction: column; gap: 15px;
        }

        .section-title { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding-bottom: 10px; color: #27a9e3; }
        input, textarea { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; padding: 12px; color: white; font-size: 14px; width: 100%; outline: none; }
        input:focus { border-color: #27a9e3; }
        
        input::placeholder { color: rgba(255,255,255,0.3); }

        .btn-save { border: none; padding: 14px; border-radius: 12px; font-weight: 700; background: #1e40af; color: white; cursor: pointer; width: 100%; display: flex; justify-content: center; align-items: center; gap: 10px; transition: 0.3s; }
        .btn-save:hover { background: #2563eb; }
        .btn-save:disabled { background: #2d3748; color: #718096; cursor: not-allowed; }

        #toast-minimal {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #27a9e3; color: white;
            padding: 15px 30px; border-radius: 50px;
            font-weight: 600; font-size: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none; z-index: 10000;
            animation: fadeInOut 2s ease forwards;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translate(-50%, -60%); }
            20% { opacity: 1; transform: translate(-50%, -50%); }
            80% { opacity: 1; transform: translate(-50%, -50%); }
            100% { opacity: 0; transform: translate(-50%, -40%); }
        }

        #overlay-login { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0d1117; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); padding: 30px; border-radius: 24px; border: 1px solid rgba(30, 64, 175, 0.3); width: 100%; max-width: 380px; text-align: center; }
    </style>
</head>
<body>

    <div id="toast-minimal">Salvo com sucesso!</div>

    <div id="overlay-login">
        <div class="login-card" id="card-login">
            <i class="fa-solid fa-lock" style="font-size: 40px; color: #1e40af; margin-bottom: 20px;"></i>
            <h2>Acesso Restrito</h2>
            <input type="text" id="auth_u_mail" placeholder="E-mail" style="margin-top: 20px;">
            <input type="password" id="auth_u_pass" placeholder="Senha" style="margin-top: 10px;">
            <button class="btn-save" onclick="realizarLogin()" style="margin-top: 15px;">Entrar</button>
        </div>
    </div>

    <div class="container hidden" id="main-content">
        <h1>Painel de Controle</h1>

        <div class="config-section">
            <div class="section-title"><i class="fa-solid fa-building"></i> Identidade da Empresa</div>
            <input type="text" id="emp_nome" list="lista_empresas" placeholder="Selecione a Empresa...">
            <datalist id="lista_empresas"></datalist>
            <input type="text" id="emp_doc" placeholder="CNPJ / CPF">
            <button class="btn-save" onclick="saveData('empresa', this)">Salvar Empresa</button>
        </div>

        <div class="config-section">
            <div class="section-title"><i class="fa-solid fa-gears"></i> Detalhes do Serviço</div>
            <input type="text" id="srv_nome" list="lista_servicos" placeholder="Selecione o Serviço...">
            <datalist id="lista_servicos"></datalist>
            <input type="number" id="srv_valor" placeholder="Valor R$">
            <button class="btn-save" onclick="saveData('servico', this)">Salvar Serviço</button>
        </div>

        <div class="config-section">
            <div class="section-title"><i class="fa-solid fa-user"></i> Dados do Cliente</div>
            <input type="text" id="cli_nome" list="lista_clientes" placeholder="Selecione o Cliente...">
            <datalist id="lista_clientes"></datalist>
            <input type="text" id="cli_doc" placeholder="CPF / CNPJ">
            <input type="tel" id="cli_tel" placeholder="WhatsApp">
            <input type="text" id="cli_end" placeholder="Endereço Completo">
            <button class="btn-save" onclick="saveData('cliente', this)">Salvar Cliente</button>
        </div>

        <div class="config-section">
            <div class="section-title"><i class="fa-solid fa-clipboard-list"></i> Observações Técnicas</div>
            <input type="text" id="obs_busca" list="lista_obs" placeholder="Pesquisar observação salva...">
            <datalist id="lista_obs"></datalist>
            <textarea id="txt_obs" rows="5" placeholder="Edite o texto aqui..."></textarea>
            <button class="btn-save" onclick="saveData('obs', this)">Salvar Observações</button>
        </div>
        
        <p style="text-align: center; color: grey; font-size: 10px; margin-bottom: 40px;">SISTEMA V3.0 PROFESSIONAL</p>
    </div>

<script>
    const URL_LOGIN = "https://script.google.com/macros/s/AKfycbyVHWD028yH3qTXi63aL4Jq17MwNuXnfy8IwwA2SVOs26bsQRxmffePggxM3AriKhI2IQ/exec";
    const URL_DATABASE = "https://script.google.com/macros/s/AKfycbyGvAm4ApMTxRA_zZyO6G8gj1l4sxQT6S86RIlw0UUU3P-GUPRj50FySyvMOqVMK-ebQw/exec"; 

    let cacheDados = []; 

    async function buscarDadosPlanilha() {
        try {
            const resp = await fetch(URL_DATABASE);
            cacheDados = await resp.json();
            
            const listEmp = document.getElementById('lista_empresas');
            const listCli = document.getElementById('lista_clientes');
            const listSrv = document.getElementById('lista_servicos');
            const listObs = document.getElementById('lista_obs');

            listEmp.innerHTML = [...new Set(cacheDados.map(d => d.emp_nome))].filter(Boolean).map(n => `<option value="${n}">`).join('');
            listCli.innerHTML = [...new Set(cacheDados.map(d => d.cli_nome))].filter(Boolean).map(n => `<option value="${n}">`).join('');
            listSrv.innerHTML = [...new Set(cacheDados.map(d => d.srv_nome))].filter(Boolean).map(n => `<option value="${n}">`).join('');
            listObs.innerHTML = [...new Set(cacheDados.map(d => d.txt_obs))].filter(Boolean).map(n => `<option value="${n}">`).join('');
            
            configurarBuscaAutomatica();
        } catch (e) { console.error("Erro ao carregar dados:", e); }
    }

    function configurarBuscaAutomatica() {
        // Função utilitária para tratar o input e preencher campos
        const setupBusca = (idInput, idsDependentes, camposPlanilha) => {
            const el = document.getElementById(idInput);
            el.addEventListener('input', function() {
                const valor = this.value;
                if (valor === "") {
                    idsDependentes.forEach(id => document.getElementById(id).value = "");
                    return;
                }
                const encontrado = cacheDados.find(x => x[camposPlanilha[0]] === valor);
                if (encontrado) {
                    idsDependentes.forEach((id, i) => {
                        document.getElementById(id).value = encontrado[camposPlanilha[i+1]] || "";
                    });
                }
            });
        };

        // Aplica para Empresa
        setupBusca('emp_nome', ['emp_doc'], ['emp_nome', 'emp_doc']);

        // Aplica para Serviço
        setupBusca('srv_nome', ['srv_valor'], ['srv_nome', 'srv_valor']);

        // Aplica para Cliente
        setupBusca('cli_nome', ['cli_doc', 'cli_tel', 'cli_end'], ['cli_nome', 'cli_doc', 'cli_tel', 'cli_end']);

        // Lógica especial para Observação (Seleciona e limpa a busca para permitir re-seleção)
        const campoBuscaObs = document.getElementById('obs_busca');
        const areaTextoObs = document.getElementById('txt_obs');

        campoBuscaObs.addEventListener('input', function() {
            const valor = this.value;
            const encontrado = cacheDados.find(x => x.txt_obs === valor);
            if (encontrado) {
                areaTextoObs.value = encontrado.txt_obs;
                // Usamos um timer curto para limpar o campo sem travar a interface
                setTimeout(() => { this.value = ""; }, 500);
            } else if (valor === "") {
                areaTextoObs.value = "";
            }
        });
    }

    function saveData(secao, btn) {
        btn.disabled = true;
        const toast = document.getElementById('toast-minimal');
        
        const payload = {
            emp_nome: document.getElementById('emp_nome').value,
            emp_doc: document.getElementById('emp_doc').value,
            srv_nome: document.getElementById('srv_nome').value,
            srv_valor: document.getElementById('srv_valor').value,
            cli_nome: document.getElementById('cli_nome').value,
            cli_doc: document.getElementById('cli_doc').value,
            cli_tel: document.getElementById('cli_tel').value,
            cli_end: document.getElementById('cli_end').value,
            txt_obs: document.getElementById('txt_obs').value
        };

        fetch(URL_DATABASE, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });

        setTimeout(() => {
            toast.style.display = 'block';
            // Limpa campos exceto os de login
            document.querySelectorAll('input, textarea').forEach(el => {
                if(!['auth_u_mail', 'auth_u_pass'].includes(el.id)) el.value = '';
            });
            setTimeout(() => {
                toast.style.display = 'none';
                btn.disabled = false;
                buscarDadosPlanilha(); 
            }, 2000);
        }, 800);
    }

    async function realizarLogin() {
        const email = document.getElementById('auth_u_mail').value;
        const pass = document.getElementById('auth_u_pass').value;
        try {
            const resp = await fetch(`${URL_LOGIN}?action=login&email=${encodeURIComponent(email)}&senha=${encodeURIComponent(pass)}`);
            if((await resp.text()).trim() === "logado") {
                document.getElementById('overlay-login').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                buscarDadosPlanilha();
            } else { alert("Dados Inválidos"); }
        } catch (e) { alert("Erro de Conexão"); }
    }
</script>
</body>
</html>
