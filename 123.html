<!DOCTYPE html>
<html lang="pt-br">
<head>
    <script>
    if (localStorage.getItem("inforos_logado") !== "true") {
        window.location.replace("https://refrigeracaoeliezer.github.io/site/");
    }
    </script>

    <meta charset="UTF-8">
    <title>Orçamento | Profissional</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; min-height: 100vh; background: #0d1117; color: white; position: relative; overflow-x: hidden; -webkit-font-smoothing: antialiased; }

        .corner-ball { position: fixed; background: rgba(30, 64, 175, 0.1); border-radius: 50%; z-index: 0; pointer-events: none; filter: blur(80px); }
        .ball-top-right { width: 400px; height: 400px; top: -100px; right: -100px; }
        .ball-bottom-left { width: 300px; height: 300px; bottom: -100px; left: -100px; }

        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-top: 4px solid #1e40af; border-radius: 30px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }

        .dark-input { background: rgba(255, 255, 255, 0.05) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; transition: all 0.3s ease; }
        .dark-input:focus { border-color: #3b82f6 !important; background: rgba(255, 255, 255, 0.08) !important; outline: none; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3); }

        .service-card { background: rgba(255, 255, 255, 0.02); border-radius: 20px; padding: 15px; border: 1px solid rgba(255, 255, 255, 0.08); }
        .qty-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 8px; background: rgba(255, 255, 255, 0.05); color: #3b82f6; transition: 0.2s; border: 1px solid rgba(59, 130, 246, 0.2); }
        
        .section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .section-header i { font-size: 14px; color: #3b82f6; }
        .section-header span { font-size: 11px; font-weight: 800; color: #3b82f6; text-transform: uppercase; letter-spacing: 0.5px; }

        .btn-primary { background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); transition: transform 0.2s; box-shadow: 0 10px 20px -5px rgba(30, 64, 175, 0.5); }
        .btn-primary:active { transform: scale(0.95); }
        
        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(1); }
    </style>
</head>
<body class="p-4 pb-10">

    <div class="corner-ball ball-top-right"></div>
    <div class="corner-ball ball-bottom-left"></div>

    <div class="max-w-md mx-auto relative z-10">
        <header class="flex justify-between items-center mb-8 pt-4">
            <div class="flex items-center gap-3">
                <div id="headerLogoArea" class="hidden w-12 h-12 bg-white/10 rounded-xl flex items-center justify-center overflow-hidden border border-white/10">
                    <img id="headerLogoImg" src="" class="object-contain w-full h-full">
                </div>
                <div>
                    <h1 class="text-xl font-black tracking-tighter uppercase leading-none">
                        REFRIGERAÇÃO <span class="text-blue-500">ELIEZER</span>
                    </h1>
                    <span class="text-[10px] text-blue-400 font-bold uppercase tracking-widest">Sistema de Orçamento</span>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleHistory()" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center border border-white/10 transition-colors">
                    <i class="fa-solid fa-clock-rotate-left"></i>
                </button>
                <button onclick="toggleSettings()" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center border border-white/10 transition-colors">
                    <i class="fa-solid fa-gear"></i>
                </button>
            </div>
        </header>

        <main class="glass-card p-6 space-y-7">
            <div id="sec-dados" class="space-y-4">
                <div class="section-header">
                    <i class="fa-solid fa-user-gear"></i>
                    <span>Dados do Orçamento</span>
                </div>
                <div class="space-y-3">
                    <input type="text" id="nomePrestador" placeholder="Seu Nome / Sua Empresa" class="w-full p-4 rounded-2xl dark-input text-sm font-semibold outline-none">
                    <input type="text" id="nomeCliente" placeholder="Nome do Cliente" class="w-full p-4 rounded-2xl dark-input text-sm font-semibold outline-none">
                    <input type="text" id="enderecoCliente" placeholder="Endereço (Rua, Nº, Bairro)" class="w-full p-4 rounded-2xl dark-input text-sm font-semibold outline-none">
                    <input type="tel" id="telCliente" placeholder="(DD) 9XXXX-XXXX" class="w-full p-4 rounded-2xl dark-input text-sm font-semibold outline-none">
                    
                    <div class="grid grid-cols-3 gap-2 pt-2">
                        <div class="space-y-1">
                            <label class="text-[9px] font-bold text-white/30 uppercase ml-2">Data</label>
                            <input type="date" id="dataServico" class="w-full p-3 rounded-xl dark-input text-[11px] font-bold text-center">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[9px] font-bold text-white/30 uppercase ml-2">Hora</label>
                            <input type="time" id="horaServico" value="09:00" class="w-full p-3 rounded-xl dark-input text-[11px] font-bold text-center">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[9px] font-bold text-white/30 uppercase ml-2">Garantia</label>
                            <div class="relative">
                                <input type="number" id="inputGarantia" value="90" class="w-full p-3 rounded-xl dark-input text-[11px] font-bold text-center">
                                <span class="absolute right-2 top-1/2 -translate-y-1/2 text-[8px] text-white/20 font-bold">D</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="sec-servicos" class="space-y-4">
                <div class="flex justify-between items-center mb-1">
                    <div class="section-header !mb-0">
                        <i class="fa-solid fa-screwdriver-wrench"></i>
                        <span>Serviços</span>
                    </div>
                    <span class="bg-blue-600/20 text-blue-400 text-[9px] px-2.5 py-1 rounded-full font-black uppercase tracking-tighter border border-blue-500/20">Itens</span>
                </div>
                
                <div id="services-container" class="space-y-4"></div>
                <datalist id="lista_servicos_planilha"></datalist>

                <button onclick="adicionarServico()" class="w-full py-4 border-2 border-dashed border-white/5 rounded-2xl text-white/20 font-bold text-xs hover:border-blue-500/50 hover:text-white transition-all">
                    <i class="fa-solid fa-circle-plus mr-2"></i> ADICIONAR ITEM
                </button>
                
                <div class="relative">
                   <textarea id="detalhesServico" placeholder="Observações técnicas (Ex: Tubulação de cobre, suporte...)" class="w-full p-4 rounded-2xl dark-input text-sm h-24 outline-none"></textarea>
                   <i class="fa-solid fa-pen-to-square absolute right-4 top-4 text-white/10"></i>
                </div>
            </div>

            <div id="sec-custos" class="space-y-4">
                <div class="section-header">
                    <i class="fa-solid fa-calculator"></i>
                    <span>Custos Operacionais</span>
                </div>
                
                <div class="bg-blue-600/5 p-5 rounded-3xl border border-blue-500/10 space-y-4">
                    <div class="relative">
                        <label class="text-[9px] font-bold text-blue-400 uppercase mb-2 block tracking-widest">Total em Materiais / Peças</label>
                        <div class="flex items-center gap-3">
                            <span class="text-xl font-black text-white/20">R$</span>
                            <input type="text" id="custoPecas" placeholder="0,00" class="w-full bg-transparent border-none text-2xl font-black text-white focus:outline-none" onkeyup="formatarMoeda(this)">
                            <span class="bg-white/5 text-[8px] px-2 py-1 rounded font-bold text-white/40">MATERIAL</span>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3 pt-2">
                        <div class="relative">
                             <i class="fa-solid fa-route absolute left-3 top-1/2 -translate-y-1/2 text-white/10 text-xs"></i>
                             <input type="text" placeholder="Km Total" class="w-full pl-9 p-3 rounded-xl dark-input text-xs font-bold outline-none">
                        </div>
                        <div class="relative">
                             <i class="fa-solid fa-clock absolute left-3 top-1/2 -translate-y-1/2 text-white/10 text-xs"></i>
                             <input type="text" placeholder="Horas" class="w-full pl-9 p-3 rounded-xl dark-input text-xs font-bold outline-none">
                        </div>
                    </div>
                </div>
            </div>

            <button onclick="calcularTudo()" class="w-full btn-primary text-white py-5 rounded-2xl font-black text-base shadow-2xl uppercase tracking-widest flex items-center justify-center gap-3">
                Calcular Agora <i class="fa-solid fa-arrow-right"></i>
            </button>
        </main>
    </div>

    <script>
        function formatarMoeda(i) {
            let v = i.value.replace(/\D/g, "");
            v = (v / 100).toFixed(2).replace(".", ",");
            v = v.replace(/(\d)(?=(\d{3})+(?!\d))/g, "$1.");
            i.value = v;
        }

        function adicionarServico() {
            const container = document.getElementById('services-container');
            const div = document.createElement('div');
            div.className = "service-card flex flex-col gap-3";
            div.innerHTML = `
                <div class="flex items-center gap-2">
                    <input type="text" list="lista_servicos_planilha" placeholder="Nome do Serviço ou Peça..." class="flex-grow dark-input p-3 rounded-xl text-sm outline-none service-name">
                    <button onclick="this.closest('.service-card').remove()" class="text-white/10 hover:text-red-500 p-2 transition-colors"><i class="fa-solid fa-trash-can"></i></button>
                </div>
                <div class="flex items-center gap-2">
                    <div class="flex-grow relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-white/20 font-bold text-xs">R$</span>
                        <input type="text" placeholder="0,00" class="w-full dark-input pl-9 p-3 rounded-xl text-sm service-price" onkeyup="formatarMoeda(this)">
                    </div>
                    <div class="flex items-center bg-white/5 border border-white/5 rounded-xl p-1 gap-3">
                        <button onclick="alterarQtde(this, -1)" class="qty-btn"><i class="fa-solid fa-minus text-[10px]"></i></button>
                        <span class="font-bold text-sm service-qty w-4 text-center">1</span>
                        <button onclick="alterarQtde(this, 1)" class="qty-btn"><i class="fa-solid fa-plus text-[10px]"></i></button>
                    </div>
                </div>
            `;
            container.appendChild(div);
        }

        function alterarQtde(btn, delta) {
            const span = btn.parentElement.querySelector('.service-qty');
            let val = parseInt(span.innerText) + delta;
            if (val < 1) val = 1;
            span.innerText = val;
        }

        function calcularTudo() {
            // Lógica de cálculo aqui
            alert("Orçamento Calculado com Sucesso!");
        }

        window.onload = () => {
            document.getElementById('dataServico').valueAsDate = new Date();
            adicionarServico();
        };
    </script>
</body>
</html>
