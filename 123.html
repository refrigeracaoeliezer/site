<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta charset="UTF-8">
    <title>Orçamento | Profissional</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        /* --- INICIO VARIÁVEIS DE TEMA --- */
        :root {
            --bg-body: #0d1117;
            --text-main: white;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(255, 255, 255, 0.05);
            --input-text: white;
            --card-sub: rgba(255, 255, 255, 0.02);
            --modal-text-box: rgba(255, 255, 255, 0.05); /* Mesma cor do textarea técnico */
            --modal-text-color: #ffffff;
            --total-container-bg: rgba(30, 64, 175, 0.3);
            --total-text-color: #ffffff;
        }

        body.light-mode {
            --bg-body: #f0f2f5;
            --text-main: #1a1f26;
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(0, 0, 0, 0.1);
            --input-bg: rgba(0, 0, 0, 0.05);
            --input-text: #1a1f26;
            --card-sub: rgba(0, 0, 0, 0.02);
            --modal-text-box: #f3f4f6; /* Fundo claro para modo claro */
            --modal-text-color: #1a1f26;
            --total-container-bg: rgba(30, 64, 175, 0.9);
        }
        /* --- FIM VARIÁVEIS DE TEMA --- */

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; min-height: 100vh; background: var(--bg-body); color: var(--text-main); position: relative; overflow-x: hidden; -webkit-font-smoothing: antialiased; transition: background 0.3s, color 0.3s; }

        .corner-ball { position: fixed; background: rgba(30, 64, 175, 0.1); border-radius: 50%; z-index: 0; pointer-events: none; filter: blur(80px); }
        .ball-top-right { width: 400px; height: 400px; top: -100px; right: -100px; }
        .ball-bottom-left { width: 300px; height: 300px; bottom: -100px; left: -100px; }

        .glass-card { background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-top: 4px solid #1e40af; border-radius: 30px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); transition: all 0.5s ease; }

        .is-os { border-top-color: #10b981 !important; }
        .is-os .text-blue-500, .is-os .text-blue-400, .is-os .section-header i, .is-os .section-header span { color: #10b981 !important; }
        .is-os .btn-primary { background: linear-gradient(135deg, #065f46 0%, #10b981 100%) !important; }
        .is-os .total-container { background: rgba(6, 95, 70, 0.4) !important; border-color: rgba(16, 185, 129, 0.2) !important; }
        body.light-mode.is-os .total-container { background: rgba(6, 95, 70, 0.9) !important; }

        .dark-input { background: var(--input-bg) !important; border: 1px solid var(--glass-border) !important; color: var(--input-text) !important; transition: all 0.3s ease; cursor: pointer; }
        .dark-input:focus { border-color: #3b82f6 !important; background: rgba(255, 255, 255, 0.08) !important; outline: none; }
        .is-os .dark-input:focus { border-color: #10b981 !important; }

        .service-card { background: var(--card-sub); border-radius: 20px; padding: 15px; border: 1px solid var(--glass-border); }
        .qty-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 8px; background: var(--input-bg); color: #3b82f6; transition: 0.2s; border: 1px solid rgba(59, 130, 246, 0.2); }
        .is-os .qty-btn { color: #10b981 !important; border-color: rgba(16, 185, 129, 0.2) !important; }
        
        .section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .section-header i { font-size: 14px; color: #3b82f6; }
        .section-header span { font-size: 11px; font-weight: 800; color: #3b82f6; text-transform: uppercase; letter-spacing: 0.5px; }

        .btn-primary { background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); transition: transform 0.2s; box-shadow: 0 10px 20px -5px rgba(30, 64, 175, 0.5); }
        .btn-primary:active { transform: scale(0.95); }

        .btn-add-item { width: 100%; padding: 1rem; border: 2px dashed rgba(59, 130, 246, 0.5); border-radius: 1.25rem; color: var(--text-main); font-weight: 700; font-size: 0.75rem; transition: all 0.3s; background: rgba(59, 130, 246, 0.05); }
        .is-os .btn-add-item { border-color: rgba(16, 185, 129, 0.5); background: rgba(16, 185, 129, 0.05); }

        #obsGeral { overflow: hidden; resize: none; min-height: 100px; transition: min-height 0.2s ease; }

        .switch { position: relative; display: inline-block; width: 100%; height: 44px; background: var(--input-bg); border-radius: 15px; padding: 4px; border: 1px solid var(--glass-border); cursor: pointer; }
        .switch-bg { position: absolute; top: 4px; left: 4px; width: calc(50% - 4px); height: calc(100% - 8px); background: #1e40af; border-radius: 12px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1; }
        .switch-labels { position: relative; display: flex; height: 100%; z-index: 2; align-items: center; font-size: 11px; font-weight: 800; text-transform: uppercase; }
        .switch-labels div { flex: 1; text-align: center; color: rgba(128,128,128,0.6); }
        .active-label { color: white !important; }
        .mode-os .switch-bg { left: 50%; background: #10b981; }

        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.5); }
        body:not(.light-mode) input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }

        #modal-mensagens { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(13, 17, 23, 0.95); backdrop-filter: blur(10px); z-index: 100; overflow-y: auto; display: none; padding: 20px; }
        body.light-mode #modal-mensagens { background: rgba(240, 242, 245, 0.98); color: #1a1f26; }
        
        .btn-copy-success { background-color: #3b82f6 !important; color: white !important; }

        .theme-toggle { background: var(--input-bg); border: 1px solid var(--glass-border); color: var(--text-main); width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        .modal-glass-container { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 25px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .text-preview-box { background: var(--modal-text-box); border-radius: 20px; padding: 15px; font-family: monospace; font-size: 13px; color: var(--modal-text-color); white-space: pre-wrap; word-break: break-all; margin: 15px 0; border: 1px solid var(--glass-border); }
        .btn-copy-custom { background: rgba(128,128,128,0.15); color: var(--text-main); border: 1px solid var(--glass-border); }

        .total-container { 
            background: var(--total-container-bg) !important; 
            border: 1px solid rgba(255,255,255,0.1) !important;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.4s ease; 
        }
    </style>
</head>
<body class="p-4 pb-10">

                </div>

                    <button onclick="enviarWpp('txt-sinal')" class="py-3 bg-orange-600 text-white rounded-xl font-bold text-[10px] uppercase">WHATSAPP</button>

                <div class="flex justify-between items-center mb-2">

                </div>

    <div class="max-w-md mx-auto relative z-10" id="main-container">
        <div class="mb-6">
            <div class="switch" id="toggleMode" onclick="alternarModo()">
                <div class="switch-bg" id="switch-thumb"></div>
                <div class="switch-labels">
                    <div id="lbl-orc" class="active-label">Orçamento</div>
                    <div id="lbl-os">Ordem de Serviço</div>
                </div>
            </div>
        </div>

        <header class="flex justify-between items-center mb-8 pt-4">
            <div>
                <h1 class="text-xl font-black tracking-tighter uppercase leading-none">
                    REFRIGERAÇÃO <span class="text-blue-500" id="header-name">ELIEZER</span>
                </h1>
                <span class="text-[10px] text-blue-400 font-bold uppercase tracking-widest" id="sub-title">Sistema de Orçamento</span>
            </div>
            <button onclick="toggleTheme()" class="theme-toggle">
                <i id="theme-icon" class="fa-solid fa-sun"></i>
            </button>
        </header>

        <main class="glass-card p-6 space-y-7" id="card-principal">
            <div id="sec-dados" class="space-y-4">
                <div class="section-header">
                    <i class="fa-solid fa-user-gear"></i>
                    <span id="label-dados">Dados do Orçamento</span>
                </div>
                <div class="space-y-3">
                    <input type="text" id="nomePrestador" placeholder="Sua Empresa" class="w-full p-4 rounded-2xl dark-input text-sm font-semibold outline-none">
                    <div class="relative">
                        <input type="text" id="nomeCliente" list="lista_clientes" placeholder="Selecionar Cliente" class="w-full p-4 rounded-2xl dark-input text-sm font-semibold outline-none" onmousedown="forcarLista(this)">
                        <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-white/10 pointer-events-none text-xs"></i>
                    </div>
                    <input type="text" id="enderecoCliente" placeholder="Endereço Completo" class="w-full p-4 rounded-2xl dark-input text-sm font-semibold outline-none">
                    <input type="tel" id="telCliente" placeholder="WhatsApp" class="w-full p-4 rounded-2xl dark-input text-sm font-semibold outline-none">
                    
                    <div class="grid grid-cols-2 gap-2 pt-2">
                        <div class="space-y-1">

                            <input type="date" id="dataInicio" class="w-full p-3 rounded-xl dark-input text-[11px] font-bold text-center" onchange="calcularDataFinal()">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[9px] font-bold text-white/30 uppercase ml-2">Venc./Final</label>
                            <input type="date" id="dataPrazoFinal" class="w-full p-3 rounded-xl dark-input text-[11px] font-bold text-center" readonly>
                        </div>
                    </div>

                    <div class="relative pt-4">
                        <input type="number" id="inputGarantia" value="30" class="w-full p-4 rounded-2xl dark-input text-sm font-bold text-center" oninput="calcularDataFinal()">
                        <span id="label-prazo" class="absolute -top-1 left-1/2 -translate-x-1/2 bg-blue-600 text-[8px] px-2 py-0.5 rounded text-white font-black tracking-widest uppercase shadow-lg">Vencimento</span>
                        <span class="absolute right-4 top-1/2 -translate-y-1/2 mt-2 text-[10px] text-white/20 font-black">DIAS</span>
                    </div>
                </div>
            </div>

            <div id="sec-servicos" class="space-y-4">
                <div class="flex justify-between items-center mb-1">

                        <i class="fa-solid fa-screwdriver-wrench"></i>
                        <span>Serviços Realizados</span>
                    </div>
                </div>
                <div id="services-container" class="space-y-4"></div>
                <button onclick="adicionarServico()" class="btn-add-item">
                    <i id="btn-add-icon" class="fa-solid fa-circle-plus mr-2 text-blue-500"></i> ADICIONAR ITEM
                </button>

            <div class="space-y-2 pt-2">
    <div class="relative">
        <textarea id="obsGeral" placeholder="Escreva os detalhes técnicos aqui..." class="w-full p-4 rounded-2xl dark-input text-sm outline-none" oninput="autoExpandir(this)"></textarea>
    </div>
</div>

            <div id="sec-custos" class="space-y-4">
                <div class="section-header">
                    <i class="fa-solid fa-calculator"></i>
                    <span id="label-total">Total do Serviço</span>
                </div>
                <div class="total-container p-6 rounded-3xl">
                    <div class="flex items-center gap-3">
                        <span class="text-xl font-black text-white/40">R$</span>
                        <input type="text" id="totalFinal" placeholder="0,00" class="w-full bg-transparent border-none text-3xl font-black text-white focus:outline-none" readonly>
                    </div>
                </div>
            </div>

            <button onclick="gerarDocumento()" id="btn-acao" class="w-full btn-primary text-white py-5 rounded-2xl font-black text-base uppercase tracking-widest flex items-center justify-center gap-3">
                Gerar Orçamento <i class="fa-solid fa-arrow-right"></i>
            </button>
        </main>
    </div>

    <datalist id="lista_clientes"></datalist>
    <datalist id="lista_servicos"></datalist>
    <datalist id="lista_obs"></datalist>

    <script>
        const URL_DATABASE = "https://script.google.com/macros/s/AKfycbwsX8xUWHgb9PE9Nv6IvQbjB7VGQPfUQSbn6fZT1WQRk5IoQJMFAhleLHHpHSU9zHw49A/exec"; 
        let cacheDados = [];
        let modoOS = false;
        let saldoQuitado = false;

        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('theme-icon');
            body.classList.toggle('light-mode');
            
            if (body.classList.contains('light-mode')) {
                icon.classList.replace('fa-sun', 'fa-moon');
                localStorage.setItem('theme', 'light');
            } else {
                icon.classList.replace('fa-moon', 'fa-sun');
                localStorage.setItem('theme', 'dark');
            }
        }

        function forcarLista(input) {
            input.setAttribute('autocomplete', 'off');
            const valOriginal = input.value;
            input.value = '';
            setTimeout(() => { input.value = valOriginal; }, 1);
        }

        function autoExpandir(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';
        }

        function calcularDataFinal() {
            const dataInicioVal = document.getElementById('dataInicio').value;
            const diasPrazo = parseInt(document.getElementById('inputGarantia').value) || 0;
            const campoDataFinal = document.getElementById('dataPrazoFinal');
            if (dataInicioVal) {
                let data = new Date(dataInicioVal + 'T00:00:00');
                data.setDate(data.getDate() + diasPrazo);
                const y = data.getFullYear();
                const m = String(data.getMonth() + 1).padStart(2, '0');
                const d = String(data.getDate()).padStart(2, '0');
                campoDataFinal.value = `${y}-${m}-${d}`;
            }
        }

     async function buscarDadosPlanilha() {
    try {
        const resp = await fetch(URL_DATABASE);
        cacheDados = await resp.json();
        renderizarDatalists();
        configurarListeners(); 
        aplicarTextoPadrao();
        calcularDataFinal();
    } catch (e) { console.error("Erro na carga:", e); }
}

        function renderizarDatalists() {
            const criarOpcoes = (campo) => [...new Set(cacheDados.map(d => d[campo]))].filter(Boolean).map(n => `<option value="${n}">`).join('');
            document.getElementById('lista_clientes').innerHTML = criarOpcoes('cli_nome');
            document.getElementById('lista_servicos').innerHTML = criarOpcoes('srv_nome');
            document.getElementById('lista_obs').innerHTML = criarOpcoes('txt_obs');
            if(cacheDados.length > 0) {
                const dadosEmp = cacheDados.find(d => d.emp_nome);
                if(dadosEmp) document.getElementById('nomePrestador').value = dadosEmp.emp_nome;
            }
        }
function aplicarTextoPadrao() {
    const txtArea = document.getElementById('obsGeral');
    const listaObsValidas = cacheDados.map(d => d.txt_obs).filter(Boolean);
    
    if (modoOS) {
        txtArea.value = listaObsValidas[1] || "";
    } else {
        txtArea.value = listaObsValidas[0] || "";
    }
    autoExpandir(txtArea);
}
function configurarListeners() {
    const campoCliente = document.getElementById('nomeCliente');
    if (!campoCliente) return;

   const carregarCliente = () => {
    const valorC = campoCliente.value.trim();
    const cliente = cacheDados.find(x => x.cli_nome && x.cli_nome.toString().trim() === valorC);
        if (cliente) {
            document.getElementById('enderecoCliente').value = cliente.cli_end || "";
            document.getElementById('telCliente').value = cliente.cli_tel || "";
        }
    };

    campoCliente.addEventListener('input', carregarCliente);
    campoCliente.addEventListener('change', carregarCliente);
}

        function adicionarServico() {
            const container = document.getElementById('services-container');
            const div = document.createElement('div');
            div.className = "service-card flex flex-col gap-3";
            div.innerHTML = `
                <div class="flex items-center gap-2">
                    <div class="relative flex-grow">
                        <input type="text" list="lista_servicos" placeholder="Selecionar Serviço" class="w-full dark-input p-3 rounded-xl text-sm outline-none service-name" onmousedown="forcarLista(this)">
                        <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-white/10 pointer-events-none text-[10px]"></i>
                    </div>
                    <button onclick="this.closest('.service-card').remove(); atualizarSoma();" class="text-red-500 p-2 opacity-80 hover:opacity-100 transition-opacity"><i class="fa-solid fa-trash-can"></i></button>
                </div>
                <div class="flex items-center gap-2">
                    <div class="flex-grow relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-white/20 font-bold text-xs">R$</span>
                        <input type="text" placeholder="0,00" class="w-full dark-input pl-9 p-3 rounded-xl text-sm service-price" onkeyup="formatarMoeda(this)">
                    </div>
                    <div class="flex items-center bg-white/5 border border-white/5 rounded-xl p-1 gap-3">
                        <button onclick="alterarQtde(this, -1)" class="qty-btn"><i class="fa-solid fa-minus text-[10px]"></i></button>
                        <span class="font-bold text-sm service-qty w-4 text-center">1</span>
                        <button onclick="alterarQtde(this, 1)" class="qty-btn"><i class="fa-solid fa-plus text-[10px]"></i></button>
                    </div>
                </div>
            `;
            container.appendChild(div);

            const inputSrv = div.querySelector('.service-name');
            inputSrv.addEventListener('input', function() {
                const item = cacheDados.find(x => x.srv_nome === this.value);
                if (item) {
                    const precoInput = div.querySelector('.service-price');
                    let valor = item.srv_valor.toString().replace("R$", "").replace(".", "").replace(",", ".").trim();
                    precoInput.value = (parseFloat(valor) || 0).toLocaleString('pt-BR', {minimumFractionDigits: 2});
                    atualizarSoma();
                }
            });
        }

        function formatarMoeda(i) {
            let v = i.value.replace(/\D/g, "");
            v = (v / 100).toFixed(2).replace(".", ",");
            v = v.replace(/(\d)(?=(\d{3})+(?!\d))/g, "$1.");
            i.value = v;
            atualizarSoma(); 
        }

        function atualizarSoma() {
            let total = 0;
            document.querySelectorAll('.service-card').forEach(card => {
                let precoStr = card.querySelector('.service-price').value.replace(/\./g, "").replace(",", ".");
                let preco = parseFloat(precoStr) || 0;
                let qtde = parseInt(card.querySelector('.service-qty').innerText) || 1;
                total += (preco * qtde);
            });
            document.getElementById('totalFinal').value = total.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
        }

        function alterarQtde(btn, delta) {
            const span = btn.parentElement.querySelector('.service-qty');
            let val = parseInt(span.innerText) + delta;
            if (val < 1) val = 1;
            span.innerText = val;
            atualizarSoma();
        }

        function alternarModo() {
            modoOS = !modoOS;
            const card = document.getElementById('card-principal');
            const thumb = document.getElementById('toggleMode');
            const subTitle = document.getElementById('sub-title');
            const btnAcao = document.getElementById('btn-acao');
            const lblDados = document.getElementById('label-dados');
            const lblPrazo = document.getElementById('label-prazo');
            const btnAddIcon = document.getElementById('btn-add-icon');

            aplicarTextoPadrao();

            if (modoOS) {
                thumb.classList.add('mode-os'); card.classList.add('is-os');
                subTitle.innerText = "Ordem de Serviço (OS)";
                btnAcao.innerHTML = 'Finalizar O.S <i class="fa-solid fa-check"></i>';
                lblDados.innerText = "Dados da Ordem de Serviço";
                lblPrazo.innerText = "Garantia";
                lblPrazo.classList.replace('bg-blue-600', 'bg-green-600');
                document.getElementById('lbl-os').classList.add('active-label');
                document.getElementById('lbl-orc').classList.remove('active-label');
                btnAddIcon.className = "fa-solid fa-circle-plus mr-2 text-green-500";
            } else {
                thumb.classList.remove('mode-os'); card.classList.remove('is-os');
                subTitle.innerText = "Sistema de Orçamento";
                btnAcao.innerHTML = 'Gerar Orçamento <i class="fa-solid fa-arrow-right"></i>';
                lblDados.innerText = "Dados do Orçamento";
                lblPrazo.innerText = "Vencimento";
                lblPrazo.classList.replace('bg-green-600', 'bg-blue-600');
                document.getElementById('lbl-orc').classList.add('active-label');
                document.getElementById('lbl-os').classList.remove('active-label');
                btnAddIcon.className = "fa-solid fa-circle-plus mr-2 text-blue-500";
            }
            calcularDataFinal();
        }

        window.onload = () => {
            if(localStorage.getItem('theme') === 'light') toggleTheme();
            const agora = new Date();
            document.getElementById('dataInicio').value = agora.toISOString().split('T')[0];
            buscarDadosPlanilha();
            adicionarServico();
        };

        function alternarQuitacao() {
            saldoQuitado = !saldoQuitado;
            const btn = document.getElementById('btn-quitar');
            if(saldoQuitado) {
                btn.innerText = "PAGAMENTO CONFIRMADO";
                btn.classList.replace('bg-green-500/10', 'bg-green-600');
                btn.classList.replace('text-green-500', 'text-white');
            } else {
                btn.innerText = "QUITAR SALDO";
                btn.classList.replace('bg-green-600', 'bg-green-500/10');
                btn.classList.replace('text-white', 'text-green-500');
            }
            gerarDocumento();
        }

        function gerarDocumento() {
            const prestador = document.getElementById('nomePrestador').value || "ELIEZER";
            const cliente = document.getElementById('nomeCliente').value || "Cliente";
            const total = document.getElementById('totalFinal').value;
            const obs = document.getElementById('obsGeral').value;
            const dias = document.getElementById('inputGarantia').value;
            const dataFim = document.getElementById('dataPrazoFinal').value.split('-').reverse().join('/');
            
            const dadosEmpresa = cacheDados.find(d => d.emp_pix);
            const chavePix = dadosEmpresa ? dadosEmpresa.emp_pix : "[CHAVE NÃO ENCONTRADA]";

            let servicosTexto = "";
            document.querySelectorAll('.service-card').forEach(card => {
                const nome = card.querySelector('.service-name').value;
                const preco = card.querySelector('.service-price').value;
                const qtde = card.querySelector('.service-qty').innerText;
                if(nome) servicosTexto += `• ${qtde}x ${nome} - R$ ${preco}\n`;
            });

            const totalNum = parseFloat(total.replace(/\./g, "").replace(",", ".")) || 0;
            const sinalValor = (totalNum * 0.3).toLocaleString('pt-BR', {minimumFractionDigits: 2});
            const saldoValor = (totalNum * 0.7).toLocaleString('pt-BR', {minimumFractionDigits: 2});

            const fraseSaldo = saldoQuitado ? "*Pagamento Total Confirmado:*" : `*Saldo Restante:* R$ ${saldoValor}`;

            document.getElementById('txt-proposta').innerText = `*ORÇAMENTO TÉCNICO - ${prestador.toUpperCase()}*\n\nOlá ${cliente}! Segue o orçamento:\n\n*SERVIÇOS:*\n${servicosTexto}\n*OBS:*\n${obs}\n\n*INVESTIMENTO TOTAL:* R$ ${total}\n(Material + Mão de Obra incluso)\n\n*${modoOS ? 'Garantia' : 'Vencimento'}:* ${dias} dias\n*Data Prevista:* ${dataFim}\n\nFicaremos no aguardo.`;
            document.getElementById('txt-sinal').innerText = `Olá ${cliente}! 🤝\n\nPara agendarmos e comprarmos material, precisamos de um sinal.\n\n*Sinal (30%): R$ ${sinalValor}*\n\nChave PIX: ${chavePix}\n\nPor favor, envie o comprovante. Obrigado!`;
            document.getElementById('txt-conclusao').innerText = `*Serviço Concluído!*\n\n${cliente}, serviço finalizado! ✅ Equipamento testado e pronto para entrega..\n\n${fraseSaldo}\n\nLembrando que você tem *${dias} dias* de garantia referentes ao serviço prestado. Conte conosco sempre que precisar!\n\nObrigado pela preferência!\n${prestador}`;

            document.getElementById('modal-mensagens').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function fecharModal() {
            document.getElementById('modal-mensagens').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function enviarWpp(id) {
            const texto = document.getElementById(id).innerText;
            const tel = document.getElementById('telCliente').value.replace(/\D/g, '');
            if(!tel) { alert("Informe o WhatsApp!"); return; }
            window.open(`https://api.whatsapp.com/send?phone=55${tel}&text=${encodeURIComponent(texto)}`, '_blank');
        }

        function copiarTextoProfissional(id, elemento) {
            const texto = document.getElementById(id).innerText;
            const originalText = elemento.innerText;
            navigator.clipboard.writeText(texto).then(() => {
                elemento.innerText = "COPIADO!";
                elemento.classList.add('btn-copy-success');
                setTimeout(() => {
                    elemento.innerText = originalText;
                    elemento.classList.remove('btn-copy-success');
                }, 2000);
            });
        }

        function baixarPDF() {
            const cliente = document.getElementById('nomeCliente').value || "Cliente";
            const dadosParaImpressao = {
                tipo: modoOS ? "ORDEM DE SERVIÇO" : "ORÇAMENTO",
                cliente: cliente,
                endereco: document.getElementById('enderecoCliente').value,
                emissao: document.getElementById('dataInicio').value.split('-').reverse().join('/'),
                validade: document.getElementById('dataPrazoFinal').value.split('-').reverse().join('/'),
                total: document.getElementById('totalFinal').value,
                obs: document.getElementById('obsGeral').value,
                garantia: document.getElementById('inputGarantia').value,
                itens: Array.from(document.querySelectorAll('.service-card')).map(card => ({
                    descricao: card.querySelector('.service-name').value,
                    qtd: card.querySelector('.service-qty').innerText,
                    valor: card.querySelector('.service-price').value
                }))
            };
            localStorage.setItem('dados_impressao', JSON.stringify(dadosParaImpressao));
            if (modoOS) {
                window.location.href = "impressao_os.html";
            } else {
                window.location.href = "impressao.html";
            }
        }
    </script>
</body>
</html>
