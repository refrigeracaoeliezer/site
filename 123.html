<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Refrigerista Blindado Clone</title>
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; -webkit-font-smoothing: antialiased; user-select: none; }
        input, textarea, .select-all { user-select: text; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        .pt-safe { padding-top: max(1.25rem, env(safe-area-inset-top)); }
        .accordion-content { max-height: 0; opacity: 0; overflow: hidden; transition: all 0.3s ease; }
        .accordion-open .accordion-content { max-height: 1000px; opacity: 1; padding: 1rem; }
        .accordion-open .accordion-icon { transform: rotate(180deg); }
        @media print { .no-print { display: none !important; } #printable-area { display: block !important; } }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Classe para animação de subida do modal */
        .modal-transition { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="text-slate-800 pb-safe">
    <div class="app-wrapper min-h-screen flex flex-col items-center p-0 sm:p-4 no-print">
        <div class="w-full max-w-md bg-white shadow-2xl relative flex flex-col min-h-screen sm:min-h-0 sm:rounded-3xl overflow-hidden">
            
            <header class="bg-[#0f172a] text-white p-5 pt-safe pb-10 relative overflow-hidden flex justify-between items-center">
                <div class="z-10 flex items-center gap-3">
                    <div id="headerLogoArea" class="hidden w-10 h-10 bg-white rounded-lg flex items-center justify-center overflow-hidden border border-slate-700">
                        <img id="headerLogoImg" src="" class="object-contain w-full h-full">
                    </div>
                    <div>
                        <div class="flex items-center gap-2 opacity-80 text-[10px] font-bold uppercase tracking-widest">
                            <i class="fa-solid fa-snowflake text-blue-400"></i> Refrigeração
                        </div>
                        <h1 class="text-lg font-black tracking-wide uppercase">REFRIGERISTA <span class="text-blue-500">BLINDADO</span></h1>
                    </div>
                </div>
                <div class="flex gap-2 z-10">
                    <button onclick="toggleHistory()" class="bg-white/10 w-9 h-9 rounded-xl flex items-center justify-center hover:bg-white/20 transition-colors">
                        <i class="fa-solid fa-clock-rotate-left"></i>
                    </button>
                    <button onclick="toggleSettings()" class="bg-white/10 w-9 h-9 rounded-xl flex items-center justify-center hover:bg-white/20 transition-colors">
                        <i class="fa-solid fa-gear"></i>
                    </button>
                </div>
            </header>

            <main class="relative -mt-6 bg-white rounded-t-3xl flex-grow p-5 space-y-5 overflow-y-auto pb-20">
                <div id="input-section" class="space-y-5">
                    <a href="#" class="block w-full bg-blue-600 text-white text-center py-3 rounded-xl font-bold text-xs uppercase tracking-widest shadow-lg">OFERTAS DA SEMANA</a>

                    <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 space-y-3 relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-1 h-full bg-blue-500"></div>
                        <input type="text" id="nomePrestador" placeholder="Seu Nome / Empresa" class="w-full p-3 rounded-xl border border-slate-200 text-sm font-bold focus:outline-none focus:border-blue-500">
                        <input type="text" id="nomeCliente" placeholder="Nome do Cliente" class="w-full p-3 rounded-xl border border-slate-200 text-sm font-bold focus:outline-none focus:border-blue-500">
                        <input type="text" id="enderecoCliente" placeholder="Endereço" class="w-full p-3 rounded-xl border border-slate-200 text-sm font-bold focus:outline-none focus:border-blue-500">
                        <div class="grid grid-cols-3 gap-2">
                            <input type="date" id="dataServico" class="p-2 rounded-xl border border-slate-200 text-xs font-bold text-center">
                            <input type="time" id="horaServico" value="09:00" class="p-2 rounded-xl border border-slate-200 text-xs font-bold text-center">
                            <input type="number" id="inputGarantia" value="90" class="p-2 rounded-xl border border-slate-200 text-xs font-bold text-center">
                        </div>
                    </div>

                    <div id="services-container" class="space-y-3"></div>
                    <button onclick="adicionarServico()" class="w-full py-3 border-2 border-dashed border-slate-300 rounded-xl text-slate-500 font-bold text-xs hover:border-blue-400 hover:text-blue-500 transition-all">+ ADICIONAR ITEM</button>
                    
                    <textarea id="detalhesServico" placeholder="Observações técnicas..." class="w-full p-3 bg-slate-50 rounded-xl border border-slate-200 text-sm h-20 focus:outline-none"></textarea>

                    <div class="space-y-3 border-t pt-4">
                        <div class="relative">
                            <span class="absolute left-4 top-3.5 text-slate-400 font-bold">R$</span>
                            <input type="text" id="custoPecas" placeholder="0,00" class="w-full pl-12 p-3 rounded-xl border border-slate-200 font-bold text-lg" onkeyup="formatarMoeda(this)">
                            <span class="absolute right-4 top-4 text-[10px] font-bold text-slate-300 uppercase">Material</span>
                        </div>
                    </div>

                    <button onclick="calcularTudo()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-lg shadow-lg active:scale-95 transition-transform uppercase">CALCULAR AGORA</button>
                </div>

                <div id="results-section" class="hidden space-y-5">
                    <div class="bg-[#0f172a] p-6 rounded-3xl text-white text-center shadow-xl ring-4 ring-slate-100">
                        <p class="text-[10px] uppercase font-bold text-blue-300 tracking-widest mb-1">Valor Sugerido</p>
                        <p class="text-5xl font-black tracking-tighter" id="displayPrecoFinal">R$ 0,00</p>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="compartilharPDF()" class="p-4 border-2 border-slate-100 rounded-xl font-bold text-xs flex items-center justify-center gap-2 hover:bg-slate-50">
                            <i class="fa-solid fa-share-nodes text-red-500 text-base"></i> ENVIAR PDF
                        </button>
                        <button onclick="location.reload()" class="p-4 border-2 border-slate-100 rounded-xl font-bold text-xs flex items-center justify-center gap-2 hover:bg-slate-50">
                            <i class="fa-solid fa-rotate-left text-blue-500 text-base"></i> NOVO CÁLCULO
                        </button>
                    </div>
                    <div id="acc-msg1" class="message-accordion border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                        <button onclick="toggleAccordion('acc-msg1')" class="w-full p-4 bg-slate-50 flex justify-between items-center font-bold text-xs uppercase text-slate-600">
                            <span><span class="bg-blue-100 text-blue-600 px-2 py-1 rounded-full mr-2">1</span> Proposta</span>
                            <i class="fa-solid fa-chevron-down accordion-icon transition-transform"></i>
                        </button>
                        <div class="accordion-content bg-white">
                            <div id="txt_proposta" class="text-xs whitespace-pre-wrap font-mono leading-relaxed select-all p-2 bg-slate-50 rounded border"></div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="settingsModal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-slate-900/80 backdrop-blur-sm" onclick="toggleSettings()"></div>
        <div id="modalContent" class="absolute inset-x-0 bottom-0 sm:inset-auto sm:top-1/2 sm:left-1/2 sm:-translate-x-1/2 sm:-translate-y-1/2 w-full max-w-lg bg-white rounded-t-3xl sm:rounded-3xl p-6 h-[85vh] sm:h-auto overflow-y-auto transform translate-y-full modal-transition shadow-2xl">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h2 class="text-lg font-black text-slate-800 uppercase flex items-center gap-2">
                    <i class="fa-solid fa-sliders text-blue-600"></i> Ajustes
                </h2>
                <button onclick="toggleSettings()" class="w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center hover:bg-slate-200"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="space-y-6">
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                    <h3 class="text-xs font-bold text-slate-500 uppercase mb-3"><i class="fa-solid fa-image text-blue-500 mr-1"></i> Seu Logótipo</h3>
                    <input type="file" id="logoInput" accept="image/*" onchange="handleLogoUpload(this)" class="block w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                    <button onclick="removerLogo()" class="text-[10px] text-red-500 font-bold mt-2 uppercase hover:underline">Remover Logo</button>
                </div>
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                    <h3 class="text-xs font-bold text-slate-500 uppercase mb-3"><i class="fa-solid fa-percent text-blue-500 mr-1"></i> Pagamento</h3>
                    <div class="flex items-center justify-between">
                        <label class="text-xs font-bold text-slate-700">Sinal exigido (%)</label>
                        <input type="number" id="configSinal" value="30" class="w-20 p-2 rounded-lg border border-slate-200 text-xs text-center font-bold">
                    </div>
                </div>
                <button onclick="salvarConfiguracoes()" class="w-full bg-[#0f172a] text-white font-bold py-4 rounded-2xl hover:bg-black transition-all shadow-lg uppercase">Salvar Alterações</button>
            </div>
        </div>
    </div>

    <div id="printable-area" class="hidden p-10 bg-white text-slate-800">
        <h1 id="printPrestador" class="text-2xl font-bold uppercase"></h1>
        <hr class="my-4 border-2 border-slate-800">
        <p><strong>Cliente:</strong> <span id="printCliente"></span></p>
        <p><strong>Data:</strong> <span id="printData"></span></p>
        <div id="printServicesList" class="my-5 border-y py-4"></div>
        <h2 class="text-2xl font-black text-right">Total: <span id="printTotal"></span></h2>
    </div>

    <script>
        let state = JSON.parse(localStorage.getItem('refrig_data')) || { logoBase64: null, sinal: 30 };

        // FORMATAÇÃO MOEDA
        function formatarMoeda(i) {
            let v = i.value.replace(/\D/g, "");
            v = (v / 100).toFixed(2).replace(".", ",");
            v = v.replace(/(\d)(?=(\d{3})+(?!\d))/g, "$1.");
            i.value = v;
        }

        // ADICIONAR LINHA DE SERVIÇO
        function adicionarServico() {
            const container = document.getElementById('services-container');
            const div = document.createElement('div');
            div.className = "flex gap-2 bg-white p-3 border border-slate-200 rounded-xl relative shadow-sm animate-slide-up";
            div.innerHTML = `
                <input type="text" placeholder="Descrição do Serviço" class="flex-grow p-1 text-sm font-bold outline-none service-name">
                <div class="relative w-28">
                    <span class="absolute left-2 top-1.5 text-xs text-slate-400">R$</span>
                    <input type="text" placeholder="0,00" class="w-full pl-7 p-1 text-sm font-bold border-l service-price" onkeyup="formatarMoeda(this)">
                </div>
                <button onclick="this.parentElement.remove()" class="text-slate-300 hover:text-red-500 transition-colors"><i class="fa-solid fa-trash-can"></i></button>
            `;
            container.appendChild(div);
        }

        // CÁLCULO FINAL
        function calcularTudo() {
            let totalServicos = 0;
            let listaItensTxt = "";
            document.querySelectorAll('#services-container > div').forEach(row => {
                const nome = row.querySelector('.service-name').value;
                const precoStr = row.querySelector('.service-price').value.replace(/\./g, '').replace(',', '.');
                const preco = parseFloat(precoStr) || 0;
                if(preco > 0) {
                    totalServicos += preco;
                    listaItensTxt += `• ${nome}: R$ ${preco.toFixed(2).replace('.', ',')}\n`;
                }
            });

            const matStr = document.getElementById('custoPecas').value.replace(/\./g, '').replace(',', '.');
            const mat = parseFloat(matStr) || 0;
            const final = totalServicos + mat;
            
            document.getElementById('displayPrecoFinal').innerText = "R$ " + final.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            
            // Gerar Mensagem WhatsApp
            const cliente = document.getElementById('nomeCliente').value || "Cliente";
            const prestador = document.getElementById('nomePrestador').value || "Técnico";
            document.getElementById('txt_proposta').innerText = `*ORÇAMENTO TÉCNICO*\n\nOlá ${cliente}!\n\n*SERVIÇOS:*\n${listaItensTxt}\n*TOTAL:* R$ ${final.toLocaleString('pt-BR', {minimumFractionDigits: 2})}\n\nFico no aguardo,\n${prestador}`;
            
            document.getElementById('input-section').classList.add('hidden');
            document.getElementById('results-section').classList.remove('hidden');
            window.scrollTo(0,0);
        }

        // FUNÇÃO TOGGLE CONFIGURAÇÕES (IGUAL AO ORIGINAL)
        function toggleSettings() {
            const modal = document.getElementById('settingsModal');
            const content = document.getElementById('modalContent');
            if (modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
                setTimeout(() => content.classList.remove('translate-y-full'), 10);
            } else {
                content.classList.add('translate-y-full');
                setTimeout(() => modal.classList.add('hidden'), 300);
            }
        }

        // LOGO UPLOAD
        function handleLogoUpload(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    state.logoBase64 = e.target.result;
                    document.getElementById('headerLogoImg').src = e.target.result;
                    document.getElementById('headerLogoArea').classList.remove('hidden');
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function removerLogo() {
            state.logoBase64 = null;
            document.getElementById('headerLogoArea').classList.add('hidden');
        }

        function salvarConfiguracoes() {
            state.sinal = document.getElementById('configSinal').value;
            localStorage.setItem('refrig_data', JSON.stringify(state));
            toggleSettings();
        }

        function toggleAccordion(id) { document.getElementById(id).classList.toggle('accordion-open'); }
        function toggleHistory() { alert("Histórico será implementado na próxima etapa!"); }

        window.onload = () => {
            if(state.logoBase64) {
                document.getElementById('headerLogoImg').src = state.logoBase64;
                document.getElementById('headerLogoArea').classList.remove('hidden');
            }
            document.getElementById('dataServico').valueAsDate = new Date();
            adicionarServico();
        };
    </script>
</body>
</html>
