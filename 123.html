<!DOCTYPE html>
<html lang="pt-br">
<head>
    <script>
        if (localStorage.getItem("inforos_logado") !== "true") {
            window.location.href = "https://refrigeracaoeliezer.github.io/site/";
        }
    </script>

    <meta charset="UTF-8">
    <title>Configurações | Refrigeração</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: #0d1117;
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #overlay-login {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0d1117;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid rgba(30, 64, 175, 0.3);
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        .hidden { display: none !important; }

        .container { width: 100%; max-width: 600px; }
        h1 { font-size: 28px; font-weight: 700; margin-bottom: 30px; text-align: center; }

        .config-section {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 10px;
        }

        .section-title i { color: #27a9e3; }

        input, textarea {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 12px;
            color: white;
            font-size: 14px;
            width: 100%;
        }

        .btn-save {
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            background: #1e40af;
            color: white;
            cursor: pointer;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

        .logo-preview {
            width: 120px; height: 120px; margin: 0 auto;
            border-radius: 15px;
            background: rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }
        .logo-preview img { width: 100%; height: 100%; object-fit: contain; }

        .link-auth { color: #27a9e3; cursor: pointer; font-size: 13px; }
        .status-msg { font-size: 13px; margin: 10px 0; display: none; }
        .status-error { color: #ff4b4b; }
        .status-loading { color: #27a9e3; }
    </style>
</head>
<body>

    <div id="overlay-login">
        <div class="login-card" id="card-login">
            <i class="fa-solid fa-lock" style="font-size: 40px; color: #1e40af; margin-bottom: 20px;"></i>
            <h2>Configurações</h2>
            <input type="email" id="user_email" placeholder="E-mail" autocomplete="off" style="margin-top: 20px;">
            <input type="password" id="user_pass" placeholder="Senha" autocomplete="off" style="margin-top: 10px;">
            <div id="login-status" class="status-msg"></div>
            <button class="btn-save" id="btn-entrar" onclick="realizarLogin()" style="margin-top: 15px;">Entrar</button>
            <p style="margin-top: 20px;">
                <span id="link-registrar-container"><span class="link-auth" onclick="alternarTela('registrar')">Criar Conta</span> | </span>
                <span class="link-auth" onclick="alternarTela('recuperar')" style="color:#ff4b4b">Esqueci meus dados</span>
            </p>
        </div>

        <div class="login-card hidden" id="card-registrar">
            <h2>Novo Registro</h2>
            <input type="email" id="reg_email" placeholder="E-mail" autocomplete="off" style="margin-top: 15px;">
            <input type="password" id="reg_pass" placeholder="Senha" autocomplete="off" style="margin-top: 10px;">
            <input type="text" id="reg_pergunta" placeholder="Pergunta (Ex: Nome do Pet?)" autocomplete="off" style="margin-top: 10px;">
            <input type="text" id="reg_resposta" placeholder="Resposta da Pergunta" autocomplete="off" style="margin-top: 10px;">
            <div id="reg-status" class="status-msg"></div>
            <button class="btn-save" id="btn-registrar" onclick="registrarUsuario()" style="margin-top: 15px;">Salvar Conta</button>
            <p class="link-auth" onclick="alternarTela('login')" style="margin-top: 15px;">Voltar</p>
        </div>

        <div class="login-card hidden" id="card-recuperar">
            <h2>Recuperar Acesso</h2>
            <p style="font-size: 12px; color: grey; margin: 10px 0;">Digite o e-mail para ver sua pergunta.</p>
            
            <input type="email" id="rec_email" placeholder="Seu E-mail" autocomplete="off" onblur="buscarPergunta()">
            <div id="display-pergunta" style="margin: 10px 0; color: #27a9e3; font-style: italic; font-size: 13px;"></div>
            
            <input type="text" id="rec_resposta" placeholder="Sua Resposta" autocomplete="off">
            <div id="rec-status" class="status-msg"></div>
            
            <button class="btn-save" id="btn-recuperar" onclick="recuperarSenha()" style="margin-top: 15px;">Verificar Dados</button>
            <div id="dica-email" style="margin-top: 15px; color: #44ff44; font-weight: bold; font-size: 13px;"></div>
            <p class="link-auth" onclick="alternarTela('login')" style="margin-top: 15px;">Voltar</p>
        </div>
    </div>

    <div class="container hidden" id="main-content">
        <h1>Configurações</h1>

        <div class="config-section">
            <div class="section-title"><i class="fa-solid fa-image"></i> Logo da Empresa</div>
            <div class="logo-preview" id="logoPreview"><i class="fa-solid fa-camera" style="font-size: 30px; color: rgba(255,255,255,0.1);"></i></div>
            <input type="file" id="logoInput" accept="image/*" onchange="previewImage(this)">
            <button class="btn-save" onclick="saveData('logo')">Salvar Logo</button>
        </div>

        <div class="config-section">
            <div class="section-title"><i class="fa-solid fa-building"></i> Identidade da Empresa</div>
            <input type="text" id="emp_nome" placeholder="Nome Fantasia">
            <input type="text" id="emp_doc" placeholder="CNPJ / CPF">
            <button class="btn-save" onclick="saveData('empresa')">Salvar Empresa</button>
        </div>

        <div class="config-section">
            <div class="section-title"><i class="fa-solid fa-gears"></i> Detalhes do Serviço</div>
            <input type="text" id="srv_nome" placeholder="Descrição do Serviço">
            <input type="number" id="srv_valor" placeholder="Valor R$">
            <button class="btn-save" onclick="saveData('servico')">Salvar Serviço</button>
        </div>

        <div class="config-section">
            <div class="section-title"><i class="fa-solid fa-user"></i> Dados do Cliente</div>
            <input type="text" id="cli_nome" placeholder="Nome do Cliente">
            <input type="text" id="cli_doc" placeholder="CPF / CNPJ">
            <input type="tel" id="cli_tel" placeholder="WhatsApp">
            <input type="text" id="cli_end" placeholder="Endereço">
            <button class="btn-save" onclick="saveData('cliente')">Salvar Cliente</button>
        </div>

        <div class="config-section">
            <div class="section-title"><i class="fa-solid fa-clipboard-list"></i> Observações Técnicas</div>
            <textarea id="txt_obs" rows="5" placeholder="Texto das observações..."></textarea>
            <button class="btn-save" onclick="saveData('obs')">Salvar Observações</button>
        </div>
        
        <p style="text-align: center; color: grey; font-size: 10px; margin-bottom: 40px;">SISTEMA V2.7</p>
    </div>

    <script>
        const URL_LOGIN = "https://script.google.com/macros/s/AKfycbyVHWD028yH3qTXi63aL4Jq17MwNuXnfy8IwwA2SVOs26bsQRxmffePggxM3AriKhI2IQ/exec";

        window.onload = verificarSeExisteDono;

        function showStatus(id, msg, type) {
            const el = document.getElementById(id);
            el.innerText = msg;
            el.className = 'status-msg ' + (type === 'error' ? 'status-error' : 'status-loading');
            el.style.display = 'block';
        }

        async function verificarSeExisteDono() {
            try {
                const resp = await fetch(`${URL_LOGIN}?action=checar_registro`);
                const existe = await resp.text();
                if (existe === "tem_dono") document.getElementById('link-registrar-container').classList.add('hidden');
            } catch (e) { console.log("Erro de conexão."); }
        }

        async function realizarLogin() {
            const email = document.getElementById('user_email').value;
            const pass = document.getElementById('user_pass').value;
            if(!email || !pass) return showStatus('login-status', 'Preencha tudo.', 'error');

            showStatus('login-status', 'Verificando...', 'loading');
            document.getElementById('btn-entrar').disabled = true;

            try {
                const resp = await fetch(`${URL_LOGIN}?action=login&email=${email}&senha=${pass}`);
                const result = await resp.text();
                if(result === "logado") {
                    document.getElementById('overlay-login').classList.add('hidden');
                    document.getElementById('main-content').classList.remove('hidden');
                } else {
                    showStatus('login-status', 'Dados incorretos.', 'error');
                    document.getElementById('btn-entrar').disabled = false;
                }
            } catch (e) { showStatus('login-status', 'Erro de servidor.', 'error'); }
        }

        async function buscarPergunta() {
            const email = document.getElementById('rec_email').value;
            if(!email) return;
            document.getElementById('display-pergunta').innerText = "Buscando pergunta...";
            try {
                const resp = await fetch(`${URL_LOGIN}?action=get_pergunta&email=${email}`);
                document.getElementById('display-pergunta').innerText = await resp.text();
            } catch (e) { document.getElementById('display-pergunta').innerText = "Erro ao buscar pergunta."; }
        }

        async function recuperarSenha() {
            const resposta = document.getElementById('rec_resposta').value;
            if(!resposta) return showStatus('rec-status', 'Digite a resposta.', 'error');

            showStatus('rec-status', 'Consultando...', 'loading');
            try {
                const resp = await fetch(`${URL_LOGIN}?action=recuperar&resposta=${resposta}`);
                const result = await resp.text();
                document.getElementById('dica-email').innerText = result;
            } catch (e) { showStatus('rec-status', 'Erro.', 'error'); }
            document.getElementById('rec-status').style.display = 'none';
        }

        function alternarTela(tela) {
            document.getElementById('card-login').classList.add('hidden');
            document.getElementById('card-registrar').classList.add('hidden');
            document.getElementById('card-recuperar').classList.add('hidden');
            if(tela === 'login') document.getElementById('card-login').classList.remove('hidden');
            if(tela === 'registrar') document.getElementById('card-registrar').classList.remove('hidden');
            if(tela === 'recuperar') document.getElementById('card-recuperar').classList.remove('hidden');
        }

        async function registrarUsuario() {
            const email = document.getElementById('reg_email').value;
            const pass = document.getElementById('reg_pass').value;
            const perg = document.getElementById('reg_pergunta').value;
            const resp = document.getElementById('reg_resposta').value;
            showStatus('reg-status', 'Registrando...', 'loading');

            const url = `${URL_LOGIN}?action=registrar&email=${email}&senha=${pass}&pergunta=${perg}&resposta=${resp}`;
            const response = await fetch(url);
            const res = await response.text();
            if(res === "sucesso") {
                alert("Criado!");
                alternarTela('login');
                verificarSeExisteDono();
            } else { showStatus('reg-status', 'Erro ao registrar.', 'error'); }
        }

        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => document.getElementById('logoPreview').innerHTML = `<img src="${e.target.result}">`;
                reader.readAsDataURL(input.files[0]);
            }
        }

        function saveData(secao) { alert("Salvando " + secao + "..."); }
    </script>
</body>
</html>
