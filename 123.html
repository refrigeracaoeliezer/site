<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard de Clientes | Eliezer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-body: #0d1117;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: white;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-body); color: var(--text-main); }
        .glass-card { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 25px; }
        .status-badge { padding: 4px 12px; border-radius: 50px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .em-garantia { background: rgba(16, 185, 129, 0.2); color: #10b981; border: 1px solid #10b981; }
        .fora-garantia { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid #ef4444; }
        .search-input { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: white; outline: none; }
        .item-servico { border-bottom: 1px dashed rgba(255,255,255,0.1); padding: 5px 0; }
    </style>
</head>
<body class="p-4 pb-10">

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-xl font-black uppercase tracking-tighter">Histórico de <span class="text-blue-500">Serviços</span></h1>
                <span class="text-[10px] text-blue-400 font-bold uppercase tracking-widest">Refrigeração Eliezer</span>
            </div>
            <a href="index.html" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center border border-white/10">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
        </header>

        <div class="glass-card p-4 mb-6">
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-white/20"></i>
                <input type="text" id="inputBusca" onkeyup="filtrarHistorico()" placeholder="Buscar por cliente, CPF ou serviço..." class="w-full p-4 pl-12 rounded-2xl search-input font-semibold">
            </div>
        </div>

        <div id="container-historico" class="space-y-4">
            <div class="text-center py-10 text-white/20 font-bold uppercase tracking-widest text-xs">
                Carregando histórico...
            </div>
        </div>
    </div>

    <script>
        // LEMBRE-SE: Use a URL da "Nova Implantação" do Google Apps Script
        const URL_DATABASE = "https://script.google.com/macros/s/AKfycbw2PmVAeC5bOAoG_j2IbRD6uU4QZcO5Tx1tuKpjQ-n-ihqeouLThMOZ_XK-xZTSQN8f5A/exec";

        async function carregarDados() {
            try {
                const response = await fetch(URL_DATABASE, { redirect: "follow" });
                const dados = await response.json();
                renderizarCards(dados);
            } catch (error) {
                console.error("Erro na requisição:", error);
                document.getElementById('container-historico').innerHTML = "Erro ao conectar com a planilha.";
            }
        }

        function verificarGarantia(dataFimGarantia) {
            if (!dataFimGarantia || dataFimGarantia === "---") return false;
            
            const hoje = new Date();
            // Tenta converter DD/MM/YYYY
            const partes = dataFimGarantia.toString().split('/');
            if (partes.length !== 3) return false;
            
            const dataFim = new Date(partes[2], partes[1] - 1, partes[0]);
            return hoje <= dataFim;
        }

        function renderizarCards(lista) {
            const container = document.getElementById('container-historico');
            container.innerHTML = "";

            if (lista.erro) {
                container.innerHTML = `<div class="text-center text-red-500 font-bold p-10">${lista.erro}</div>`;
                return;
            }

            if (!Array.isArray(lista) || lista.length === 0) {
                container.innerHTML = "<div class='text-center text-white/40 uppercase text-xs font-bold py-10'>Nenhum registro encontrado na planilha.</div>";
                return;
            }

            lista.forEach(os => {
                // Mapeamento flexível (Maiúsculas e suporte a acentos/cedilha)
                const idOS = os["ID_OS"] || "---";
                const cliente = os["CLIENTE"] || "Não identificado";
                const endereco = os["ENDERECO"] || os["ENDEREÇO"] || "---"; 
                const servicosTexto = os["TIPO_DE_SERVICO"] || os["TIPO_DE_SERVIÇO"] || ""; 
                const tecnico = os["TECNICO_RESPONSAVEL"] || os["TECNICO_RESPONSÁVEL"] || "---"; 
                const dataGarantia = os["DATA_FIM_GARANTIA"] || "---"; 

                // Processamento da lista de serviços (separados por |)
                const servicosArray = servicosTexto.toString().split('|');
                let htmlServicos = "";
                servicosArray.forEach(srv => {
                    if(srv.trim() !== "") {
                        htmlServicos += `<div class="item-servico text-xs text-white/70 italic">${srv.trim()}</div>`;
                    }
                });

                const estaNaGarantia = verificarGarantia(dataGarantia);
                const badgeClass = estaNaGarantia ? "em-garantia" : "fora-garantia";
                const badgeText = estaNaGarantia ? "🟢 Em Garantia" : "🔴 Fora da Garantia";

                container.innerHTML += `
                    <div class="glass-card p-6 card-item">
                        <div class="flex flex-col md:flex-row justify-between items-start mb-4 gap-2">
                            <div>
                                <span class="text-[10px] font-black text-blue-500 uppercase tracking-widest">OS #${idOS}</span>
                                <h2 class="text-lg font-bold nome-cliente leading-tight">${cliente}</h2>
                                <p class="text-[10px] text-white/40 uppercase font-bold mt-1">${endereco}</p>
                            </div>
                            <span class="status-badge ${badgeClass} whitespace-nowrap">${badgeText}</span>
                        </div>
                        
                        <div class="bg-white/5 rounded-xl p-4 mb-4">
                            <span class="text-[9px] font-black text-white/30 uppercase block mb-2 tracking-widest">Serviços Executados:</span>
                            ${htmlServicos || '<div class="text-[10px] text-white/20 italic">Nenhum serviço registrado</div>'}
                        </div>

                        <div class="grid grid-cols-2 gap-4 text-[10px] font-bold uppercase">
                            <div>
                                <span class="text-white/30 block mb-1">Técnico Responsável</span>
                                <span class="text-white/80">${tecnico}</span>
                            </div>
                            <div>
                                <span class="text-white/30 block mb-1">Término da Garantia</span>
                                <span class="${estaNaGarantia ? 'text-green-400' : 'text-red-400'}">${dataGarantia}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function filtrarHistorico() {
            const termo = document.getElementById('inputBusca').value.toLowerCase();
            const cards = document.querySelectorAll('.card-item');
            cards.forEach(card => {
                const texto = card.innerText.toLowerCase();
                card.style.display = texto.includes(termo) ? 'block' : 'none';
            });
        }

        // Inicia o carregamento ao abrir a página
        window.onload = carregarDados;
    </script>
</body>
</html>
