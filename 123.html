<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login | Refrigeração</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-1.10.2.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0d1117; position: relative; overflow-x: hidden; padding: 20px; }
        
        .corner-ball { position: fixed; background: rgba(255, 255, 255, 0.02); border-radius: 50%; z-index: 1; pointer-events: none; }
        .ball-top-right { width: 550px; height: 550px; top: -200px; right: -150px; }
        .ball-bottom-left { width: 450px; height: 450px; bottom: -150px; left: -150px; }

        .hidden { display: none !important; }
        
        .login-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 4px solid #1e40af; 
            border-radius: 40px; 
            padding: 40px 30px;
            width: 100%;
            max-width: 410px;
            position: relative;
            z-index: 10;
            text-align: center;
            box-shadow: 0 0 50px rgba(30, 64, 175, 0.3), 0 20px 40px rgba(0, 0, 0, 0.6); 
        }

        .logo-container img { width: 100%; max-width: 220px; margin-bottom: 20px; }
        h2 { color: white; margin-bottom: 10px; font-size: 22px; }
        p.subtitle { color: rgba(255, 255, 255, 0.45); font-size: 13px; margin-bottom: 25px; }

        input, select {
            width: 100%; background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px; padding: 14px; color: white; font-size: 14px; margin-bottom: 15px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: #1e40af; box-shadow: 0 0 10px rgba(30, 64, 175, 0.3); }

        .btn-main {
            width: 100%; padding: 16px; background: linear-gradient(135deg, #1e40af 0%, #27a9e3 100%);
            border: none; border-radius: 12px; color: white; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s;
        }
        .btn-main:disabled { opacity: 0.6; cursor: not-allowed; }

        .link-auth { color: #27a9e3; cursor: pointer; font-size: 13px; margin-top: 20px; display: inline-block; }
        .status-msg { font-size: 12px; padding: 10px; border-radius: 10px; margin-bottom: 15px; display: none; }
        .error { background: rgba(255, 75, 75, 0.1); color: #ff4b4b; border: 1px solid rgba(255, 75, 75, 0.2); }
        .success { background: rgba(68, 255, 68, 0.1); color: #44ff44; border: 1px solid rgba(68, 255, 68, 0.2); }
        
        .result-box { margin-top: 15px; padding: 15px; background: rgba(39, 169, 227, 0.1); border: 1px dashed #27a9e3; color: #44ff44; font-weight: bold; border-radius: 12px; display: none; }

        .shake { animation: shake 0.5s both; border-color: #ff4b4b !important; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body>

    <div class="corner-ball ball-top-right"></div>
    <div class="corner-ball ball-bottom-left"></div>

    <div class="login-card" id="card-login">
        <div class="logo-container">
            <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgdGGsULMI69OabXBfFU3b8mTYfIWlJoqpwgc_q1UvSITQPj_VQYaW_1cLECh4rF7j5RfhJLsPgUXdvNv-ya494kAfeyZRbdTCn-VFesltpIkZp8Xid-MZwLKBLyC89MTSXf76nrCrBHncl86cYzjm1XuG34hvNrNVkZS8Gkq3FJEZHEb99HL26I52RUqc/w512-h237/TOPO%20POSTO%20RIO%20BRANCO.png">
        </div>
        <h2>Acessar Gestor</h2>
        <p class="subtitle">Insira seus dados de acesso</p>
        <div id="login-status" class="status-msg error"></div>
        <input type="email" id="l_email" placeholder="E-mail">
        <input type="password" id="l_pass" placeholder="Senha">
        <button class="btn-main" onclick="realizarLogin()" id="btn-l">Autenticar</button>
        <p><span class="link-auth" onclick="alternar('registrar')">Criar Conta</span> | <span class="link-auth" onclick="alternar('recuperar')" style="color:#ff4b4b">Esqueci meus dados</span></p>
    </div>

    <div class="login-card hidden" id="card-registrar">
        <i class="fa-solid fa-user-plus" style="font-size: 40px; color: #1e40af; margin-bottom: 20px;"></i>
        <h2>Nova Conta</h2>
        <p class="subtitle">Cadastre um novo usuário no sistema</p>
        <div id="reg-status" class="status-msg"></div>
        <input type="email" id="r_email" placeholder="Seu E-mail">
        <input type="password" id="r_pass" placeholder="Sua Senha">
        <input type="text" id="r_resp" placeholder="Resposta Secreta (para recuperar)">
        <button class="btn-main" onclick="registrar()" id="btn-r">Salvar Registro</button>
        <span class="link-auth" onclick="alternar('login')">Voltar ao Login</span>
    </div>

    <div class="login-card hidden" id="card-recuperar">
        <i class="fa-solid fa-shield-halved" style="font-size: 40px; color: #27a9e3; margin-bottom: 20px;"></i>
        <h2>Recuperar Acesso</h2>
        <p class="subtitle">Verificação de segurança dupla</p>
        <select id="tipo_rec" onchange="ajustarRec()">
            <option value="email">Quero ver meu E-mail</option>
            <option value="senha">Quero ver minha Senha</option>
        </select>
        <input type="password" id="rec_dado" placeholder="Confirme sua Senha">
        <input type="text" id="rec_resp" placeholder="Sua Resposta Secreta">
        <div id="rec-status" class="status-msg"></div>
        <div id="rec-result" class="result-box"></div>
        <button class="btn-main" onclick="recuperar()" id="btn-rec">Verificar Dados</button>
        <span class="link-auth" onclick="alternar('login')">Voltar ao Login</span>
    </div>

<script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbyOyMyg58f4qPL2qNWLp7-pd6b0NMF5nCIahEOV-hQ1_HTkaGTpjITt4bxcNENYmib1/exec"; // COLE A URL DO SEU SCRIPT GS AQUI

    function alternar(tela) {
        $('.login-card').addClass('hidden');
        $('#card-' + tela).removeClass('hidden');
        $('.status-msg, .result-box').hide();
    }

    function ajustarRec() {
        const tipo = $('#tipo_rec').val();
        $('#rec_dado').val('').attr('placeholder', tipo === 'email' ? "Confirme sua Senha" : "Confirme seu E-mail");
        $('#rec_dado').attr('type', tipo === 'email' ? "password" : "text");
    }

    async function realizarLogin() {
        const email = $('#l_email').val();
        const senha = $('#l_pass').val();
        const btn = $('#btn-l');
        if(!email || !senha) return alert("Preencha os campos!");
        
        btn.prop('disabled', true).html('<i class="fa-solid fa-spinner fa-spin"></i> Entrando...');
        try {
            const resp = await fetch(`${URL_SCRIPT}?action=login&email=${encodeURIComponent(email)}&senha=${encodeURIComponent(senha)}`);
            const texto = await resp.text();
            if(texto.trim() === "success") {
                localStorage.setItem("inforos_logado", "true");
                window.location.href = "sistemas.html";
            } else {
                $('#login-status').show().text("Dados incorretos!");
                $('#card-login').addClass('shake');
                setTimeout(() => $('#card-login').removeClass('shake'), 500);
            }
        } catch(e) { alert("Erro de conexão"); }
        btn.prop('disabled', false).text("Autenticar");
    }

    async function registrar() {
        const email = $('#r_email').val();
        const senha = $('#r_pass').val();
        const resp_sec = $('#r_resp').val();
        const btn = $('#btn-r');
        if(!email || !senha || !resp_sec) return alert("Preencha todos os campos!");

        btn.prop('disabled', true).text("Salvando...");
        try {
            const res = await fetch(`${URL_SCRIPT}?action=registrar&email=${encodeURIComponent(email)}&senha=${encodeURIComponent(senha)}&resposta=${encodeURIComponent(resp_sec)}`);
            if((await res.text()).trim() === "sucesso") {
                $('#reg-status').className = 'status-msg success';
                $('#reg-status').show().text("Conta criada com sucesso!");
                setTimeout(() => alternar('login'), 2000);
            }
        } catch(e) { alert("Erro ao registrar"); }
        btn.prop('disabled', false).text("Salvar Registro");
    }

    async function recuperar() {
        const tipo = $('#tipo_rec').val();
        const dado = $('#rec_dado').val();
        const resp_sec = $('#rec_resp').val();
        const btn = $('#btn-rec');
        
        btn.prop('disabled', true).text("Validando...");
        try {
            const url = `${URL_SCRIPT}?action=recuperar&tipo=${tipo}&dado1=${encodeURIComponent(dado)}&resposta=${encodeURIComponent(resp_sec)}`;
            const resText = await (await fetch(url)).text();
            if(!resText.includes("ERRO")) {
                $('#rec-result').show().text(resText);
                $('#rec-status').hide();
            } else {
                $('#rec-status').show().addClass('error').text("Dados inválidos!");
            }
        } catch(e) { alert("Erro na consulta"); }
        btn.prop('disabled', false).text("Verificar Dados");
    }
</script>
</body>
</html>
