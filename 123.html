<!DOCTYPE html>
<html lang="pt-br">
<head>
    <script>
        if (localStorage.getItem("inforos_logado") !== "true") {
            window.location.href = "https://refrigeracaoeliezer.github.io/site/";
        }
    </script>

    <meta charset="UTF-8">
    <title>Configurações Inteligentes | Refrigeração</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: #0d1117;
            color: white;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .background-glow {
            position: fixed;
            width: 500px;
            height: 500px;
            background: rgba(30, 64, 175, 0.1);
            filter: blur(100px);
            border-radius: 50%;
            z-index: -1;
            top: 20%;
        }

        .container { width: 100%; max-width: 850px; }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .config-section {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 25px;
            transition: 0.3s;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 15px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-title i { color: #27a9e3; }

        .grid-inputs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-size: 11px; color: rgba(30, 144, 255, 0.8); text-transform: uppercase; font-weight: 700; }
        
        input, textarea {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px;
            color: white;
            font-size: 14px;
            transition: 0.3s;
        }

        /* Destaque para o campo de busca/edição */
        .search-field {
            border-color: rgba(39, 169, 227, 0.4);
            background: rgba(30, 64, 175, 0.1);
        }

        input:focus { border-color: #27a9e3; outline: none; background: rgba(0,0,0,0.5); }

        .btn-save {
            border: none;
            padding: 10px 25px;
            border-radius: 10px;
            font-weight: 600;
            background: #1e40af;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-save:hover { background: #2563eb; transform: translateY(-2px); }

        .logo-preview {
            width: 80px; height: 80px;
            border-radius: 15px;
            background: rgba(0,0,0,0.2);
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .logo-preview img { width: 100%; object-fit: contain; }

        @media (max-width: 600px) {
            .section-header { flex-direction: column; align-items: flex-start; gap: 15px; }
            .btn-save { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="background-glow"></div>

    <div class="container">
        <div class="page-header">
            <h1>Configurações Diretas</h1>
            <a href="javascript:history.back()" style="color:#27a9e3; text-decoration:none; font-size:14px;"><i class="fa-solid fa-chevron-left"></i> Voltar</a>
        </div>

        <div class="config-section">
            <div class="section-header">
                <div class="section-title"><i class="fa-solid fa-image"></i> Logo da Empresa</div>
                <button class="btn-save" onclick="saveData('logo')"><i class="fa-solid fa-check"></i> Atualizar Logo</button>
            </div>
            <div style="display: flex; gap: 20px; align-items: center;">
                <div class="logo-preview" id="logoPreview"><i class="fa-solid fa-camera opacity-20"></i></div>
                <input type="file" id="logoInput" accept="image/*" onchange="previewImage(this)" style="flex:1;">
            </div>
        </div>

        <div class="config-section">
            <div class="section-header">
                <div class="section-title"><i class="fa-solid fa-building"></i> Identidade da Empresa</div>
                <button class="btn-save" onclick="saveData('empresa')"><i class="fa-solid fa-floppy-disk"></i> Salvar Alterações</button>
            </div>
            <div class="grid-inputs">
                <div class="input-group">
                    <label>Buscar ou Digitar Empresa</label>
                    <input type="text" id="emp_nome" list="lista_empresas" class="search-field" placeholder="Digite para buscar..." oninput="checkSelection('empresa')">
                    <datalist id="lista_empresas">
                        <option value="Refrigeração Eliezer">
                        <option value="Eliezer Service Ar">
                    </datalist>
                </div>
                <div class="input-group">
                    <label>CNPJ / CPF</label>
                    <input type="text" id="emp_doc" placeholder="Documento da empresa">
                </div>
            </div>
        </div>

        <div class="config-section">
            <div class="section-header">
                <div class="section-title"><i class="fa-solid fa-gears"></i> Detalhes do Serviço</div>
                <button class="btn-save" onclick="saveData('servico')"><i class="fa-solid fa-floppy-disk"></i> Salvar Serviço</button>
            </div>
            <div class="grid-inputs">
                <div class="input-group" style="grid-column: span 2;">
                    <label>Serviço (Busque serviços cadastrados)</label>
                    <input type="text" id="srv_nome" list="lista_servicos" class="search-field" placeholder="Ex: Higienização Split..." oninput="checkSelection('servico')">
                    <datalist id="lista_servicos">
                        <option value="Instalação Completa">
                        <option value="Carga de Gás R410a">
                        <option value="Limpeza Química">
                    </datalist>
                </div>
                <div class="input-group">
                    <label>Valor (R$)</label>
                    <input type="number" id="srv_valor">
                </div>
                <div class="input-group">
                    <label>Prazo</label>
                    <input type="text" id="srv_prazo">
                </div>
            </div>
        </div>

        <div class="config-section">
            <div class="section-header">
                <div class="section-title"><i class="fa-solid fa-user"></i> Dados do Cliente</div>
                <button class="btn-save" onclick="saveData('cliente')"><i class="fa-solid fa-floppy-disk"></i> Salvar Cliente</button>
            </div>
            <div class="grid-inputs">
                <div class="input-group" style="grid-column: span 2;">
                    <label>Cliente (Busque por nome)</label>
                    <input type="text" id="cli_nome" list="lista_clientes" class="search-field" placeholder="Comece a digitar o nome do cliente..." oninput="checkSelection('cliente')">
                    <datalist id="lista_clientes">
                        <option value="João Silva">
                        <option value="Maria Oliveira">
                        <option value="Condomínio Solar">
                    </datalist>
                </div>
                <div class="input-group">
                    <label>CPF / CNPJ Cliente</label>
                    <input type="text" id="cli_doc">
                </div>
                <div class="input-group">
                    <label>WhatsApp</label>
                    <input type="tel" id="cli_tel">
                </div>
                <div class="input-group" style="grid-column: span 2;">
                    <label>Endereço</label>
                    <input type="text" id="cli_end">
                </div>
            </div>
        </div>

        <div class="config-section">
            <div class="section-header">
                <div class="section-title"><i class="fa-solid fa-clipboard-list"></i> Observações Técnicas</div>
                <button class="btn-save" onclick="saveData('obs')"><i class="fa-solid fa-floppy-disk"></i> Salvar Notas</button>
            </div>
            <textarea id="txt_obs" rows="4" style="width:100%;" placeholder="Notas do orçamento..."></textarea>
        </div>

    </div>

    <script>
        // Função que simula o preenchimento automático ao selecionar da lista
        function checkSelection(tipo) {
            const val = document.getElementById(tipo === 'cliente' ? 'cli_nome' : (tipo === 'servico' ? 'srv_nome' : 'emp_nome')).value;
            
            // Simulação: Se o nome digitado for exatamente um da nossa lista, preenchemos o resto
            // No futuro, isso aqui fará uma busca real no seu banco de dados
            if(tipo === 'cliente' && val === "João Silva") {
                document.getElementById('cli_doc').value = "123.456.789-00";
                document.getElementById('cli_tel').value = "(67) 99999-0000";
                document.getElementById('cli_end').value = "Rua das Palmeiras, 100 - Centro";
            }
            if(tipo === 'servico' && val === "Limpeza Química") {
                document.getElementById('srv_valor').value = "250.00";
                document.getElementById('srv_prazo').value = "3 horas";
            }
        }

        function previewImage(input) {
            const preview = document.getElementById('logoPreview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => preview.innerHTML = `<img src="${e.target.result}">`;
                reader.readAsDataURL(input.files[0]);
            }
        }

        function saveData(secao) {
            alert("Dados de " + secao + " atualizados no servidor!");
        }
    </script>
</body>
</html>
