<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Financeiro | Refrigeração Eliezer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- VARIÁVEIS DE TEMA (MODELO) --- */
        :root { 
            --bg-body: #0d1117; 
            --text-main: white; 
            --glass-bg: rgba(255, 255, 255, 0.03); 
            --glass-border: rgba(255, 255, 255, 0.1); 
            --dropdown-bg: #161b22; 
            --input-bg: rgba(255, 255, 255, 0.05);
        }

        body.light-mode {
            --bg-body: #f0f2f5;
            --text-main: #1a1f26;
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(0, 0, 0, 0.1);
            --dropdown-bg: #ffffff;
            --input-bg: rgba(0, 0, 0, 0.05);
        }

        body { background: var(--bg-body); color: var(--text-main); font-family: 'Inter', sans-serif; -webkit-user-select: none; user-select: none; transition: background 0.3s, color 0.3s; }
        
        /* Proteção de Input */
        input { -webkit-user-select: text !important; user-select: text !important; }

        .glass-card { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 20px; transition: 0.3s; position: relative; }
        .devedor-border { border-left: 4px solid #ef4444 !important; }
        .pago-border { border-left: 4px solid #22c55e !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        #popupFinanceiro { background-color: var(--bg-body); color: var(--text-main); width: 95%; max-width: 450px; padding: 30px; border-radius: 25px; border: 1px solid var(--glass-border); position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; display: none; max-height: 90vh; overflow-y: auto; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 11px; opacity: 0.5; text-transform: uppercase; margin-bottom: 5px; font-weight: 700; color: var(--text-main); }
        .input-group input { width: 100%; background: var(--input-bg); border: 1px solid var(--glass-border); border-radius: 12px; padding: 12px; color: inherit; outline: none; }
        
        .custom-dropdown { position: relative; }
        .dropdown-list { position: absolute; left: 0; right: 0; top: 110%; background: var(--dropdown-bg); border: 1px solid var(--glass-border); border-radius: 15px; z-index: 50; max-height: 200px; overflow-y: auto; display: none; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .dropdown-item { padding: 12px 16px; font-size: 13px; border-bottom: 1px solid var(--glass-border); cursor: pointer; color: var(--text-main); }
        .dropdown-item:hover { background: #ef4444; color: white; }

        .btn-flutuante { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: #ef4444; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 90; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4); }
        
        /* Botões de Ação no Header (Tema e Lixeira) */
        .header-action-btn { background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-main); width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .delete-btn-red { color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }

        #statusOverlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); border-radius: 25px; flex-direction: column; align-items: center; justify-content: center; z-index: 110; }

        #toast-minimal { 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            background: #22c55e; 
            color: white; 
            padding: 12px 25px; 
            border-radius: 50px; 
            font-weight: 700; 
            display: none; 
            z-index: 10000; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            white-space: nowrap; 
            align-items: center;
            justify-content: center;
        }

        /* Botão editar no canto superior direito do card */
        .edit-card-btn { position: absolute; top: 15px; right: 15px; color: #3b82f6; opacity: 0.5; transition: 0.3s; cursor: pointer; z-index: 10; }
        .edit-card-btn:hover { opacity: 1; }
    </style>
</head>
<body class="p-4 pb-24">

    <div id="toast-minimal"><i class="fa-solid fa-check mr-2"></i> SALVO COM SUCESSO!</div>

    <div onclick="abrirPopup()" class="btn-flutuante"><i class="fa-solid fa-plus text-2xl"></i></div>

    <div id="popupFinanceiro">
        <span class="absolute top-6 right-6 cursor-pointer text-xl opacity-50" onclick="fecharPopup()">&times;</span>
        <h2 id="modalTitle" class="text-xl font-black uppercase mb-5">Lançar Débito</h2>
        
        <div id="statusOverlay">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-red-500 mb-4"></div>
            <div id="statusText" class="font-black text-red-500 uppercase tracking-widest">Processando...</div>
        </div>

        <form id="formFinanceiro">
            <input type="hidden" id="edit_index">
            <div class="input-group">
                <label>Cliente</label>
                <div class="custom-dropdown" id="dropdown-cliente">
                    <input type="text" id="cliente_nome" placeholder="Escreva ou selecione o cliente..." oninput="filtrarClientes(this)" onclick="mostrarDropdown()" autocomplete="off" required>
                    <ul id="lista_clientes_financeiro" class="dropdown-list no-scrollbar"></ul>
                </div>
            </div>
            <div class="input-group">
                <label>Serviço</label>
                <input type="text" id="servico_desc" required>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="input-group">
                    <label>Valor Total</label>
                    <input type="number" step="0.01" id="valor_total" required>
                </div>
                <div class="input-group">
                    <label>Valor Recebido</label>
                    <input type="number" step="0.01" id="valor_recebido" value="0">
                </div>
            </div>
            <button type="submit" class="w-full py-4 bg-red-600 rounded-xl font-black uppercase text-sm mt-2">Salvar Registro</button>
        </form>
    </div>

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-start mb-8">
            <div>
                <h1 class="text-xl font-black uppercase tracking-tighter">Contas a <span class="text-red-500">Receber</span></h1>
                <span class="text-[10px] opacity-40 font-bold uppercase tracking-widest">Gestão de Inadimplência</span>
            </div>
            <div class="flex flex-col items-end gap-2">
                <div class="flex items-center gap-3">
                    <div class="text-right">
                        <p class="text-[10px] opacity-50 font-black uppercase">Total Pendente</p>
                        <p id="total-geral" class="text-2xl font-black text-red-500">R$ 0,00</p>
                    </div>
                    <div class="flex flex-col gap-2">
                        <button onclick="toggleTheme()" class="header-action-btn" title="Alternar Tema">
                            <i id="theme-icon" class="fa-solid fa-sun"></i>
                        </button>
                        <button onclick="limparPagos()" class="header-action-btn delete-btn-red" title="Excluir Pagos">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <div class="flex gap-2 mb-4">
            <button onclick="filtrarStatus('pendente')" id="btn-pendente" class="filter-btn bg-red-500 text-white px-4 py-2 rounded-full text-xs font-bold uppercase">Pendentes</button>
            <button onclick="filtrarStatus('todos')" id="btn-todos" class="filter-btn bg-white/5 text-white/50 px-4 py-2 rounded-full text-xs font-bold uppercase">Ver Todos</button>
        </div>

        <div class="relative mb-6">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 opacity-30 text-sm"></i>
            <input type="text" id="buscaDevedor" oninput="renderizarFinanceiro()" placeholder="Buscar cliente ou serviço..." class="w-full bg-white/5 border border-white/10 rounded-xl py-3 pl-12 pr-4 outline-none focus:border-red-500 text-sm">
        </div>

        <div id="container-financeiro" class="space-y-4">
            <div class="flex flex-col items-center justify-center py-20">
                <div class="animate-spin rounded-full h-12 w-12 border-4 border-white/5 border-t-red-500 mb-4"></div>
                <p class="text-[10px] font-black uppercase opacity-40">Sincronizando...</p>
            </div>
        </div>
    </div>

    <script>
        const URL_CLIENTES = "https://script.google.com/macros/s/AKfycbyx6kGtlzS0q1s3chrRhdNG0YGJ4VwRIDLjmttJN_vE4UVa2CPmVRFqQlU9nQ1DPkmjnA/exec";
        const URL_FINANCEIRO = "https://script.google.com/macros/s/AKfycbxVQv7yNVed7G6TQt6oZPdgy6A_I-cdJj71aTkiXZwfvZUoU4Qib3oTlFipw6ahVPJMXA/exec";

        let dadosFinanceiros = [];
        let clientesCache = [];
        let filtroStatus = 'pendente';

        // Seguranca do Modelo
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey && (e.key === 'c' || e.key === 'u' || e.key === 's' || e.key === 'p')) || 
                (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j')) || 
                (e.keyCode === 123)) {
                e.preventDefault();
                return false;
            }
        });

        // Tema do Modelo
        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('theme-icon');
            body.classList.toggle('light-mode');
            const isLight = body.classList.contains('light-mode');
            icon.classList.replace(isLight ? 'fa-sun' : 'fa-moon', isLight ? 'fa-moon' : 'fa-sun');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        }

        async function carregarDados() {
            try {
                const res = await fetch(URL_FINANCEIRO);
                dadosFinanceiros = await res.json();
                renderizarFinanceiro();
            } catch (e) {
                document.getElementById('container-financeiro').innerHTML = `<div class="text-center py-10 opacity-50 font-bold">ERRO DE CONEXÃO</div>`;
            }
        }

        async function carregarClientes() {
            try {
                const res = await fetch(URL_CLIENTES);
                clientesCache = await res.json();
                renderizarDropdown(clientesCache);
            } catch (e) {}
        }

        function renderizarDropdown(lista) {
            const list = document.getElementById('lista_clientes_financeiro');
            list.innerHTML = lista.map(c => `<li class="dropdown-item" onclick="selecionarCliente('${c.cli_nome}')">${c.cli_nome}</li>`).join('');
        }

        function filtrarClientes(input) {
            const termo = input.value.toLowerCase();
            const filtrados = clientesCache.filter(c => c.cli_nome.toLowerCase().includes(termo));
            renderizarDropdown(filtrados);
            mostrarDropdown();
        }

        function mostrarDropdown() {
            document.getElementById('lista_clientes_financeiro').style.display = 'block';
        }

        function formatarMoeda(valor) {
            return parseFloat(valor || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        function renderizarFinanceiro() {
            const container = document.getElementById('container-financeiro');
            const busca = document.getElementById('buscaDevedor').value.toLowerCase();
            let somaPendente = 0;

            const filtrados = dadosFinanceiros.filter(item => {
                const total = parseFloat(item.VALOR_TOAL || item.VALOR_TOTAL || 0);
                const recebido = parseFloat(item.VALOR_RECEBIDO || 0);
                const faltaPagar = total - recebido;
                item.calcFalta = faltaPagar;
                item.calcTotal = total;
                item.calcRec = recebido;

                const statusReal = (faltaPagar > 0) ? 'pendente' : 'pago';
                const matchBusca = (item.CLIENTE || "").toLowerCase().includes(busca) || (item.SERVICO || "").toLowerCase().includes(busca);
                
                if (filtroStatus === 'pendente') return matchBusca && statusReal === 'pendente';
                return matchBusca;
            });

            somaPendente = dadosFinanceiros.reduce((acc, item) => {
                const f = parseFloat(item.VALOR_TOAL || item.VALOR_TOTAL || 0) - parseFloat(item.VALOR_RECEBIDO || 0);
                return f > 0 ? acc + f : acc;
            }, 0);
            document.getElementById('total-geral').innerText = formatarMoeda(somaPendente);

            if (filtrados.length === 0) {
                container.innerHTML = `<div class="text-center py-10 opacity-20 font-bold uppercase text-xs">Nenhum registro</div>`;
                return;
            }

            container.innerHTML = filtrados.map((item) => {
                const isPendente = item.calcFalta > 0;
                const itemStr = encodeURIComponent(JSON.stringify(item));
                return `
                    <div class="glass-card p-5 ${isPendente ? 'devedor-border' : 'pago-border'}">
                        <button onclick="prepararEdicao('${itemStr}')" class="edit-card-btn">
                            <i class="fa-solid fa-pen-to-square"></i>
                        </button>
                        
                        <div class="flex justify-between items-start">
                            <div class="flex-1">
                                <div class="flex items-center gap-2">
                                     <h2 class="text-base font-black uppercase">${item.CLIENTE}</h2>
                                </div>
                                <p class="text-xs opacity-60 mb-3">${item.SERVICO}</p>
                                <div class="grid grid-cols-2 gap-2 mt-2">
                                    <div class="bg-white/5 p-2 rounded-lg">
                                        <p class="text-[9px] opacity-40 uppercase font-bold">Total</p>
                                        <p class="text-sm font-bold">${formatarMoeda(item.calcTotal)}</p>
                                    </div>
                                    <div class="bg-white/5 p-2 rounded-lg">
                                        <p class="text-[9px] opacity-40 uppercase font-bold">Recebido</p>
                                        <p class="text-sm font-bold text-green-500">${formatarMoeda(item.calcRec)}</p>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="text-right ml-4 mt-6">
                                <span class="text-[9px] font-black uppercase ${isPendente ? 'text-red-500' : 'text-green-500'}">
                                    ${isPendente ? 'Falta Pagar' : 'Liquidado'}
                                </span>
                                <p class="text-lg font-black ${isPendente ? 'text-red-500' : 'text-green-500'}">
                                    ${formatarMoeda(item.calcFalta)}
                                </p>
                                <button class="mt-4 text-[10px] bg-white/10 px-3 py-1 rounded-md uppercase font-bold">
                                    <i class="fa-solid fa-comment-dollar mr-1"></i> Cobrar
                                </button>
                            </div>
                        </div>
                    </div>`;
            }).join('');
        }

        function filtrarStatus(s) {
            filtroStatus = s;
            document.getElementById('btn-pendente').className = s === 'pendente' ? 'filter-btn bg-red-500 text-white px-4 py-2 rounded-full text-xs font-bold uppercase' : 'filter-btn bg-white/5 text-white/50 px-4 py-2 rounded-full text-xs font-bold uppercase';
            document.getElementById('btn-todos').className = s === 'todos' ? 'filter-btn bg-red-500 text-white px-4 py-2 rounded-full text-xs font-bold uppercase' : 'filter-btn bg-white/5 text-white/50 px-4 py-2 rounded-full text-xs font-bold uppercase';
            renderizarFinanceiro();
        }

        function enviarCego(payload) {
            const overlay = document.getElementById('statusOverlay');
            overlay.style.display = 'flex';
            document.getElementById('statusText').innerText = "Processando...";

            fetch(URL_FINANCEIRO, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });

            setTimeout(() => {
                document.getElementById('statusText').innerText = "Sucesso!";
                setTimeout(() => {
                    overlay.style.display = 'none';
                    fecharPopup();
                    const toast = document.getElementById('toast-minimal');
                    toast.style.display = 'flex';
                    setTimeout(() => {
                        toast.style.display = 'none';
                        carregarDados();
                    }, 1500);
                }, 800);
            }, 1000);
        }

        function limparPagos() {
            if (confirm("Deseja realmente excluir permanentemente todos os registros quitados da planilha?")) {
                enviarCego({ action: "limpar_pagos" });
            }
        }

        function abrirPopup() {
            document.getElementById('modalTitle').innerText = "Lançar Débito";
            document.getElementById('formFinanceiro').reset();
            document.getElementById('edit_index').value = "";
            document.getElementById('popupFinanceiro').style.display = 'block';
        }

        function fecharPopup() { 
            document.getElementById('popupFinanceiro').style.display = 'none'; 
            document.getElementById('lista_clientes_financeiro').style.display = 'none';
        }

        function selecionarCliente(nome) {
            document.getElementById('cliente_nome').value = nome;
            document.getElementById('lista_clientes_financeiro').style.display = 'none';
        }

        function prepararEdicao(encoded) {
            const item = JSON.parse(decodeURIComponent(encoded));
            abrirPopup();
            document.getElementById('modalTitle').innerText = "Editar Débito";
            document.getElementById('cliente_nome').value = item.CLIENTE;
            document.getElementById('servico_desc').value = item.SERVICO;
            document.getElementById('valor_total').value = item.VALOR_TOAL || item.VALOR_TOTAL;
            document.getElementById('valor_recebido').value = item.VALOR_RECEBIDO;
            document.getElementById('edit_index').value = item.CLIENTE;
        }

        document.getElementById('formFinanceiro').onsubmit = function(e) {
            e.preventDefault();
            const payload = {
                action: "cadastrar", 
                edit_id: document.getElementById('edit_index').value,
                cliente: document.getElementById('cliente_nome').value,
                servico: document.getElementById('servico_desc').value,
                valor_total: document.getElementById('valor_total').value,
                valor_recebido: document.getElementById('valor_recebido').value
            };
            enviarCego(payload);
        };

        window.addEventListener('click', e => {
            if (!e.target.closest('#dropdown-cliente')) {
                document.getElementById('lista_clientes_financeiro').style.display = 'none';
            }
        });

        window.onload = () => { 
            if(localStorage.getItem('theme') === 'light') toggleTheme();
            carregarDados(); 
            carregarClientes(); 
        };
    </script>
</body>
</html>
