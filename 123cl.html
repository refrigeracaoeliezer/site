<!DOCTYPE html>
<html lang="pt-br"> 
<head>
    <meta charset="UTF-8"> 
    <title>Dashboard de Clientes | Eliezer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet"> 
    
    <style>
        :root {
            --bg-body: #0d1117;
            --text-main: white;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --card-sub: rgba(255, 255, 255, 0.05);
            --input-bg: rgba(255, 255, 255, 0.05);
        }

        body.light-mode {
            --bg-body: #f0f2f5;
            --text-main: #1a1f26;
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(0, 0, 0, 0.1);
            --card-sub: rgba(0, 0, 0, 0.02);
            --input-bg: rgba(0, 0, 0, 0.05);
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg-body); color: var(--text-main); transition: background 0.3s, color 0.3s; }
        
        .glass-card { background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 25px; }
        
        .status-badge { padding: 4px 12px; border-radius: 50px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .em-garantia { background: rgba(16, 185, 129, 0.2); color: #10b981; border: 1px solid #10b981; }
        .fora-garantia { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid #ef4444; }
        
        .search-input { background: var(--input-bg); border: 1px solid var(--glass-border); color: var(--text-main); outline: none; }
        .item-servico { border-bottom: 1px dashed var(--glass-border); padding: 5px 0; }

        .theme-toggle { background: var(--input-bg); border: 1px solid var(--glass-border); color: var(--text-main); width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        .edit-btn { background: #3b82f6; color: white; width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .edit-btn:hover { transform: scale(1.1); background: #2563eb; }

        .delete-btn { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .delete-btn:hover { background: #ef4444; color: white; transform: scale(1.1); }
    </style>
</head>
<body class="p-4 pb-10">

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-xl font-black uppercase tracking-tighter">Histórico de <span class="text-blue-500">Serviços</span></h1>
                <span class="text-[10px] text-blue-400 font-bold uppercase tracking-widest">Refrigeração Eliezer</span>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleTheme()" class="theme-toggle">
                    <i id="theme-icon" class="fa-solid fa-sun"></i>
                </button>
                <a href="index.html" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center border border-white/10">
                    <i class="fa-solid fa-arrow-left"></i>
                </a>
            </div>
        </header>

        <div class="glass-card p-4 mb-6">
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-white/20"></i>
                <input type="text" id="inputBusca" onkeyup="filtrarHistorico()" placeholder="Buscar pelo Nome ou nº O.S" class="w-full p-4 pl-12 rounded-2xl search-input font-semibold">
            </div>
        </div>

        <div id="container-historico" class="space-y-4">
            <div class="text-center py-10 text-white/20 font-bold uppercase tracking-widest text-xs">
                Carregando histórico...
            </div>
        </div>
    </div>

    
    
    
    
    
    
    
    
    
    
    
    
    <script>
    const URL_DATABASE = "https://script.google.com/macros/s/AKfycbx27IVxqdpT4NJUQeBYR07ul4XNEDzgI92IfZJ6JoOgzZbsRQUiZo0YoMr7lXKVGIjD/exec"; // Certifique-se de atualizar após o novo Deploy



    // 2. Função para buscar os dados da planilha (Aciona o doGet do Script)
    async function carregarDados() {
        try {
            const response = await fetch(URL_DATABASE, { redirect: "follow" });
            const dados = await response.json();
            // Inverte a lista para que as OS mais recentes apareçam no topo
            renderizarCards(dados.reverse());
        } catch (error) {
            console.error("Erro ao carregar dados:", error);
            const container = document.getElementById('container-historico');
            if (container) {
                container.innerHTML = `<div class="text-center py-10 text-red-400 font-bold uppercase text-xs">
                    Erro ao conectar com a planilha. Verifique a URL do Deploy.
                </div>`;
            }
        }
    }

    // 3. Função para preparar a edição e navegar para a próxima página
    function editarServico(dadosString) {
        try {
            // Decodifica a string JSON que foi enviada pelo botão
            const os = JSON.parse(decodeURIComponent(dadosString));
            
            // Salva o objeto completo no localStorage para ser lido pela página 12os.html
            localStorage.setItem('editar_os_dados', JSON.stringify(os));
            
            // Redireciona para a página de formulário/edição
            window.location.href = "12os.html"; 
        } catch (e) {
            console.error("Erro ao preparar edição:", e);
            alert("Erro ao carregar dados para edição.");
        }
    }

    // 4. Função para construir os cards na tela
    function renderizarCards(lista) {
        const container = document.getElementById('container-historico');
        if (!container) return;
        
        container.innerHTML = "";
        
        lista.forEach(os => {
            // Tratamento de datas e status de garantia
            const dataGarantia = formatarDataBR(os.DATA_FIM_GARANTIA);
            const estaNaGarantia = verificarGarantia(os.DATA_FIM_GARANTIA);
            
            // Processa a string de serviços (Coluna F) separada por "|"
            const servicosTexto = os.TIPO_DE_SERVICO || "";
            const servicosArray = servicosTexto.toString().split('|');
            let htmlServicos = servicosArray.map(srv => 
                srv.trim() !== "" ? `<div class="item-servico text-xs text-white/70 italic">${srv.trim()}</div>` : ""
            ).join("");

            // Transforma o objeto da OS em uma string segura para ser passada no onclick do botão
            const dadosParaEdicao = encodeURIComponent(JSON.stringify(os));

            container.innerHTML += `
                <div class="glass-card p-6 card-item">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span class="text-[10px] font-black text-blue-500 uppercase tracking-widest">OS #${os.ID_OS}</span>
                            <h2 class="text-lg font-bold nome-cliente leading-tight">${os.CLIENTE || 'Cliente s/ nome'}</h2>
                            <p class="text-[10px] text-white/40 uppercase font-bold mt-1">${os.ENDERECO || '---'}</p>
                        </div>
                        <div class="flex flex-col items-end gap-2">
                            <span class="status-badge ${estaNaGarantia ? 'em-garantia' : 'fora-garantia'}">
                                ${estaNaGarantia ? '🟢 Em Garantia' : '🔴 Fora'}
                            </span>
                            <div class="flex gap-2">
                                <button onclick="editarServico('${dadosParaEdicao}')" class="edit-btn" title="Editar OS">
                                    <i class="fa-solid fa-pen-to-square"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white/5 rounded-xl p-4 mb-4">
                        <span class="text-[9px] font-black text-white/30 uppercase block mb-2 tracking-widest">Serviços Executados:</span>
                        ${htmlServicos || '<div class="text-[10px] text-white/20 italic">Nenhum serviço registrado</div>'}
                    </div>
                    <div class="grid grid-cols-2 gap-4 text-[10px] font-bold uppercase">
                        <div>
                            <span class="text-white/30 block mb-1">Valor Total</span>
                            <span class="text-blue-400 text-sm font-black">R$ ${os.VALOR_TOTAL || '0,00'}</span>
                        </div>
                        <div>
                            <span class="text-white/30 block mb-1">Garantia até</span>
                            <span class="${estaNaGarantia ? 'text-green-400' : 'text-red-400'} text-sm">${dataGarantia}</span>
                        </div>
                    </div>
                </div>`;
        });
    }

    // 5. Funções Auxiliares de Formatação
    function formatarDataBR(dataPlanilha) {
        if (!dataPlanilha || dataPlanilha === "---") return "---";
        // Se a data vier no formato ISO do Google (com 'T'), converte para BR
        if (dataPlanilha.toString().includes('T')) {
            const d = new Date(dataPlanilha);
            return d.toLocaleDateString('pt-BR', { timeZone: 'UTC' });
        }
        return dataPlanilha;
    }

    function verificarGarantia(dataFimGarantia) {
        if (!dataFimGarantia || dataFimGarantia === "---") return false;
        const hoje = new Date();
        hoje.setHours(0, 0, 0, 0); // Zera as horas para comparação justa

        let dataFim;
        if (dataFimGarantia.toString().includes('/')) {
            const partes = dataFimGarantia.split('/');
            dataFim = new Date(partes[2], partes[1] - 1, partes[0]);
        } else {
            dataFim = new Date(dataFimGarantia);
        }
        return hoje <= dataFim;
    }

    // Inicialização ao carregar a página
    window.onload = carregarDados;
</script>
</body>
</html>
