<!DOCTYPE html>
<html lang="pt-br"> 
<head>
    <meta charset="UTF-8">
    <title>Dashboard de Clientes | Eliezer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">   
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet"> 
    
    <style>
        :root {
            --bg-body: #0d1117;
            --text-main: white;
            --text-sub: rgba(255, 255, 255, 0.4);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --card-sub: rgba(255, 255, 255, 0.05);
            --input-bg: rgba(255, 255, 255, 0.05);
        }

        /* CORREÇÃO DE CORES PARA O MODO CLARO */
        body.light-mode {
            --bg-body: #f0f2f5;
            --text-main: #1a1f26;
            --text-sub: #4b5563; /* Cinza escuro para visibilidade total */
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(0, 0, 0, 0.1);
            --card-sub: rgba(0, 0, 0, 0.04);
            --input-bg: rgba(255, 255, 255, 0.9);
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg-body); color: var(--text-main); transition: background 0.3s, color 0.3s; }
        .glass-card { background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 25px; }
        
        /* Badges e Textos Secundários */
        .status-badge { padding: 4px 12px; border-radius: 50px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .em-garantia { background: rgba(16, 185, 129, 0.2); color: #10b981; border: 1px solid #10b981; }
        .fora-garantia { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid #ef4444; }
        
        .search-input { background: var(--input-bg); border: 1px solid var(--glass-border); color: var(--text-main); outline: none; }
        .item-servico { border-bottom: 1px dashed var(--glass-border); padding: 5px 0; color: var(--text-sub); } /* Ajustado */

        .theme-toggle { background: var(--input-bg); border: 1px solid var(--glass-border); color: var(--text-main); width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        .edit-btn { background: #3b82f6; color: white; width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .edit-btn:hover { transform: scale(1.1); background: #2563eb; }

        .delete-btn { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .delete-btn:hover { background: #ef4444; color: white; transform: scale(1.1); }

        /* Estilo do Modal Profissional */
        #modal-excluir { transition: all 0.3s ease; }
        .modal-content { background: var(--bg-body); border: 1px solid var(--glass-border); color: var(--text-main); }
    </style>
</head>
<body class="p-4 pb-10">

    <div id="modal-excluir" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
        <div class="modal-content w-full max-w-sm p-8 rounded-[30px] shadow-2xl text-center">
            <div class="w-16 h-16 bg-red-500/20 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl border border-red-500/30">
                <i class="fa-solid fa-trash-can"></i>
            </div>
            <h3 class="text-xl font-black uppercase mb-2">Excluir Serviço?</h3>
            <p class="text-xs font-medium opacity-60 mb-8 px-4" id="modal-msg-id">Esta ação não poderá ser desfeita na sua planilha de controle.</p>
            <div class="flex gap-3">
                <button onclick="fecharModal()" class="flex-1 py-4 rounded-2xl bg-white/5 font-bold uppercase text-[10px] tracking-widest border border-white/10 hover:bg-white/10 transition">Cancelar</button>
                <button id="btn-confirmar-exclusao" class="flex-1 py-4 rounded-2xl bg-red-500 text-white font-bold uppercase text-[10px] tracking-widest shadow-lg shadow-red-500/20 hover:bg-red-600 transition">Sim, Apagar</button>
            </div>
        </div>
    </div>

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-xl font-black uppercase tracking-tighter">Histórico de <span class="text-blue-500">Serviços</span></h1>
                <span class="text-[10px] text-blue-400 font-bold uppercase tracking-widest">Refrigeração Eliezer</span>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleTheme()" class="theme-toggle">
                    <i id="theme-icon" class="fa-solid fa-sun"></i>
                </button>
                <a href="index.html" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center border border-white/10">
                    <i class="fa-solid fa-arrow-left"></i>
                </a>
            </div>
        </header>

        <div class="glass-card p-4 mb-6">
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 opacity-20"></i>
                <input type="text" id="inputBusca" onkeyup="filtrarHistorico()" placeholder="Buscar pelo Nome ou nº O.S" class="w-full p-4 pl-12 rounded-2xl search-input font-semibold">
            </div>
        </div>

        <div id="container-historico" class="space-y-4">
            <div class="text-center py-10 opacity-20 font-bold uppercase tracking-widest text-xs">
                Carregando histórico...
            </div>
        </div>
    </div>

    <script>
    const URL_DATABASE = "https://script.google.com/macros/s/AKfycbzlBMg9ZmXcC00g1wquhExRJ72WuWYLpjr0ilX-a6ppwuLeXdr6QMV86Zw14p3NIQ4eVQ/exec";
    let idParaExcluirGlobal = null;

    function toggleTheme() {
        const body = document.body;
        const icon = document.getElementById('theme-icon');
        body.classList.toggle('light-mode');
        localStorage.setItem('theme', body.classList.contains('light-mode') ? 'light' : 'dark');
        icon.className = body.classList.contains('light-mode') ? 'fa-solid fa-moon' : 'fa-solid fa-sun';
    }

    async function carregarDados() {
        try {
            const response = await fetch(URL_DATABASE, { redirect: "follow" });
            const dados = await response.json();
            const ultimosDez = dados.slice(-10).reverse();
            renderizarCards(ultimosDez);
        } catch (error) {
            console.error("Erro na requisição:", error);
            document.getElementById('container-historico').innerHTML = "Erro ao conectar com a planilha.";
        }
    }

    /* FUNÇÕES DO MODAL PROFISSIONAL */
    function abrirModalExcluir(id) {
        idParaExcluirGlobal = id;
        document.getElementById('modal-msg-id').innerText = `Tem certeza que deseja excluir a OS #${id}?`;
        document.getElementById('modal-excluir').classList.remove('hidden');
    }

    function fecharModal() {
        document.getElementById('modal-excluir').classList.add('hidden');
        idParaExcluirGlobal = null;
    }

    document.getElementById('btn-confirmar-exclusao').onclick = async function() {
        if (!idParaExcluirGlobal) return;
        const btn = this;
        btn.innerText = "Excluindo...";
        btn.disabled = true;

        try {
            const response = await fetch(`${URL_DATABASE}?deleteID=${idParaExcluirGlobal}`, { redirect: "follow" });
            const res = await response.json();
            if (res.status === "success") {
                fecharModal();
                carregarDados();
            } else { alert("Erro ao excluir na planilha."); }
        } catch (error) { alert("Erro de conexão ao tentar excluir."); }
        finally {
            btn.innerText = "Sim, Apagar";
            btn.disabled = false;
        }
    };

    function verificarGarantia(dataFimGarantia) {
        if (!dataFimGarantia || dataFimGarantia === "---") return false;
        const hoje = new Date();
        const partes = dataFimGarantia.toString().split('/');
        if (partes.length !== 3) return false;
        const dataFim = new Date(partes[2], partes[1] - 1, partes[0]);
        return hoje <= dataFim;
    }

    function editarServico(dadosString) {
        const os = JSON.parse(decodeURIComponent(dadosString));
        const diasDaColunaL = os["DIA"] || 90; 
        const pacoteCompleto = { ...os, "GARANTIA_DIAS_CALCULADOS": diasDaColunaL };
        localStorage.setItem('editar_os_dados', JSON.stringify(pacoteCompleto));
        window.location.href = "12os.html"; 
    }

    function formatarDataBR(dataPlanilha) {
        if (!dataPlanilha || dataPlanilha === "---") return "---";
        if (dataPlanilha.toString().includes('T')) {
            const d = new Date(dataPlanilha);
            return d.toLocaleDateString('pt-BR', { timeZone: 'UTC' });
        }
        return dataPlanilha;
    }

    function renderizarCards(lista) {
        const container = document.getElementById('container-historico');
        container.innerHTML = "";
        lista.forEach(os => {
            const idOS = os["ID_OS"] || "---";
            const cliente = os["CLIENTE"] || "Não identificado";
            const endereco = os["ENDERECO"] || os["ENDEREÇO"] || "---"; 
            const servicosTexto = os["TIPO_DE_SERVICO"] || os["TIPO_DE_SERVIÇO"] || ""; 
            const valorTotal = os["VALOR_TOTAL"] || "0,00"; 
            const dataGarantia = formatarDataBR(os["DATA_FIM_GARANTIA"]); 

            const servicosArray = servicosTexto.toString().split('|');
            let htmlServicos = "";
            servicosArray.forEach(srv => {
                if(srv.trim() !== "") {
                    htmlServicos += `<div class="item-servico text-xs italic">${srv.trim()}</div>`;
                }
            });

            const estaNaGarantia = verificarGarantia(dataGarantia);
            const badgeClass = estaNaGarantia ? "em-garantia" : "fora-garantia";
            const badgeText = estaNaGarantia ? "🟢 Em Garantia" : "🔴 Fora da Garantia";
            const dadosParaEdicao = encodeURIComponent(JSON.stringify(os));

            container.innerHTML += `
                <div class="glass-card p-6 card-item">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span class="text-[10px] font-black text-blue-500 uppercase tracking-widest">OS #${idOS}</span>
                            <h2 class="text-lg font-bold leading-tight">${cliente}</h2>
                            <p class="text-[10px] uppercase font-bold mt-1" style="color: var(--text-sub)">${endereco}</p>
                        </div>
                        <div class="flex flex-col items-end gap-2">
                            <span class="status-badge ${badgeClass}">${badgeText}</span>
                            <div class="flex gap-2">
                                <button onclick="editarServico('${dadosParaEdicao}')" class="edit-btn" title="Editar Orçamento">
                                    <i class="fa-solid fa-pen-to-square"></i>
                                </button>
                                <button onclick="abrirModalExcluir('${idOS}')" class="delete-btn" title="Excluir OS">
                                    <i class="fa-solid fa-trash-can"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white/5 rounded-xl p-4 mb-4" style="background: var(--card-sub)">
                        <span class="text-[9px] font-black uppercase block mb-2 tracking-widest opacity-30">Serviços Executados:</span>
                        ${htmlServicos || '<div class="text-[10px] opacity-20 italic">Nenhum serviço registrado</div>'}
                    </div>
                    <div class="grid grid-cols-2 gap-4 text-[10px] font-bold uppercase">
                        <div>
                            <span class="block mb-1 opacity-30">Valor Cobrado</span>
                            <span class="text-blue-400 text-sm font-black">R$ ${valorTotal}</span>
                        </div>
                        <div>
                            <span class="block mb-1 opacity-30">Término da Garantia</span>
                            <span class="${estaNaGarantia ? 'text-green-400' : 'text-red-400'} text-sm">${dataGarantia}</span>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    function filtrarHistorico() {
        const termo = document.getElementById('inputBusca').value.toLowerCase();
        const cards = document.querySelectorAll('.card-item');
        cards.forEach(card => {
            const texto = card.innerText.toLowerCase();
            card.style.display = texto.includes(termo) ? 'block' : 'none';
        });
    }

    window.onload = () => {
        if(localStorage.getItem('theme') === 'light') toggleTheme();
        carregarDados();
    };
</script>
</body>
</html>
