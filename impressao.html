<!DOCTYPE html>

<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=1024"> 

    <title>Orçamento Técnico</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    

    <style>

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }

        

        body { background-color: #525659; display: flex; justify-content: center; padding: 20px 0; }



        /* Botão PDF Flutuante */

        .btn-flutuante {

            position: fixed;

            bottom: 30px;

            right: 30px;

            z-index: 10000;

            background-color: #e74c3c;

            color: white;

            width: 65px;

            height: 65px;

            border-radius: 50%;

            border: none;

            box-shadow: 0 5px 20px rgba(0,0,0,0.5);

            cursor: pointer;

            display: flex;

            align-items: center;

            justify-content: center;

            font-size: 28px;

        }



        /* Container A4 */

        .paper-canvas {

            background-color: #fff;

            width: 210mm;

            height: 297mm;

            padding: 15mm;

            display: flex;

            flex-direction: column;

            position: relative;

            box-shadow: 0 0 15px rgba(0,0,0,0.3);

            overflow: hidden;

        }



        /* Força o cabeçalho a aparecer sempre */

        header { 

            display: flex; 

            justify-content: space-between; 

            align-items: flex-start;

            border-bottom: 3px solid #1a4388;

            padding-bottom: 10px;

            margin-bottom: 20px;

            width: 100%;

        }



        .logo-area { width: 250px; min-height: 100px; }

        .logo-img { width: 100%; height: auto; display: block; }

        

        .empresa-info { font-size: 12px; color: #333; line-height: 1.4; margin-top: 5px; }

        .doc-info { text-align: right; }

        .doc-info h2 { color: #1a4388; font-size: 24px; font-weight: 900; }



        .client-box { 

            display: grid; 

            grid-template-columns: 1fr 1fr; 

            background: #f8f9fa;

            padding: 15px;

            border-radius: 5px;

            font-size: 13px;

            margin-bottom: 20px;

        }



        .tabela-container { flex-grow: 1; }

        table { width: 100%; border-collapse: collapse; }

        table th { background: #1a4388; color: white; padding: 10px; text-align: left; font-size: 12px; }

        table td { border-bottom: 1px solid #eee; padding: 10px; font-size: 14px; }



        .total-section { text-align: right; padding: 20px 0; }

        .total-section h3 { font-size: 30px; color: #1a4388; }



        /* Container de Observação (Amarelo e sem ultrapassar) */

        .obs-section { 

            background: #fffbe6; 

            padding: 15px; 

            border: 1px solid #ffe58f;

            border-radius: 5px; 

            font-size: 13px; 

            margin-bottom: 20px;

            word-wrap: break-word;

            overflow-wrap: break-word;

            word-break: break-all;

            max-width: 100%;

        }



        footer { text-align: center; font-size: 11px; color: #777; border-top: 1px solid #eee; padding-top: 15px; }



        @media print { .no-print { display: none !important; } }

    </style>

</head>

<body>



    <button class="btn-flutuante no-print" onclick="baixarPDF()">

        <i class="fa-solid fa-file-pdf"></i>

    </button>



    <div class="paper-canvas" id="conteudo-pdf">

        <header>

            <div class="logo-area">

                <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgdGGsULMI69OabXBfFU3b8mTYfIWlJoqpwgc_q1UvSITQPj_VQYaW_1cLECh4rF7j5RfhJLsPgUXdvNv-ya494kAfeyZRbdTCn-VFesltpIkZp8Xid-MZwLKBLyC89MTSXf76nrCrBHncl86cYzjm1XuG34hvNrNVkZS8Gkq3FJEZHEb99HL26I52RUqc/w512-h237/TOPO%20POSTO%20RIO%20BRANCO.png" class="logo-img" crossorigin="anonymous">

                <div class="empresa-info">

                    <strong>REFRIGERAÇÃO ELIEZER</strong><br>

                    CNPJ: 00.000.000/0001-00<br>

                    Corumbá - MS | Tel: (67) 99999-9999

                </div>

            </div>

            <div class="doc-info">

                <h2 id="view-tipo">ORÇAMENTO</h2>

                <p>Nº <span id="num-random"></span></p>

            </div>

        </header>



        <div class="client-box">

            <div>

                <strong>CLIENTE:</strong> <span id="view-cliente"></span><br>

                <strong>ENDEREÇO:</strong> <span id="view-endereco"></span>

            </div>

            <div style="text-align: right;">

                <strong>DATA:</strong> <span id="view-data"></span><br>

                <strong>VENC.:</strong> <span id="view-venc"></span>

            </div>

        </div>



        <div class="tabela-container">

            <table>

                <thead>

                    <tr>

                        <th>DESCRIÇÃO DOS SERVIÇOS</th>

                        <th style="text-align: center; width: 50px;">QTD</th>

                        <th style="text-align: right; width: 120px;">TOTAL</th>

                    </tr>

                </thead>

                <tbody id="tabela-corpo"></tbody>

            </table>

        </div>



        <div class="total-section">

            <p style="font-size: 12px; font-weight: bold; color: #666;">INVESTIMENTO TOTAL</p>

            <h3 id="view-total"></h3>

        </div>



        <div class="obs-section">

            <strong style="color: #856404;">OBSERVAÇÕES TÉCNICAS:</strong>

            <p id="view-obs" style="white-space: pre-wrap; margin-top: 5px; color: #856404;"></p>

        </div>



        <footer>

            <p><strong>REFRIGERAÇÃO ELIEZER | Responsável Técnico</strong></p>

            <p>Garantia de 90 dias conforme legislação vigente.</p>

        </footer>

    </div>



    <script>

        document.getElementById('num-random').innerText = Math.floor(100 + Math.random() * 899) + '/2026';

        const dados = JSON.parse(localStorage.getItem('dados_impressao'));



        if(dados) {

            document.getElementById('view-tipo').innerText = dados.tipo;

            document.getElementById('view-cliente').innerText = dados.cliente;

            document.getElementById('view-endereco').innerText = dados.endereco;

            document.getElementById('view-data').innerText = dados.emissao;

            document.getElementById('view-venc').innerText = dados.validade;

            document.getElementById('view-total').innerText = 'R$ ' + dados.total;

            document.getElementById('view-obs').innerText = dados.obs || "Nenhuma observação técnica registrada.";



            const corpo = document.getElementById('tabela-corpo');

            dados.itens.forEach(i => {

                corpo.innerHTML += `<tr><td>${i.descricao}</td><td style="text-align:center">${i.qtd}</td><td style="text-align:right">R$ ${i.valor}</td></tr>`;

            });

        }



        function baixarPDF() {

            const element = document.getElementById('conteudo-pdf');

            const opt = {

                margin: 0,

                filename: `Orcamento_${dados.cliente}.pdf`,

                image: { type: 'jpeg', quality: 1 },

                html2canvas: { 

                    scale: 3, 

                    useCORS: true, 

                    logging: false,

                    allowTaint: true // Permite capturar imagens de outros domínios

                },

                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }

            };

            

            // Pequeno delay para garantir que o navegador "desenhou" a logo antes de capturar

            setTimeout(() => {

                html2pdf().set(opt).from(element).save();

            }, 500);

        }

    </script>

</body>

</html>
