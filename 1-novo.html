<!DOCTYPE html>
<html lang="pt-br" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dra. Nome da Advogada | Gestão Processual</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        pearl: '#FDFCF8',
                        softBlack: '#1A1A1A',
                        satinGold: '#C5A059',
                        darkGold: '#A37E3B'
                    },
                    fontFamily: {
                        serif: ['Cinzel', 'serif'],
                        sans: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        .timeline-line::before {
            content: '';
            position: absolute;
            left: 20px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #C5A059;
            opacity: 0.3;
        }
        .modal-blur { backdrop-filter: blur(8px); }
        .gold-gradient { background: linear-gradient(135deg, #C5A059 0%, #A37E3B 100%); }
    </style>
</head>
<body class="bg-pearl dark:bg-softBlack text-softBlack dark:text-pearl min-h-screen font-sans transition-colors duration-300">

    <header class="fixed top-0 w-full z-50 p-4 flex justify-between items-center bg-pearl/80 dark:bg-softBlack/80 backdrop-blur-md border-b border-satinGold/20">
        <button id="installApp" class="hidden bg-satinGold hover:bg-darkGold text-white px-4 py-2 rounded-full text-xs font-bold transition-all shadow-lg animate-bounce">
            <i class="fas fa-download mr-2"></i>INSTALAR APP
        </button>
        
        <div class="flex gap-4 items-center ml-auto">
            <button onclick="toggleDarkMode()" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition-all">
                <i id="themeIcon" class="fas fa-moon text-satinGold text-xl"></i>
            </button>
            <button onclick="openAdminLogin()" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition-all">
                <i class="fas fa-cog text-satinGold text-xl"></i>
            </button>
        </div>
    </header>

    <main class="pt-24 pb-12 px-4 max-w-lg mx-auto">
        
        <section id="view-bio" class="text-center mb-12">
            <div class="relative w-32 h-32 mx-auto mb-4">
                <img id="bio-img" src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?q=80&w=256" alt="Advogada" class="rounded-full object-cover border-4 border-satinGold shadow-2xl">
            </div>
            <h1 id="bio-name" class="font-serif text-2xl font-bold tracking-widest text-darkGold mb-1 uppercase">Dra. Amanda Silva</h1>
            <p id="bio-oab" class="text-sm font-semibold opacity-70 mb-2">OAB/SP 000.000</p>
            <p id="bio-desc" class="text-sm italic px-6 mb-4">Especialista em Direito do Trabalho, defendendo os direitos do trabalhador com excelência e transparência.</p>
            <div class="flex justify-center gap-6 text-satinGold">
                <a id="bio-phone" href="#"><i class="fas fa-phone"></i></a>
                <a id="bio-email" href="#"><i class="fas fa-envelope"></i></a>
            </div>
        </section>

        <section id="view-client-search" class="bg-white dark:bg-zinc-900 p-8 rounded-3xl shadow-xl border border-satinGold/10">
            <h3 class="font-serif text-xl mb-6 text-center">Consultar meu Processo</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-xs uppercase font-bold text-satinGold">CPF do Reclamante</label>
                    <input type="text" id="searchCpf" placeholder="000.000.000-00" class="w-full bg-transparent border-b-2 border-gray-300 dark:border-zinc-700 py-2 outline-none focus:border-satinGold transition-all">
                </div>
                <button onclick="handleClientSearch()" class="w-full gold-gradient text-white font-bold py-3 rounded-xl shadow-lg hover:scale-105 transition-transform">
                    ACESSAR LINHA DO TEMPO
                </button>
            </div>
        </section>

        <section id="view-timeline" class="hidden space-y-6">
            <button onclick="showView('view-client-search')" class="text-satinGold font-bold text-sm mb-4"><i class="fas fa-arrow-left mr-2"></i>Voltar</button>
            <div class="border-l-4 border-satinGold pl-6 ml-2 space-y-8" id="timeline-content">
                </div>
        </section>

        <section id="view-admin-dash" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-serif text-xl">Painel de Gestão</h2>
                <button onclick="openBioSettings()" class="text-satinGold"><i class="fas fa-user-edit text-xl"></i></button>
            </div>
            <input type="text" id="adminSearch" onkeyup="filterAdminList()" placeholder="Buscar Nome ou CPF..." class="w-full mb-6 p-3 rounded-xl bg-white dark:bg-zinc-900 border border-satinGold/20 outline-none">
            
            <div id="admin-client-list" class="space-y-4">
                </div>
        </section>

    </main>

    <button id="fab-add" onclick="openClientModal()" class="hidden fixed bottom-8 right-8 w-14 h-14 rounded-full gold-gradient text-white shadow-2xl flex items-center justify-center text-2xl">
        <i class="fas fa-plus"></i>
    </button>

    <div id="modal-login" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 modal-blur bg-black/50">
        <div class="bg-pearl dark:bg-zinc-900 w-full max-w-sm p-8 rounded-3xl border border-satinGold/30">
            <h3 class="font-serif text-2xl mb-6 text-center">Acesso Restrito</h3>
            <input type="text" id="userLogin" placeholder="Usuário" class="w-full mb-4 p-3 rounded-lg border dark:bg-zinc-800 outline-none focus:border-satinGold">
            <input type="password" id="passLogin" placeholder="Senha" class="w-full mb-6 p-3 rounded-lg border dark:bg-zinc-800 outline-none focus:border-satinGold">
            <div class="flex gap-2">
                <button onclick="closeModal('modal-login')" class="flex-1 py-3 font-bold opacity-50">Cancelar</button>
                <button onclick="handleLogin()" class="flex-1 gold-gradient text-white py-3 rounded-xl font-bold">Entrar</button>
            </div>
        </div>
    </div>

    <div id="modal-client" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 modal-blur bg-black/50 overflow-y-auto">
        <div class="bg-pearl dark:bg-zinc-900 w-full max-w-md p-8 my-auto rounded-3xl border border-satinGold/30">
            <h3 id="modal-title" class="font-serif text-xl mb-6">Novo Cliente</h3>
            <div class="space-y-4 text-sm">
                <input type="hidden" id="edit-client-id">
                <input type="text" id="c-nome" placeholder="Nome Completo" class="w-full p-3 rounded-lg border dark:bg-zinc-800">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="c-cpf" placeholder="CPF" class="w-full p-3 rounded-lg border dark:bg-zinc-800">
                    <input type="text" id="c-senha" placeholder="Senha de Acesso" class="w-full p-3 rounded-lg border dark:bg-zinc-800">
                </div>
                <input type="email" id="c-email" placeholder="E-mail" class="w-full p-3 rounded-lg border dark:bg-zinc-800">
                <input type="text" id="c-tel" placeholder="WhatsApp" class="w-full p-3 rounded-lg border dark:bg-zinc-800">
                
                <div class="flex items-center gap-2 p-2 bg-gray-100 dark:bg-zinc-800 rounded-lg">
                    <input type="checkbox" id="c-notif" class="accent-satinGold w-4 h-4">
                    <label for="c-notif" class="text-[10px] uppercase font-bold">Autorizar notificações por e-mail</label>
                </div>

                <div id="area-atualizacao" class="hidden pt-4 border-t border-satinGold/20">
                    <label class="text-xs font-bold text-satinGold uppercase">Adicionar Nova Atualização</label>
                    <select id="a-status" class="w-full p-3 mt-2 rounded-lg border dark:bg-zinc-800">
                        <option value="Petição Inicial">Petição Inicial</option>
                        <option value="Citação da Reclamada">Citação</option>
                        <option value="Audiência de Conciliação">Audiência de Conciliação</option>
                        <option value="Audiência de Instrução">Instrução</option>
                        <option value="Alegações Finais">Alegações Finais</option>
                        <option value="Sentença">Sentença</option>
                        <option value="Recurso Ordinário">Recurso Ordinário</option>
                    </select>
                    <textarea id="a-desc" placeholder="Descrição dos detalhes..." class="w-full p-3 mt-2 rounded-lg border dark:bg-zinc-800 h-20"></textarea>
                </div>
            </div>
            <div class="flex gap-2 mt-6">
                <button onclick="closeModal('modal-client')" class="flex-1 py-3 font-bold opacity-50">Sair</button>
                <button onclick="saveClient()" class="flex-1 gold-gradient text-white py-3 rounded-xl font-bold shadow-lg">Salvar Dados</button>
            </div>
        </div>
    </div>

    <div id="modal-bio" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 modal-blur bg-black/50">
        <div class="bg-pearl dark:bg-zinc-900 w-full max-w-sm p-8 rounded-3xl border border-satinGold/30">
            <h3 class="font-serif text-xl mb-6">Configurar Bio</h3>
            <div class="space-y-4">
                <input type="text" id="config-name" placeholder="Nome" class="w-full p-3 rounded-lg border dark:bg-zinc-800">
                <input type="text" id="config-oab" placeholder="OAB" class="w-full p-3 rounded-lg border dark:bg-zinc-800">
                <textarea id="config-desc" placeholder="Bio Curta" class="w-full p-3 rounded-lg border dark:bg-zinc-800"></textarea>
                <input type="text" id="config-img" placeholder="URL da Foto" class="w-full p-3 rounded-lg border dark:bg-zinc-800">
            </div>
            <button onclick="saveBio()" class="w-full gold-gradient text-white py-3 rounded-xl font-bold mt-6">Salvar Alterações</button>
        </div>
    </div>

    <script>
        // --- DATA STATE (Simulando Banco de Dados) ---
        let dbClients = JSON.parse(localStorage.getItem('db_adv_clients')) || [];
        let bioData = JSON.parse(localStorage.getItem('db_adv_bio')) || {
            name: "Dra. Amanda Silva",
            oab: "OAB/SP 452.123",
            desc: "Especialista em Direito do Trabalho, defendendo os direitos do trabalhador com excelência e transparência.",
            img: "https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?q=80&w=256",
            phone: "(11) 98888-7777",
            email: "contato@advocacia.com"
        };

        // --- CORE FUNCTIONS ---
        window.onload = () => {
            renderBio();
            checkPWA();
        };

        function showView(viewId) {
            ['view-client-search', 'view-timeline', 'view-admin-dash'].forEach(v => {
                document.getElementById(v).classList.add('hidden');
            });
            document.getElementById(viewId).classList.remove('hidden');
            document.getElementById('fab-add').classList.toggle('hidden', viewId !== 'view-admin-dash');
        }

        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            document.getElementById('themeIcon').className = isDark ? 'fas fa-sun text-satinGold text-xl' : 'fas fa-moon text-satinGold text-xl';
        }

        // --- PWA LOGIC ---
        let deferredPrompt;
        function checkPWA() {
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                document.getElementById('installApp').classList.remove('hidden');
            });
        }
        document.getElementById('installApp').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') document.getElementById('installApp').classList.add('hidden');
            }
        });

        // --- BIO LOGIC ---
        function renderBio() {
            document.getElementById('bio-name').innerText = bioData.name;
            document.getElementById('bio-oab').innerText = bioData.oab;
            document.getElementById('bio-desc').innerText = bioData.desc;
            document.getElementById('bio-img').src = bioData.img;
            document.getElementById('bio-phone').href = `tel:${bioData.phone}`;
            document.getElementById('bio-email').href = `mailto:${bioData.email}`;
        }

        function openBioSettings() {
            document.getElementById('config-name').value = bioData.name;
            document.getElementById('config-oab').value = bioData.oab;
            document.getElementById('config-desc').value = bioData.desc;
            document.getElementById('config-img').value = bioData.img;
            document.getElementById('modal-bio').classList.remove('hidden');
        }

        function saveBio() {
            bioData = {
                ...bioData,
                name: document.getElementById('config-name').value,
                oab: document.getElementById('config-oab').value,
                desc: document.getElementById('config-desc').value,
                img: document.getElementById('config-img').value
            };
            localStorage.setItem('db_adv_bio', JSON.stringify(bioData));
            renderBio();
            closeModal('modal-bio');
            notify("Perfil atualizado com sucesso!");
        }

        // --- CLIENT SIDE LOGIC ---
        function handleClientSearch() {
            const cpf = document.getElementById('searchCpf').value;
            const client = dbClients.find(c => c.cpf === cpf);
            
            if (client) {
                const pass = prompt("Digite sua senha de acesso:");
                if (pass === client.senha) {
                    renderTimeline(client);
                    showView('view-timeline');
                } else {
                    alert("Senha incorreta!");
                }
            } else {
                alert("CPF não localizado na base de dados.");
            }
        }

        function renderTimeline(client) {
            const container = document.getElementById('timeline-content');
            container.innerHTML = '';
            
            // Ordem Reversa: Última atualização no TOPO
            const sortedEvents = [...client.eventos].reverse();

            sortedEvents.forEach(ev => {
                container.innerHTML += `
                    <div class="relative bg-white dark:bg-zinc-800 p-5 rounded-2xl shadow-md border-l-4 border-satinGold">
                        <div class="absolute -left-[31px] top-6 w-4 h-4 rounded-full bg-satinGold"></div>
                        <p class="text-[10px] font-bold text-satinGold uppercase mb-1">${ev.data}</p>
                        <h4 class="font-serif font-bold text-lg">${ev.status}</h4>
                        <p class="text-sm opacity-80 mt-2">${ev.descricao}</p>
                    </div>
                `;
            });
        }

        // --- ADMIN SIDE LOGIC ---
        function openAdminLogin() { 
            document.getElementById('modal-login').classList.remove('hidden'); 
        }

        function handleLogin() {
            if(document.getElementById('userLogin').value === 'admin' && document.getElementById('passLogin').value === 'admin') {
                closeModal('modal-login');
                showView('view-admin-dash');
                renderAdminList();
            } else {
                alert("Acesso Negado");
            }
        }

        function renderAdminList() {
            const list = document.getElementById('admin-client-list');
            list.innerHTML = '';
            dbClients.forEach((c, idx) => {
                list.innerHTML += `
                    <div class="bg-white dark:bg-zinc-800 p-4 rounded-2xl flex justify-between items-center shadow-sm border border-gray-100 dark:border-zinc-700">
                        <div>
                            <p class="font-bold">${c.nome}</p>
                            <p class="text-xs opacity-50">CPF: ${c.cpf} | ${c.eventos.length} atualizações</p>
                        </div>
                        <button onclick="editClient(${idx})" class="p-2 text-satinGold"><i class="fas fa-edit"></i></button>
                    </div>
                `;
            });
        }

        function openClientModal() {
            document.getElementById('modal-title').innerText = "Novo Cadastro";
            document.getElementById('area-atualizacao').classList.add('hidden');
            document.getElementById('edit-client-id').value = "";
            document.getElementById('modal-client').classList.remove('hidden');
        }

        function editClient(idx) {
            const c = dbClients[idx];
            document.getElementById('modal-title').innerText = "Editar/Atualizar Processo";
            document.getElementById('edit-client-id').value = idx;
            document.getElementById('c-nome').value = c.nome;
            document.getElementById('c-cpf').value = c.cpf;
            document.getElementById('c-senha').value = c.senha;
            document.getElementById('c-email').value = c.email;
            document.getElementById('c-tel').value = c.tel;
            document.getElementById('c-notif').checked = c.notificar;
            
            document.getElementById('area-atualizacao').classList.remove('hidden');
            document.getElementById('modal-client').classList.remove('hidden');
        }

        function saveClient() {
            const idx = document.getElementById('edit-client-id').value;
            const status = document.getElementById('a-status').value;
            const desc = document.getElementById('a-desc').value;

            const clientObj = {
                nome: document.getElementById('c-nome').value,
                cpf: document.getElementById('c-cpf').value,
                senha: document.getElementById('c-senha').value,
                email: document.getElementById('c-email').value,
                tel: document.getElementById('c-tel').value,
                notificar: document.getElementById('c-notif').checked,
                eventos: idx !== "" ? dbClients[idx].eventos : [{
                    data: new Date().toLocaleDateString('pt-BR'),
                    status: "Abertura de Cadastro",
                    descricao: "Cliente cadastrado no sistema."
                }]
            };

            // Se for uma atualização de processo
            if (idx !== "" && desc.trim() !== "") {
                clientObj.eventos.push({
                    data: new Date().toLocaleDateString('pt-BR'),
                    status: status,
                    descricao: desc
                });
                
                // TRIGGER: Google Apps Script Notification
                if (clientObj.notificar) {
                    console.log("Notificando via Apps Script...");
                    try {
                        google.script.run.enviarEmailNotificacao(clientObj);
                    } catch(e) {
                        console.warn("Ambiente local: Google Script não detectado.");
                    }
                }
                notify(`Atualização lançada para ${clientObj.nome}`);
            }

            if (idx !== "") dbClients[idx] = clientObj;
            else dbClients.push(clientObj);

            localStorage.setItem('db_adv_clients', JSON.stringify(dbClients));
            renderAdminList();
            closeModal('modal-client');
        }

        function filterAdminList() {
            const q = document.getElementById('adminSearch').value.toLowerCase();
            const cards = document.getElementById('admin-client-list').children;
            Array.from(cards).forEach(card => {
                const text = card.innerText.toLowerCase();
                card.style.display = text.includes(q) ? 'flex' : 'none';
            });
        }

        // UTILS
        function notify(msg) {
            if (!("Notification" in window)) return;
            Notification.requestPermission().then(perm => {
                if (perm === "granted") new Notification("Sistema Jurídico", { body: msg, icon: 'https://cdn-icons-png.flaticon.com/512/1051/1051395.png' });
            });
        }
    </script>
</body>
</html>
