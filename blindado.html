<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Refrigerista Blindado 5.2</title>
    
    <meta name="description" content="Ferramenta PWA profissional para técnicos de refrigeração.">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>❄️</text></svg>">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="text-slate-800 pb-safe">
    <div class="app-wrapper min-h-[100dvh] flex flex-col items-center justify-start sm:justify-center p-0 sm:p-4 no-print">
        
        <div class="w-full max-w-md bg-white sm:rounded-3xl overflow-hidden border-0 sm:border border-slate-200 shadow-none sm:shadow-2xl relative z-10 flex flex-col min-h-[100dvh] sm:min-h-0">
            
            <header class="bg-[#0f172a] text-white p-5 pt-safe pb-10 relative overflow-hidden flex justify-between items-center shadow-lg z-20">
                <div class="absolute top-0 right-0 w-32 h-32 bg-blue-600 rounded-full opacity-20 blur-3xl transform translate-x-10 -translate-y-10 pointer-events-none"></div>
                
                <div class="z-10 flex items-center gap-3">
                    <div id="headerLogoArea" class="hidden w-10 h-10 bg-white rounded-lg overflow-hidden flex items-center justify-center border border-slate-700 shadow-lg">
                        <img id="headerLogoImg" src="" alt="Logo" class="w-full h-full object-contain">
                    </div>
                    <div>
                        <div class="flex items-center gap-2 opacity-90">
                            <i class="fa-solid fa-snowflake text-blue-400 text-sm animate-pulse"></i>
                            <span class="text-[10px] font-bold uppercase tracking-widest text-blue-200">Refrigeração</span>
                        </div>
                        <h1 class="text-lg font-black uppercase tracking-wide text-white leading-none mt-0.5">
                            REFRIGERISTA <span class="text-blue-500">BLINDADO</span>
                        </h1>
                    </div>
                </div>
                
                <div class="flex gap-2">
                    <button onclick="toggleHistory()" class="z-10 text-white bg-white/10 hover:bg-white/20 transition-colors w-9 h-9 flex items-center justify-center rounded-xl backdrop-blur-md">
                        <i class="fa-solid fa-clock-rotate-left text-sm"></i>
                    </button>
                    <button onclick="toggleSettings()" class="z-10 text-white bg-white/10 hover:bg-white/20 transition-colors w-9 h-9 flex items-center justify-center rounded-xl backdrop-blur-md">
                        <i class="fa-solid fa-gear text-sm"></i>
                    </button>
                </div>
            </header>

            <div class="relative -mt-6 bg-white rounded-t-[1.5rem] flex-grow shadow-[0_-10px_20px_-5px_rgba(0,0,0,0.1)] z-30 overflow-y-auto pb-20">
                <div class="p-5 pt-6">
                    
                    <div id="input-section" class="space-y-5">
                        <a href="https://mercadolivre.com/sec/1bpYUnD" target="_blank" class="block w-full bg-gradient-to-r from-blue-600 to-blue-700 text-white font-bold text-xs py-3 rounded-xl shadow-lg shadow-blue-500/20 flex items-center justify-center gap-2 hover:from-blue-700 transition-all active:scale-[0.98] group border border-blue-500/30">
                            <i class="fa-solid fa-gift text-yellow-300 text-sm group-hover:animate-bounce"></i>
                            <span class="tracking-wide uppercase">Ofertas da Semana</span>
                        </a>

                        <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 space-y-3 relative overflow-hidden">
                            <div class="absolute top-0 left-0 w-1 h-full bg-blue-500"></div>
                            <label class="block text-xs font-bold text-blue-600 uppercase tracking-wide mb-2"><i class="fa-solid fa-user-tag mr-2"></i>Dados do Orçamento</label>
                            
                            <input type="text" id="nomePrestador" placeholder="Seu Nome / Sua Empresa" class="input-field w-full p-3 bg-white border border-slate-200 rounded-xl text-sm font-bold text-slate-700 focus:outline-none">
                            <input type="text" id="nomeCliente" placeholder="Nome do Cliente" class="input-field w-full p-3 bg-white border border-slate-200 rounded-xl text-sm font-bold text-slate-700 focus:outline-none">
                            <input type="text" id="enderecoCliente" placeholder="Endereço Completo" class="input-field w-full p-3 bg-white border border-slate-200 rounded-xl text-sm font-bold text-slate-700 focus:outline-none">
                            <input type="tel" id="telefoneCliente" placeholder="(00) 00000-0000" maxlength="15" class="input-field w-full p-3 bg-white border border-slate-200 rounded-xl text-sm font-bold text-slate-700 focus:outline-none">
                            
                            <div class="grid grid-cols-3 gap-2">
                                <div>
                                    <label class="text-[10px] font-bold text-slate-400 uppercase">Data</label>
                                    <input type="date" id="dataServico" class="w-full p-2 border border-slate-200 rounded-lg text-xs font-bold">
                                </div>
                                <div>
                                    <label class="text-[10px] font-bold text-slate-400 uppercase">Hora</label>
                                    <input type="time" id="horaServico" value="09:00" class="w-full p-2 border border-slate-200 rounded-lg text-xs font-bold">
                                </div>
                                <div>
                                    <label class="text-[10px] font-bold text-slate-400 uppercase">Garantia (D)</label>
                                    <input type="number" id="inputGarantia" value="90" class="w-full p-2 border border-slate-200 rounded-lg text-xs font-bold text-center">
                                </div>
                            </div>
                        </div>

                        <div class="space-y-3">
                            <div class="flex justify-between items-center px-1">
                                <label class="text-xs font-bold text-slate-500 uppercase tracking-wide flex items-center gap-2">
                                    <i class="fa-solid fa-screwdriver-wrench"></i> Itens do Serviço
                                </label>
                            </div>
                            <div id="services-container" class="space-y-3"></div>
                            
                            <button onclick="adicionarServico()" class="w-full py-3 border-2 border-dashed border-slate-300 rounded-xl text-xs font-bold text-slate-500 hover:border-blue-500 hover:text-blue-600 transition-all flex items-center justify-center gap-2">
                                <i class="fa-solid fa-circle-plus"></i> ADICIONAR ITEM
                            </button>
                        </div>

                        <div class="pt-4 border-t border-slate-100 space-y-3">
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide"><i class="fa-solid fa-calculator mr-2"></i>Custos Operacionais</label>
                            <div class="relative">
                                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold">R$</span>
                                <input type="text" id="custoPecas" placeholder="0,00" class="input-field w-full pl-10 pr-4 py-3 bg-white border border-slate-200 rounded-xl text-lg font-bold">
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <input type="number" id="distanciaKm" placeholder="Km Total" class="p-3 border border-slate-200 rounded-xl text-sm font-bold">
                                <input type="number" id="tempoHoras" placeholder="Horas" class="p-3 border border-slate-200 rounded-xl text-sm font-bold">
                            </div>
                        </div>

                        <button onclick="calcularPrecos()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg shadow-blue-600/30 active:scale-[0.98] transition-all text-lg mt-4 flex items-center justify-center gap-3">
                            CALCULAR AGORA <i class="fa-solid fa-arrow-right"></i>
                        </button>
                    </div>

                    <div id="results-section" class="hidden space-y-5 animate-slide-up pb-10">
                        <div class="bg-[#0f172a] p-6 rounded-3xl shadow-xl text-white text-center relative overflow-hidden ring-4 ring-slate-100">
                            <div class="absolute top-0 right-0 w-32 h-32 bg-blue-500 rounded-full opacity-20 blur-2xl"></div>
                            <p class="text-[10px] font-bold text-blue-300 uppercase mb-2 tracking-widest">Valor Sugerido</p>
                            <p class="text-5xl font-black mb-5 tracking-tighter" id="displayPrecoFinal">R$ 0,00</p>
                            
                            <div class="grid grid-cols-2 gap-2">
                                <div class="bg-white/10 p-2 rounded-xl border border-white/5">
                                    <p class="text-[9px] text-slate-400 font-bold uppercase">Lucro Líquido</p>
                                    <p class="text-base font-bold text-green-400" id="displayLucroLiquido">R$ 0,00</p>
                                </div>
                                <div class="bg-white/10 p-2 rounded-xl border border-white/5">
                                    <p class="text-[9px] text-slate-400 font-bold uppercase">Despesas</p>
                                    <p class="text-base font-bold text-red-300" id="displayDespesas">R$ 0,00</p>
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="gerarPDF()" class="bg-blue-600 text-white py-3.5 rounded-xl font-bold text-xs flex items-center justify-center gap-2">
                                <i class="fa-solid fa-file-pdf"></i> GERAR PDF
                            </button>
                            <button onclick="location.reload()" class="bg-slate-100 text-slate-600 py-3.5 rounded-xl font-bold text-xs flex items-center justify-center gap-2">
                                <i class="fa-solid fa-rotate-left"></i> NOVO
                            </button>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <div id="printable-area" class="hidden p-8 bg-white"></div>

    <script src="script.js"></script>
</body>
</html>
