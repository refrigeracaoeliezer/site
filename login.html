<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>TESTE DE CACHE | Refrigeração</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* CSS Simplificado para o Teste */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center; 
            background: #0d1117; 
            color: white;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            border: 4px solid #ff0000; /* Borda vermelha para você saber que é a versão de teste */
            border-radius: 40px; 
            padding: 50px 40px;
            width: 100%;
            max-width: 410px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            background: #1c2128;
            color: white;
        }
        button {
            width: 100%;
            padding: 16px;
            background: #1e40af;
            border: none;
            border-radius: 15px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
        }
        #error { color: #ff4b4b; display: none; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>MODO DE TESTE</h1>
        <p>Se esta borda for vermelha, o código novo carregou.</p>
        
        <form id="formLocal">
            <input type="text" id="user" placeholder="Digite 'teste'" required>
            <input type="password" id="pass" placeholder="Digite '123'" required>
            <div id="error">Login ou Senha Incorretos!</div>
            <button type="submit">Autenticar Localmente</button>
        </form>
    </div>

    <script>
        // LÓGICA TOTALMENTE LOCAL - SEM GOOGLE, SEM PLANILHA
        document.getElementById('formLocal').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            const errorMsg = document.getElementById('error');

            console.log("Tentativa de login local com:", user);

            // Única forma de logar neste teste:
            if (user === "teste" && pass === "123") {
                alert("Sucesso Local! O código novo está funcionando.");
                localStorage.setItem("inforos_logado", "true");
                window.location.href = "sistemas.html";
            } else {
                errorMsg.style.display = "block";
                setTimeout(() => { errorMsg.style.display = "none"; }, 2000);
            }
        });
    </script>
</body>
</html>
